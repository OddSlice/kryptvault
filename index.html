  function renderLevelUp() {
    // render frozen world behind
    renderWorld();
    renderHUD();
    // dark overlay
    ctx.fillStyle = 'rgba(0,0,10,0.75)';
    ctx.fillRect(0, 0, W, H);

    text('LEVEL UP!  CHOOSE AN UPGRADE', W / 2, 30, 8, '#FFD700', 'center');

    for (var i = 0; i < game.cards.length; i++) {
      var c = game.cards[i];
      var hover = mouse.x >= c.x && mouse.x <= c.x + c.w &&
                  mouse.y >= c.y && mouse.y <= c.y + c.h;

      var cursed = !!c.upgrade.cursed;
      var evo = !!c.upgrade.evolution;
      var tierColor = evo ? '#ff2dd0' : (cursed ? '#9b59b6' : '#FFD700');
      var cx2 = c.x + c.w / 2;

      // hover glow border (2px outside)
      if (hover) {
        ctx.fillStyle = evo ? 'rgba(255,45,208,0.45)' : (cursed ? 'rgba(155,89,182,0.45)' : 'rgba(255,215,0,0.35)');
        ctx.fillRect(c.x - 4, c.y - 4, c.w + 8, c.h + 8);
      }
      // tier frame + dark card face
      ctx.fillStyle = tierColor;
      ctx.fillRect(c.x - 2, c.y - 2, c.w + 4, c.h + 4);
      ctx.fillStyle = evo ? '#1f1018' : (cursed ? '#16101f' : '#1a1a2e');
      ctx.fillRect(c.x, c.y, c.w, c.h);

      // tier banner across the top — the at-a-glance rarity signal
      ctx.fillStyle = tierColor;
      ctx.fillRect(c.x, c.y, c.w, 11);
      text(evo ? 'EVOLUTION' : (cursed ? 'CURSED' : 'STANDARD'), cx2, c.y + 3, 6, '#0d0d1a', 'center');

      // card name
      wrapText(c.upgrade.name, cx2, c.y + 17, 8, '#ffffff', c.w - 8);

      // framed pixel art (the "card art" window)
      var artX = cx2 - 28, artY = c.y + 30;
      ctx.fillStyle = tierColor;
      ctx.fillRect(artX - 1, artY - 1, 58, 58);
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(artX, artY, 56, 56);
      var art = CARD_ART[c.upgrade.id];
      if (art) {
        drawPixelIcon(art, artX + 4, artY + 4, 4);
      } else {
        ctx.fillStyle = c.upgrade.color;
        ctx.fillRect(artX + 12, artY + 12, 32, 32);
      }

      // recipe hint: is this card an ingredient of an evolution not yet owned?
      var recipeHint = null, completesRecipe = false;
      if (!evo) {
        for (var re = 0; re < EVOLUTIONS.length; re++) {
          var rEvo = EVOLUTIONS[re];
          if (game.player.upgradesTaken[rEvo.id]) continue;
          if (rEvo.needs.indexOf(c.upgrade.id) === -1) continue;
          var otherIng = rEvo.needs[0] === c.upgrade.id ? rEvo.needs[1] : rEvo.needs[0];
          if (game.player.upgradesTaken[otherIng]) {
            recipeHint = 'UNLOCKS: ' + rEvo.name;
            completesRecipe = true;
            break;
          }
          if (!recipeHint) recipeHint = 'RECIPE 1/2: ' + rEvo.name;
        }
      }
      if (completesRecipe && game.blinkOn) {
        // pulse: this pick births an evolution next level
        ctx.fillStyle = 'rgba(255,45,208,0.4)';
        ctx.fillRect(c.x - 5, c.y - 5, c.w + 10, 3);
        ctx.fillRect(c.x - 5, c.y + c.h + 2, c.w + 10, 3);
        ctx.fillRect(c.x - 5, c.y - 5, 3, c.h + 10);
        ctx.fillRect(c.x + c.w + 2, c.y - 5, 3, c.h + 10);
      }

      // effect (white), downside (red), rules text (dim) or recipe hint (gold)
      wrapText(c.upgrade.desc, cx2, c.y + 92, 6, '#ffffff', c.w - 10);
      if (c.upgrade.con) {
        wrapText('BUT: ' + c.upgrade.con, cx2, c.y + 112, 6, '#ff5555', c.w - 10);
      }
      if (recipeHint) {
        wrapText(recipeHint, cx2, c.y + 130, 6, completesRecipe ? '#ff2dd0' : '#FFD700', c.w - 10);
      } else if (c.upgrade.detail) {
        wrapText(c.upgrade.detail, cx2, c.y + 130, 6, '#777799', c.w - 10);
      }

      // count owned
      var owned = game.player.upgradesTaken[c.upgrade.id] || 0;
      if (owned > 0) {
        text('OWNED x' + owned, cx2, c.y + c.h - 12, 6, '#999999', 'center');
      }
      // bottom accent stripe in the upgrade's own colour
      ctx.fillStyle = c.upgrade.color;
      ctx.fillRect(c.x, c.y + c.h - 4, c.w, 4);
    }
  }

  function drawClassIcon(id, x, y) {
    // x,y is the top-left of a 40x40 icon area
    if (id === 'warrior') {
      // sword: vertical blade, horizontal crossguard, pommel — grey and gold
      ctx.fillStyle = '#c0c8d0';
      ctx.fillRect(x + 17, y + 4, 6, 18);
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(x + 12, y + 22, 16, 4);
      ctx.fillStyle = '#c0c8d0';
      ctx.fillRect(x + 18, y + 26, 4, 8);
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(x + 17, y + 34, 6, 4);
    } else if (id === 'rogue') {
      // dagger tilted 45 degrees, dark green tones
      ctx.save();
      ctx.translate(x + 20, y + 20);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = '#9be8b0';
      ctx.fillRect(-2, -14, 4, 16);
      ctx.fillStyle = '#1d7a3c';
      ctx.fillRect(-6, 2, 12, 3);
      ctx.fillRect(-2, 5, 4, 8);
      ctx.restore();
    } else if (id === 'mage') {
      // staff: shaft, orb on top, small crossbars — purple and white
      ctx.fillStyle = '#b794f6';
      ctx.fillRect(x + 18, y + 10, 4, 26);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x + 20, y + 8, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6633cc';
      ctx.beginPath();
      ctx.arc(x + 20, y + 8, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#b794f6';
      ctx.fillRect(x + 13, y + 16, 14, 2);
      ctx.fillRect(x + 15, y + 22, 10, 2);
    }
  }

  function renderClassSelect() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('CHOOSE YOUR CLASS', W / 2, 40, 10, '#FFD700', 'center');

    var labels = ['HP', 'SPEED', 'POWER'];
    for (var i = 0; i < classCards.length; i++) {
      var c = classCards[i];
      var cls = c.cls;
      var hover = mouse.x >= c.x && mouse.x <= c.x + c.w &&
                  mouse.y >= c.y && mouse.y <= c.y + c.h;

      // 2px border: gold on hover, class colour otherwise
      ctx.fillStyle = hover ? '#FFD700' : cls.color;
      ctx.fillRect(c.x - 2, c.y - 2, c.w + 4, c.h + 4);
      ctx.fillStyle = '#101020';
      ctx.fillRect(c.x, c.y, c.w, c.h);

      text(cls.name, c.x + c.w / 2, c.y + 10, 8, '#ffffff', 'center');
      if (!useProceduralSprites && sheetReady) {
        // hero sprite + weapon side by side
        drawTile(cls.tile, c.x + c.w / 2 - 38, c.y + 32, 36, 36, false);
        drawClassIcon(cls.id, c.x + c.w / 2 + 2, c.y + 30);
      } else {
        drawClassIcon(cls.id, c.x + c.w / 2 - 20, c.y + 30);
      }
      text(String(i + 1), c.x + 8, c.y + 8, 6, '#666666');

      // three 5-segment stat bars
      for (var b = 0; b < 3; b++) {
        var by = c.y + 88 + b * 15;
        text(labels[b], c.x + 8, by, 6, '#bbbbbb');
        for (var sg = 0; sg < 5; sg++) {
          ctx.fillStyle = sg < cls.bars[b] ? cls.color : '#2a2a3a';
          ctx.fillRect(c.x + 58 + sg * 11, by, 8, 7);
        }
      }
    }

    text('CLICK A CLASS OR PRESS 1-3 TO BEGIN', W / 2, 244, 6, '#888888', 'center');
  }

  // Shop rows are also used as click targets.
  function shopRowRect(i) {
    return { x: 60, y: 64 + i * 32, w: W - 120, h: 28 };
  }

  function renderShop() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('THE VAULT', W / 2, 14, 10, '#FFD700', 'center');
    text('COINS: ' + Math.round(runData.coins), W / 2, 34, 8, '#ffffff', 'center');

    for (var i = 0; i < SHOP_ITEMS.length; i++) {
      var item = SHOP_ITEMS[i];
      var lvl = runData.shop[item.id] || 0;
      var r = shopRowRect(i);
      var hover = mouse.x >= r.x && mouse.x <= r.x + r.w && mouse.y >= r.y && mouse.y <= r.y + r.h;
      var maxed = lvl >= 5;
      var price = maxed ? 0 : SHOP_PRICES[lvl];
      var affordable = !maxed && runData.coins >= price;

      ctx.fillStyle = hover ? '#2a2a3e' : '#16161f';
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = hover ? '#FFD700' : '#333344';
      ctx.fillRect(r.x, r.y, r.w, 1);
      ctx.fillRect(r.x, r.y + r.h - 1, r.w, 1);

      text((i + 1) + '.', r.x + 6, r.y + 6, 6, '#666666');
      text(item.name, r.x + 24, r.y + 4, 6, '#ffffff');
      text(item.desc, r.x + 24, r.y + 14, 6, '#888888');
      // level pips
      for (var pip = 0; pip < 5; pip++) {
        ctx.fillStyle = pip < lvl ? '#FFD700' : '#2a2a3a';
        ctx.fillRect(r.x + 192 + pip * 10, r.y + 10, 7, 7);
      }
      // price / status
      if (maxed) {
        text('MAX', r.x + r.w - 8, r.y + 10, 6, '#33cc66', 'right');
      } else {
        text(price + 'c', r.x + r.w - 8, r.y + 10, 6, affordable ? '#FFD700' : '#883333', 'right');
      }
    }

    text('CLICK OR PRESS 1-5 TO BUY — ESC / ENTER TO RETURN', W / 2, 240, 6, '#888888', 'center');
  }

  // play flow: pick a run mode before class select
  var MODE_CARDS = [
    { id: 'normal', x: 48,  y: 62, w: 180, h: 142 },
    { id: 'daily',  x: 252, y: 62, w: 180, h: 142 }
  ];
  var MODE_BACK = { x: 190, y: 226, w: 100, h: 20 };

  function renderModeSelect() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('CHOOSE YOUR RUN', W / 2, 26, 10, '#FFD700', 'center');

    for (var i = 0; i < MODE_CARDS.length; i++) {
      var c = MODE_CARDS[i];
      var hover = mouse.x >= c.x && mouse.x <= c.x + c.w && mouse.y >= c.y && mouse.y <= c.y + c.h;
      var accent = c.id === 'daily' ? '#ff2dd0' : '#FFD700';
      if (hover) {
        ctx.fillStyle = c.id === 'daily' ? 'rgba(255,45,208,0.35)' : 'rgba(255,215,0,0.35)';
        ctx.fillRect(c.x - 4, c.y - 4, c.w + 8, c.h + 8);
      }
      ctx.fillStyle = accent;
      ctx.fillRect(c.x - 2, c.y - 2, c.w + 4, c.h + 4);
      ctx.fillStyle = '#101020';
      ctx.fillRect(c.x, c.y, c.w, c.h);
      text(String(i + 1), c.x + 8, c.y + 8, 6, '#666666');
      if (c.id === 'normal') {
        text('STANDARD', c.x + c.w / 2, c.y + 12, 8, accent, 'center');
        text('THE ENDLESS CRYPT', c.x + c.w / 2, c.y + 36, 6, '#ffffff', 'center');
        text('NEW RANDOM DUNGEON', c.x + c.w / 2, c.y + 58, 6, '#bbbbbb', 'center');
        text('EVERY SINGLE RUN', c.x + c.w / 2, c.y + 70, 6, '#bbbbbb', 'center');
        text('COMPETE ON THE', c.x + c.w / 2, c.y + 92, 6, '#888888', 'center');
        text('ALL-TIME LEADERBOARD', c.x + c.w / 2, c.y + 104, 6, '#888888', 'center');
      } else {
        text('DAILY CHALLENGE', c.x + c.w / 2, c.y + 12, 8, accent, 'center');
        text('ONE SHARED DUNGEON', c.x + c.w / 2, c.y + 36, 6, '#ffffff', 'center');
        text('SAME LAYOUT FOR', c.x + c.w / 2, c.y + 58, 6, '#bbbbbb', 'center');
        text('EVERYONE TODAY (UTC)', c.x + c.w / 2, c.y + 70, 6, '#bbbbbb', 'center');
        text('ITS OWN DAILY', c.x + c.w / 2, c.y + 92, 6, '#888888', 'center');
        text('LEADERBOARD', c.x + c.w / 2, c.y + 104, 6, '#888888', 'center');
      }
      text('CLICK TO PLAY', c.x + c.w / 2, c.y + 124, 6, hover ? '#ffffff' : '#555566', 'center');
    }

    var bHover = mouse.x >= MODE_BACK.x && mouse.x <= MODE_BACK.x + MODE_BACK.w &&
                 mouse.y >= MODE_BACK.y && mouse.y <= MODE_BACK.y + MODE_BACK.h;
    ctx.fillStyle = bHover ? '#FFD700' : '#444466';
    ctx.fillRect(MODE_BACK.x - 1, MODE_BACK.y - 1, MODE_BACK.w + 2, MODE_BACK.h + 2);
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(MODE_BACK.x, MODE_BACK.y, MODE_BACK.w, MODE_BACK.h);
    text('BACK (ESC)', MODE_BACK.x + MODE_BACK.w / 2, MODE_BACK.y + 7, 6, bHover ? '#ffffff' : '#cccccc', 'center');

    text('ENTER = QUICK-START STANDARD', W / 2, 256, 6, '#555566', 'center');
  }

  function renderCodex() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('RECIPE CODEX', W / 2, 12, 10, '#FFD700', 'center');
    text('STANDARD: FAIR TRADE', 100, 34, 6, '#FFD700', 'center');
    text('CURSED: RUN PAYS', 245, 34, 6, '#9b59b6', 'center');
    text('EVOLUTION: COMBO', 378, 34, 6, '#ff2dd0', 'center');

    var recipes = [
      ['SHOTGUN', 'HOMING SHOT', 'SEEKER SWARM'],
      ['ORBIT SHIELD', 'DMG BOOST', 'BLADE ORBIT'],
      ['PIERCE', 'DMG BOOST', 'RAILGUN'],
      ['MULTI-SHOT', 'ATTACK SPD', 'BULLET STORM']
    ];
    var evoIds = ['seekerswarm', 'bladeorbit', 'railgun', 'bulletstorm'];
    for (var i = 0; i < recipes.length; i++) {
      var ry = 52 + i * 32;
      var owned = game.player && game.player.upgradesTaken && game.player.upgradesTaken[evoIds[i]];
      // ingredient boxes
      ctx.fillStyle = '#8a7500';
      ctx.fillRect(23, ry - 1, 110, 20);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(24, ry, 108, 18);
      text(recipes[i][0], 78, ry + 6, 6, '#FFD700', 'center');
      text('+', 146, ry + 6, 8, '#ffffff', 'center');
      ctx.fillStyle = '#8a7500';
      ctx.fillRect(159, ry - 1, 110, 20);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(160, ry, 108, 18);
      text(recipes[i][1], 214, ry + 6, 6, '#FFD700', 'center');
      text('=', 282, ry + 6, 8, '#ffffff', 'center');
      ctx.fillStyle = '#ff2dd0';
      ctx.fillRect(295, ry - 1, 162, 20);
      ctx.fillStyle = '#1f1018';
      ctx.fillRect(296, ry, 160, 18);
      text(recipes[i][2] + (owned ? ' *' : ''), 376, ry + 6, 6, '#ff2dd0', 'center');
    }
    text('OWN BOTH CARDS AND THE EVOLUTION IS GUARANTEED IN YOUR NEXT DRAFT', W / 2, 186, 6, '#bbbbbb', 'center');

    text('TIPS', W / 2, 204, 6, '#FFD700', 'center');
    text('DMG BOOST FEEDS TWO RECIPES — SAFEST EARLY PICK', W / 2, 216, 6, '#888888', 'center');
    text('FROST + FAST FIRE = A PERMANENT SLOW FIELD', W / 2, 227, 6, '#888888', 'center');
    text('CURSES HIT HARDER THE EARLIER YOU TAKE THEM', W / 2, 238, 6, '#888888', 'center');

    text('ESC / ENTER / R TO RETURN', W / 2, 256, 6, '#666666', 'center');
  }

  // Post-first-death nudge: ratings on itch are what make the game visible.
  var FEEDBACK_BTNS = [
    { id: 'rate',  label: 'RATE IT ON ITCH.IO', x: 150, y: 150, w: 180, h: 24, gold: true },
    { id: 'later', label: 'MAYBE LATER',        x: 150, y: 184, w: 180, h: 20 }
  ];

  function renderFeedback() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('ENJOYING KRYPTVAULT?', W / 2, 60, 10, '#FFD700', 'center');
    text('RATINGS AND COMMENTS ON ITCH ARE WHAT', W / 2, 92, 6, '#bbbbbb', 'center');
    text('MAKE A TINY FREE GAME VISIBLE TO OTHERS', W / 2, 104, 6, '#bbbbbb', 'center');
    text('IT TAKES 20 SECONDS AND HELPS A TON', W / 2, 122, 6, '#888888', 'center');

    for (var i = 0; i < FEEDBACK_BTNS.length; i++) {
      var b = FEEDBACK_BTNS[i];
      var hover = mouse.x >= b.x && mouse.x <= b.x + b.w && mouse.y >= b.y && mouse.y <= b.y + b.h;
      ctx.fillStyle = hover ? '#FFD700' : (b.gold ? '#8a7500' : '#444466');
      ctx.fillRect(b.x - 1, b.y - 1, b.w + 2, b.h + 2);
      ctx.fillStyle = hover ? '#1f1a08' : '#0d0d1a';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      text(b.label, b.x + b.w / 2, b.y + (b.h - (b.gold ? 8 : 6)) / 2, b.gold ? 8 : 6,
           b.gold ? '#FFD700' : '#cccccc', 'center');
    }
    text('ENTER OPENS ITCH — ESC SKIPS', W / 2, 226, 6, '#555566', 'center');
  }

  function renderAchievements() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('ACHIEVEMENTS', W / 2, 14, 10, '#FFD700', 'center');
    var unlockedCount = 0;
    for (var c = 0; c < ACHIEVEMENTS.length; c++) if (runData.achievements[ACHIEVEMENTS[c].id]) unlockedCount++;
    text(unlockedCount + ' / ' + ACHIEVEMENTS.length, W / 2, 32, 6, '#888888', 'center');

    for (var i = 0; i < ACHIEVEMENTS.length; i++) {
      var a = ACHIEVEMENTS[i];
      var got = !!runData.achievements[a.id];
      var col = i % 2, row = Math.floor(i / 2);
      var x = 30 + col * 215, y = 52 + row * 42;
      ctx.fillStyle = got ? '#1f1a08' : '#101016';
      ctx.fillRect(x, y, 200, 36);
      ctx.fillStyle = got ? '#FFD700' : '#2a2a3a';
      ctx.fillRect(x, y, 200, 1);
      ctx.fillRect(x, y + 35, 200, 1);
      text(got ? '*' : '-', x + 8, y + 8, 8, got ? '#FFD700' : '#444455');
      text(a.name, x + 24, y + 6, 6, got ? '#FFD700' : '#666677');
      text(a.desc, x + 24, y + 18, 6, got ? '#bbbbbb' : '#444455');
    }

    text('ESC / ENTER TO RETURN', W / 2, 244, 6, '#888888', 'center');
  }

  // Achievement toast popups, drawn over every screen.
  function drawToasts() {
    for (var i = 0; i < game.toasts.length; i++) {
      var t = game.toasts[i];
      var alpha = t.t < 0.3 ? t.t / 0.3 : (t.t > 2.4 ? Math.max(0, 1 - (t.t - 2.4) / 0.6) : 1);
      ctx.globalAlpha = alpha;
      var tw = 220, tx = (W - tw) / 2, ty = 30 + i * 20;
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(tx - 1, ty - 1, tw + 2, 16);
      ctx.fillStyle = '#1a1408';
      ctx.fillRect(tx, ty, tw, 14);
      text(t.txt, W / 2, ty + 4, 6, '#FFD700', 'center');
      ctx.globalAlpha = 1;
    }
  }

  function renderWaveIntro() {
    // frozen world behind a translucent overlay
    renderWorld();
    renderHUD();
    ctx.fillStyle = 'rgba(0,0,10,0.6)';
    ctx.fillRect(0, 0, W, H);

    var cw = 240, ch = 100, cx = (W - cw) / 2, cy = (H - ch) / 2;
    ctx.fillStyle = '#FFD700';                 // 2px gold border
    ctx.fillRect(cx - 2, cy - 2, cw + 4, ch + 4);
    ctx.fillStyle = '#0d0d1a';                 // dark background
    ctx.fillRect(cx, cy, cw, ch);

    text('WAVE', W / 2, cy + 12, 8, '#FFD700', 'center');
    text(pad(game.wave, 2), W / 2, cy + 28, 20, '#FFD700', 'center');

    if (game.bossWave) {
      if (game.blinkOn) {
        text('! BOSS WAVE !', W / 2, cy + 72, 8, '#ff2d2d', 'center');
      }
    } else {
      text('~' + game.waveTarget + ' ENEMIES', W / 2, cy + 76, 6, '#ffffff', 'center');
    }
  }

  // simple word-wrap renderer centred at cx
  function wrapText(str, cx, y, size, color, maxW) {
    ctx.font = size + 'px "Press Start 2P"';
    var words = str.split(' ');
    var lines = [];
    var line = '';
    for (var i = 0; i < words.length; i++) {
      var test = line ? line + ' ' + words[i] : words[i];
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = words[i];
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    for (var l = 0; l < lines.length; l++) {
      text(lines[l], cx, y + l * (size + 3), size, color, 'center');
    }
  }

  // ---------------------------------------------------------------------------
  // MAIN RENDER
  // ---------------------------------------------------------------------------
  function render() {
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (game.gameState === 'title') {
      renderTitle();
    } else if (game.gameState === 'nameentry') {
      renderNameEntry();
      drawScanlines();
    } else if (game.gameState === 'account') {
      renderAccount();
      drawScanlines();
    } else if (game.gameState === 'login') {
      renderLogin();
      drawScanlines();
    } else if (game.gameState === 'accountinfo') {
      renderAccountInfo();
      drawScanlines();
    } else if (game.gameState === 'classselect') {
      renderClassSelect();
      drawScanlines();
    } else if (game.gameState === 'shop') {
      renderShop();
      drawScanlines();
    } else if (game.gameState === 'codex') {
      renderCodex();
      drawScanlines();
    } else if (game.gameState === 'modeselect') {
      renderModeSelect();
      drawScanlines();
    } else if (game.gameState === 'feedback') {
      renderFeedback();
      drawScanlines();
    } else if (game.gameState === 'achievements') {
      renderAchievements();
      drawScanlines();
    } else if (game.gameState === 'gameover') {
      renderGameOver();
      drawScanlines();
    } else if (game.gameState === 'levelup') {
      renderLevelUp();
      drawScanlines();
    } else if (game.gameState === 'waveintro') {
      renderWaveIntro();
      drawScanlines();
    } else if (game.gameState === 'paused') {
      renderWorld();
      renderHUD();
      ctx.fillStyle = 'rgba(0,0,10,0.65)';
      ctx.fillRect(0, 0, W, H);
      text('PAUSED', W / 2, 105, 16, '#FFD700', 'center');
      if (game.blinkOn) {
        text('P / ESC / CLICK TO RESUME', W / 2, 140, 6, '#bbbbbb', 'center');
      }
      drawScanlines();
    } else {
      renderWorld();
      renderHUD();
      drawScanlines();
    }

    // boss-death white flash, drawn on top of everything for a few frames
    if (game.whiteFlash > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
    }

    drawToasts();
  }

  // ---------------------------------------------------------------------------
  // GAME LOOP
  // ---------------------------------------------------------------------------
  fetchLeaderboard();
  initMenuBackdrop();
  // migrate pre-account players: claim a tag for the locally saved name
  if (runData.name && runData.name.length === 3 && !runData.playerDisc) {
    registerAccount(true);
  }

  var lastTime = performance.now();
  function loop(ts) {
    var dt = (ts - lastTime) / 1000;
    lastTime = ts;
    if (dt > 0.05) dt = 0.05; // cap to avoid spiral of death
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
