  // ---------------------------------------------------------------------------
  // CANVAS & RESOLUTION
  // ---------------------------------------------------------------------------
  var W = 480, H = 270;
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;
  ctx.imageSmoothingEnabled = false;

  // Hidden text fields for the typed screens. The game reads raw key events,
  // which works on desktop but never raises a soft keyboard on mobile (and soft
  // keyboards send no e.code anyway). Focusing a real <input> inside the tap
  // gesture pops the mobile keyboard, and its value drives the field so on-
  // screen typing works regardless of key codes. One input per typed screen.
  function makeHiddenInput(maxLen) {
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.maxLength = maxLen;
    inp.autocapitalize = 'characters';
    inp.autocomplete = 'off';
    inp.setAttribute('autocorrect', 'off');
    inp.spellcheck = false;
    inp.setAttribute('aria-hidden', 'true');
    inp.tabIndex = -1;
    // visually hidden but still focusable; 16px font stops iOS auto-zoom
    inp.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;' +
      'opacity:0.01;border:0;padding:0;margin:0;font-size:16px;background:transparent;' +
      'color:transparent;caret-color:transparent;z-index:-1;pointer-events:none;';
    document.body.appendChild(inp);
    return inp;
  }
  var nameInput = makeHiddenInput(3);
  var loginInput = makeHiddenInput(20); // slack for #/space the user may type

  function focusHiddenInput(inp, val) {
    inp.value = val;
    try { inp.focus({ preventScroll: true }); } catch (e) { inp.focus(); }
  }
  function blurHiddenInput(inp) {
    if (document.activeElement === inp) inp.blur();
  }
  // thin wrappers kept for the name-entry call sites
  function focusNameInput() { focusHiddenInput(nameInput, nameDraft); }
  function blurNameInput() { blurHiddenInput(nameInput); }

  // soft-keyboard / desktop typing into the initials field -> nameDraft
  nameInput.addEventListener('input', function () {
    if (game.gameState !== 'nameentry') return;
    var v = (nameInput.value || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 3);
    nameDraft = v;
    nameInput.value = v;
  });

  // login buffer is 15 chars: 3 letters (name) + 4 digits (tag) + 8 alnum (key)
  function sanitizeLoginBuf(raw) {
    var s = (raw || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    var out = '';
    for (var i = 0; i < s.length && out.length < 15; i++) {
      var c = s[i], pos = out.length;
      if (pos < 3) { if (c >= 'A' && c <= 'Z') out += c; }        // name letters
      else if (pos < 7) { if (c >= '0' && c <= '9') out += c; }   // tag digits
      else { out += c; }                                          // key alnum
    }
    return out;
  }
  loginInput.addEventListener('input', function () {
    if (game.gameState !== 'login') return;
    loginForm.buf = sanitizeLoginBuf(loginInput.value);
    loginInput.value = loginForm.buf;
    if (loginForm.state === 'fail' || loginForm.state === 'offline') loginForm.state = 'idle';
  });

  // Scale factor used to translate mouse coords into game coords.
  var scale = 1, offsetX = 0, offsetY = 0;
  function computeScale() {
    var sx = window.innerWidth / W;
    var sy = window.innerHeight / H;
    scale = Math.min(sx, sy);
    // object-fit: contain centres the canvas; compute the letterbox offsets.
    var dispW = W * scale;
    var dispH = H * scale;
    offsetX = (window.innerWidth - dispW) / 2;
    offsetY = (window.innerHeight - dispH) / 2;
  }
  computeScale();
  window.addEventListener('resize', computeScale);

  // ---------------------------------------------------------------------------
  // SPRITE LOADING — embedded base64 (no CORS), procedural fallback as safety.
  // ---------------------------------------------------------------------------
  var useProceduralSprites = false;
  var uiSpriteLoaded = false; // UI sheet no longer used; cards drawn procedurally.

  var spritesheet = new Image();
  var sheetReady = false;
  try {
    // Data URI is same-origin — do NOT set crossOrigin.
    spritesheet.onload = function () { sheetReady = true; useProceduralSprites = false; };
    spritesheet.onerror = function () {
      useProceduralSprites = true;
      console.warn('Sprite load failed — using procedural fallback renderer');
    };
    spritesheet.src = SPRITE_B64;
  } catch (e) {
    useProceduralSprites = true;
    console.warn('Sprite load failed — using procedural fallback renderer');
  }

  // Tile source rects (verified against the embedded Tiny Dungeon packed sheet,
  // 192x176 = 12x11 tiles of 16px).
  var TILE = {
    playerIdle: { x: 0,  y: 112 }, // purple-hooded hero
    playerWalk: { x: 0,  y: 112 }, // single frame; vertical bob animates the walk
    skeleton:   { x: 0,  y: 128 }, // grey-blue bones
    slime:      { x: 0,  y: 144 }, // green blob
    orc:        { x: 32, y: 144 }, // red demon
    bossWarden:   { x: 16, y: 128 }, // plumed knight (distinct from the skeleton knight)
    bossRevenant: { x: 16, y: 160 }, // white ghost, drawn big + translucent
    floor:      { x: 16, y: 64 },  // tan dungeon ground
    floorAlt:   { x: 32, y: 64 },  // tan variant
    wall:       { x: 16, y: 64 },  // darkened with overlay for shadow tiles
    // class heroes (verified by visual inspection of the packed sheet)
    heroWarrior: { x: 48, y: 112 }, // horned-helm viking
    heroRogue:   { x: 64, y: 128 }, // grey-hooded figure
    heroMage:    { x: 0,  y: 112 }  // purple wizard (the original hero)
  };

  // Draw a 16x16 sheet tile, optionally flipped horizontally.
  function drawTile(tile, dx, dy, dw, dh, flip) {
    if (useProceduralSprites || !sheetReady) return false;
    ctx.imageSmoothingEnabled = false;
    if (flip) {
      ctx.save();
      ctx.translate(dx + dw, dy);
      ctx.scale(-1, 1);
      ctx.drawImage(spritesheet, tile.x, tile.y, 16, 16, 0, 0, dw, dh);
      ctx.restore();
    } else {
      ctx.drawImage(spritesheet, tile.x, tile.y, 16, 16, dx, dy, dw, dh);
    }
    return true;
  }

      g.gain.setValueAtTime(vol, t + dur * 0.6);
      g.gain.linearRampToValueAtTime(0, t + dur);     // mute
      o.connect(g); g.connect(bus);
      o.start(t); o.stop(t + dur + 0.02);

        if (root) powerChord(root, t, stepDur * 0.9, 0.05);
        var dlead = tr.lead[rs];

        if (tr.kick[rs])  doomKick(t);

          if (ds === 4) musicNoise(t, 0.05, 0.05);
          if (ds === 6) musicNoise(t, 0.02, 0.02);
        }
      }
      music.nextTime += stepDur;
      music.step++;

      else if (e.code === 'Digit2') { enterLogin(); }
      else if (e.code === 'Escape') { game.gameState = 'title'; }
    } else if (game.gameState === 'codex') {
      if (e.code === 'Escape' || e.code === 'KeyR') game.gameState = 'title';
    } else if (game.gameState === 'feedback') {
      if (e.code === 'Escape') { game.gameState = 'title'; maybeRefreshLeaderboard(); }
    } else if (game.gameState === 'title') {
      if (e.code === 'KeyN') { game.gameState = 'account'; }
      else if (e.code === 'KeyT') { game.gameState = 'settings'; }
      else if (e.code === 'KeyR') { game.gameState = 'codex'; }
      else if (e.code === 'KeyS') { game.gameState = 'shop'; }
      else if (e.code === 'KeyA') { game.gameState = 'achievements'; }
      else if (e.code === 'KeyL') {
        leaderboard.mode = leaderboard.mode === 'daily' ? 'normal' : 'daily';
        leaderboard.state = 'idle';
        maybeRefreshLeaderboard();
      } else if (e.code === 'KeyD') {
        startModeGate('daily');
      }
    } else if (game.gameState === 'modeselect') {
      if (e.code === 'Digit1') startModeGate('normal');
      else if (e.code === 'Digit2') startModeGate('daily');
      else if (e.code === 'Escape') game.gameState = 'title';
    } else if (game.gameState === 'shop') {
      var si = { Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3, Digit5: 4 };
      if (e.code in si) tryBuyShopItem(si[e.code]);
      if (e.code === 'Escape' || e.code === 'KeyS') game.gameState = 'title';
    } else if (game.gameState === 'wardrobe') {
      if (e.code === 'Escape') game.gameState = wardrobeFrom === 'classselect' ? 'classselect' : 'title';
      else if (e.code === 'ArrowLeft') { wardrobeClass = prevClassId(wardrobeClass); wardrobeScroll = 0; skinPending = null; }
      else if (e.code === 'ArrowRight') { wardrobeClass = nextClassId(wardrobeClass); wardrobeScroll = 0; skinPending = null; }
    } else if (game.gameState === 'achievements') {
      if (e.code === 'Escape' || e.code === 'KeyA') game.gameState = 'title';
    } else if (game.gameState === 'settings') {
      if (e.code === 'Escape' || e.code === 'KeyT') game.gameState = 'title';
      else if (e.code === 'KeyN') game.gameState = 'account';
    }
    if (e.code === 'KeyM' && game.gameState !== 'nameentry' && game.gameState !== 'login') toggleMute();
    if (e.code === 'KeyF' && game.gameState !== 'nameentry' && game.gameState !== 'login') toggleSfx();
    if (e.code === 'Enter') handleConfirm();
    if (e.code === 'Space' && game.gameState === 'playing') castAbility();
    if (e.code === 'KeyP' || e.code === 'Escape') {
      if (game.gameState === 'playing') game.gameState = 'paused';
      else if (game.gameState === 'paused') game.gameState = 'playing';
    }
    if (stateAtStart === 'classselect' && game.gameState === 'classselect') {
      var classKeys = { Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3, Numpad1: 0, Numpad2: 1, Numpad3: 2, Numpad4: 3 };
      if (e.code in classKeys) selectClassByIndex(classKeys[e.code]);
    }
    // Prevent arrow keys / space scrolling the page.
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].indexOf(e.code) !== -1) {
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', function (e) { keys[e.code] = false; });

  function toGameCoords(clientX, clientY) {
    return {
      x: (clientX - offsetX) / scale,
      y: (clientY - offsetY) / scale
    };
  }

  canvas.addEventListener('mousemove', function (e) {
    var p = toGameCoords(e.clientX, e.clientY);
    mouse.x = p.x; mouse.y = p.y;
  });

  canvas.addEventListener('mousedown', ensureAudio);

  // ----- touch controls: drag anywhere = virtual joystick, tap = confirm -----
  var touchCtl = { active: false, id: null, ox: 0, oy: 0, vx: 0, vy: 0, moved: false };

  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    ensureAudio();
    if (touchCtl.active) return;
    var t = e.changedTouches[0];
    var p = toGameCoords(t.clientX, t.clientY);
    mouse.x = p.x; mouse.y = p.y;
    // ability button (or the right-thumb corner zone) eats the touch —
    // don't start a joystick on it
    if (overAbilityBtn(p) || overThumbCast(p)) { castAbility(); return; }
    touchCtl.active = true;
    touchCtl.id = t.identifier;
    touchCtl.ox = p.x; touchCtl.oy = p.y;
    touchCtl.vx = 0; touchCtl.vy = 0;
    touchCtl.moved = false;
  }, { passive: false });

  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier !== touchCtl.id) continue;
      var p = toGameCoords(t.clientX, t.clientY);
      var dx = (p.x - touchCtl.ox) / 28, dy = (p.y - touchCtl.oy) / 28;
      var len = Math.sqrt(dx * dx + dy * dy);
      if (len > 1) { dx /= len; dy /= len; }
      if (len > 0.2) touchCtl.moved = true;
      touchCtl.vx = dx; touchCtl.vy = dy;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function (e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (t.identifier !== touchCtl.id) continue;
      var wasTap = !touchCtl.moved;
      touchCtl.active = false;
      touchCtl.vx = 0; touchCtl.vy = 0;
      if (wasTap) {
        // taps act like clicks on every non-playing screen
        var p = toGameCoords(t.clientX, t.clientY);
        mouse.x = p.x; mouse.y = p.y;
        handlePointerAt(p);
      }
    }
  }, { passive: false });

  canvas.addEventListener('click', function (e) {
    ensureAudio();
    var p = toGameCoords(e.clientX, e.clientY);
    mouse.x = p.x; mouse.y = p.y;
    handlePointerAt(p);
  });

  function handlePointerAt(p) {
    // shared back button (top-left) on every menu screen
    if (BACK_STATES[game.gameState] &&
        p.x >= BACK_BTN.x && p.x <= BACK_BTN.x + BACK_BTN.w &&
        p.y >= BACK_BTN.y && p.y <= BACK_BTN.y + BACK_BTN.h) {
      goBack();
      return;
    }
    if (game.gameState === 'title') {
      // glowing SHOP icon
      if ((p.x - SHOP_ICON.cx) * (p.x - SHOP_ICON.cx) + (p.y - SHOP_ICON.cy) * (p.y - SHOP_ICON.cy) <= (SHOP_ICON.r + 5) * (SHOP_ICON.r + 5)) {
        openWardrobe('title');
        return;
      }
      var btns = titleButtons();
      for (var bi = 0; bi < btns.length; bi++) {
        var b = btns[bi];
        if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
          titleButtonAction(b.id);
          return;
        }
      }
      // leaderboard tabs: left = all-time, right of it = daily
      if (p.x >= LB_PANEL.x && p.x <= LB_PANEL.x + LB_PANEL.w &&
          p.y >= LB_PANEL.y && p.y <= LB_PANEL.y + 16) {
        var wantDaily = p.x >= LB_PANEL.x + 78 && p.x <= LB_PANEL.x + 138;
        var wantAll = p.x < LB_PANEL.x + 78;
        if ((wantDaily && leaderboard.mode !== 'daily') || (wantAll && leaderboard.mode === 'daily')) {
          leaderboard.mode = wantDaily ? 'daily' : 'normal';
          leaderboard.state = 'idle';
          maybeRefreshLeaderboard();
        }
      }
    } else if (game.gameState === 'gameover' || game.gameState === 'nameentry' ||
               game.gameState === 'accountinfo' || game.gameState === 'login') {
      handleConfirm();
    } else if (game.gameState === 'settings') {
      var sbtns = settingsButtons();
      for (var sb = 0; sb < sbtns.length; sb++) {
        var sbtn = sbtns[sb];
        if (p.x >= sbtn.x && p.x <= sbtn.x + sbtn.w && p.y >= sbtn.y && p.y <= sbtn.y + sbtn.h) {
          if (sbtn.id === 'name') game.gameState = 'account';
          else if (sbtn.id === 'music') toggleMute();
          else if (sbtn.id === 'sfx') toggleSfx();
          return;
        }
      }
      game.gameState = 'title';
    } else if (game.gameState === 'account') {
      for (var ab = 0; ab < ACCOUNT_BTNS.length; ab++) {
        var abtn = ACCOUNT_BTNS[ab];
        if (p.x >= abtn.x && p.x <= abtn.x + abtn.w && p.y >= abtn.y && p.y <= abtn.y + abtn.h) {
          if (abtn.id === 'newacct') { enterNameEntry('title'); }
          else { enterLogin(); }
          return;
        }
      }
      game.gameState = 'title';
    } else if (game.gameState === 'levelup') {
      tryPickCard(p.x, p.y);
    } else if (game.gameState === 'ascend') {
      tryPickAscend(p.x, p.y);
    } else if (game.gameState === 'classselect') {
      tryPickClass(p.x, p.y);
    } else if (game.gameState === 'playing') {
      if (overAbilityBtn(p)) { castAbility(); return; }
      // pause button hit-box (top-right, under the score column)
      if (p.x >= W - 24 && p.x <= W - 4 && p.y >= 32 && p.y <= 52) {
        game.gameState = 'paused';
      } else if (p.x >= W - 24 && p.x <= W - 4 && p.y >= 54 && p.y <= 74) {
        toggleAllSound();
      }
    } else if (game.gameState === 'paused') {
      if (p.x >= W - 24 && p.x <= W - 4 && p.y >= 54 && p.y <= 74) toggleAllSound();
      else game.gameState = 'playing';
    } else if (game.gameState === 'shop') {
      var acted = false;
      for (var sr = 0; sr < SHOP_ITEMS.length; sr++) {
        var rr = shopRowRect(sr), ur = shopUpgradeRect(sr);
        if (p.x >= ur.x && p.x <= ur.x + ur.w && p.y >= ur.y && p.y <= ur.y + ur.h) {
          tryBuyShopItem(sr); acted = true; break;   // right button = upgrade
        }
        if (p.x >= rr.x && p.x <= rr.x + rr.w && p.y >= rr.y && p.y <= rr.y + rr.h) {
          toggleTomeEquip(sr); acted = true; break;  // rest of row = equip toggle
        }
      }
      if (!acted && p.y > 230) game.gameState = 'title';
    } else if (game.gameState === 'wardrobe') {
      // character selector tabs
      var tabW = 108, gap = 6, total = CLASSES.length * tabW + (CLASSES.length - 1) * gap;
      var tx0 = (W - total) / 2, tHit = false;
      for (var wc = 0; wc < CLASSES.length; wc++) {
        var tx = tx0 + wc * (tabW + gap);
        if (p.x >= tx && p.x <= tx + tabW && p.y >= 44 && p.y <= 64) {
          wardrobeClass = CLASSES[wc].id; wardrobeScroll = 0; skinPending = null; tHit = true; break;
        }
      }
      if (!tHit) {
        var slist = SKINS[wardrobeClass] || [], sHit = false;
        for (var sk = 0; sk < slist.length; sk++) {
          var scr = skinCardRect(sk);
          if (p.x >= scr.x && p.x <= scr.x + scr.w && p.y >= scr.y && p.y <= scr.y + scr.h) {
            selectSkin(wardrobeClass, slist[sk].id); sHit = true; break;
          }
        }
        if (!sHit && p.y > 244) game.gameState = wardrobeFrom === 'classselect' ? 'classselect' : 'title';
      }
    } else if (game.gameState === 'modeselect') {
      for (var mc = 0; mc < MODE_CARDS.length; mc++) {
        var mcard = MODE_CARDS[mc];
        if (p.x >= mcard.x && p.x <= mcard.x + mcard.w && p.y >= mcard.y && p.y <= mcard.y + mcard.h) {
          startModeGate(mcard.id);
          return;
        }
      }
    } else if (game.gameState === 'achievements' || game.gameState === 'codex') {
      game.gameState = 'title';
    } else if (game.gameState === 'feedback') {
      for (var fb = 0; fb < FEEDBACK_BTNS.length; fb++) {
        var fbtn = FEEDBACK_BTNS[fb];
        if (p.x >= fbtn.x && p.x <= fbtn.x + fbtn.w && p.y >= fbtn.y && p.y <= fbtn.y + fbtn.h) {
          if (fbtn.id === 'rate') window.open(ITCH_URL, '_blank');
          game.gameState = 'title';
          maybeRefreshLeaderboard();
          return;
        }
      }
    }
  }

  var nameDraft = '';

  var pendingMode = 'normal'; // 'daily' when started via the daily challenge key

  // Enter the initials screen from a user gesture, raising the mobile keyboard.
  function enterNameEntry(after) {
    nameDraft = '';
    afterName = after;
    game.gameState = 'nameentry';
    focusNameInput();
  }

  // Enter the login screen from a user gesture, raising the mobile keyboard.
  function enterLogin() {
    loginForm.buf = '';
    loginForm.state = 'idle';
    game.gameState = 'login';
    focusHiddenInput(loginInput, '');
  }

  function finishNameStep() {
    if (afterName === 'play') enterClassSelect();
    else game.gameState = 'title';
  }

  function handleConfirm() {
    if (game.gameState === 'shop' || game.gameState === 'achievements' ||
        game.gameState === 'account' || game.gameState === 'codex' ||
        game.gameState === 'settings') {
      game.gameState = 'title';
      return;
    }
    if (game.gameState === 'feedback') {
      window.open(ITCH_URL, '_blank');
      game.gameState = 'title';
      maybeRefreshLeaderboard();
      return;
    }
    if (game.gameState === 'title') {
      game.gameState = 'modeselect';
    } else if (game.gameState === 'modeselect') {
      startModeGate('normal'); // Enter = quick-start a standard run
    } else if (game.gameState === 'nameentry') {
      if (nameDraft.length === 3) {
        runData.name = nameDraft;
        // a fresh name means a fresh account
        runData.playerDisc = '';
        runData.playerSecret = '';
        runData.playerId = '';
        saveRunData();
        game.gameState = 'accountinfo';
        registerAccount(false);
      }
    } else if (game.gameState === 'accountinfo') {
      if (account.state === 'created' || account.state === 'error') finishNameStep();
    } else if (game.gameState === 'login') {
      if (loginForm.buf.length === 15 && loginForm.state !== 'checking') submitLogin();
    } else if (game.gameState === 'gameover') {
      if (!runData.seenFeedbackPrompt && runData.totalRuns >= 1) {
        runData.seenFeedbackPrompt = true;
        saveRunData();
        game.gameState = 'feedback';
      } else {
        game.gameState = 'title';
        maybeRefreshLeaderboard();
      }
    }
  }

      skin: '#ff5a3a', shot: '#ff7a2a',
      wallFill: '#3a2626', wallAlt: '#402a28', wallBorder: '#7a4033', wallShadow: '#241414' },

  // 1-40: the four biome chapters; 41-50: THE VAULT (boss biome);
  // 51+: back into the catacombs for the endless waves.
  function currentBiome() {
    var w = game.wave || 1;
    if (w > 50) return BIOMES[0];
    if (w > 40) return BIOMES[4];
    return BIOMES[Math.floor((w - 1) / 10) % 4];
  }

  var floorTiles = [];
  function buildFloor() {
    floorTiles = [];
    var cols = Math.ceil(W / TILE_SIZE);
    var rows = Math.ceil(H / TILE_SIZE);
    for (var ry = 0; ry < rows; ry++) {
      for (var rx = 0; rx < cols; rx++) {
        var r = Math.random();
        var variant = 0;            // normal floor
        if (r < 0.12) variant = 1;  // shadow/dark tile
        else if (r < 0.20) variant = 2; // alt floor
        // procedural grey shade variation
        var shade = randInt(36, 52);
        floorTiles.push({ x: rx * TILE_SIZE, y: ry * TILE_SIZE, variant: variant, shade: shade });
      }
    }
  }
  buildFloor();

  // Buy the next level of a tome with coins.
  function tryBuyShopItem(idx) {
    var item = SHOP_ITEMS[idx];
    if (!item) return;
    var lvl = runData.shop[item.id] || 0;
    if (lvl >= 5) return;
    var price = SHOP_PRICES[lvl];
    if (runData.coins < price) return;
    runData.coins -= price;
    runData.shop[item.id] = lvl + 1;
    // first level bought auto-equips it if there's a free slot (nice default)
    if (lvl === 0 && runData.equippedTomes.indexOf(item.id) === -1 &&
        runData.equippedTomes.length < MAX_EQUIPPED_TOMES) {
      runData.equippedTomes.push(item.id);
    }
    saveRunData();
    playPickup();
  }

  function isTomeEquipped(id) {
    return runData.equippedTomes.indexOf(id) !== -1;
  }

  // Equipped tome level (0 if not equipped, or in Daily where tomes are off for
  // a level playing field). Used everywhere a tome bonus is applied.
  function tomeLevel(id) {
    if (game.mode === 'daily') return 0;
    return isTomeEquipped(id) ? (runData.shop[id] || 0) : 0;
  }

  function hexToRgba(hex, a) {
    var h = hex.replace('#', '');
    var r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  // ---- hero skins ----
  function skinOwned(id) {
    // default skins are always owned/free
    return id.indexOf('_default') !== -1 || !!runData.skinsOwned[id];
  }
  function equippedSkinId(classId) {
    return runData.equippedSkins[classId] || (classId + '_default');
  }
  function skinById(classId, id) {
    var list = SKINS[classId] || [];
    for (var i = 0; i < list.length; i++) if (list[i].id === id) return list[i];
    return list[0];
  }
  function epicUnlocked() { return (runData.bestWave || 1) >= EPIC_SKIN_WAVE; }

  // The chroma tint colour for epic skins, morphing hue over time.
  function chromaColor() {
    return 'hsl(' + Math.floor((game.time * 90) % 360) + ',95%,58%)';
  }

  // Buy (two-tap confirm), equip, or report why a skin can't be selected.
  function selectSkin(classId, id) {
    var skin = skinById(classId, id);
    if (!skin) return;
    if (skinOwned(id)) {
      skinPending = null;
      runData.equippedSkins[classId] = id;
      saveRunData();
      playPickup();
      return;
    }
    if (skin.tier === 'epic' && !epicUnlocked()) {
      skinPending = null;
      game.toasts.push({ txt: 'REACH WAVE ' + EPIC_SKIN_WAVE + ' TO UNLOCK', t: 0 });
      return;
    }
    if (skinPending === id) {
      skinPending = null;
      if (runData.coins >= skin.price) {
        runData.coins -= skin.price;
        runData.skinsOwned[id] = true;
        runData.equippedSkins[classId] = id; // equip on purchase
        saveRunData();
        game.toasts.push({ txt: skin.name + ' UNLOCKED!', t: 0 });
      } else {
        game.toasts.push({ txt: 'NEED ' + skin.price + ' COINS (HAVE ' + Math.round(runData.coins) + ')', t: 0 });
      }
    } else if (runData.coins >= skin.price) {
      skinPending = id;
    } else {
      game.toasts.push({ txt: 'NEED ' + skin.price + ' COINS (HAVE ' + Math.round(runData.coins) + ')', t: 0 });
    }
  }

  // Toggle a tome in/out of the 3-slot loadout. Returns a message for the UI.
  function toggleTomeEquip(idx) {
    var item = SHOP_ITEMS[idx];
    if (!item) return;
    var pos = runData.equippedTomes.indexOf(item.id);
    if (pos !== -1) {
      runData.equippedTomes.splice(pos, 1);
      saveRunData();
      return;
    }
    if ((runData.shop[item.id] || 0) < 1) {
      game.toasts.push({ txt: 'UPGRADE THIS TOME FIRST', t: 0 });
      return;
    }
    if (runData.equippedTomes.length >= MAX_EQUIPPED_TOMES) {
      game.toasts.push({ txt: 'MAX ' + MAX_EQUIPPED_TOMES + ' TOMES — UNEQUIP ONE', t: 0 });
      return;
    }
    runData.equippedTomes.push(item.id);
    saveRunData();
  }

  // ---------------------------------------------------------------------------
  // PROCEDURAL DUNGEON WALLS (seeded per wave — same wave, same layout)
  // ---------------------------------------------------------------------------
  var walls = [];

  function generateWalls(waveNumber) {
    // seed MUST be re-derived from the wave number on every call so layouts
    // are reproducible — never reuse leftover PRNG state from a prior wave.
    // Daily challenge: everyone gets the same layouts for the same date.
    var daySalt = 0;
    if (game.mode === 'daily') {
      var d = todayISO();
      daySalt = (parseInt(d.slice(0, 4), 10) * 372 + parseInt(d.slice(5, 7), 10) * 31 +
                 parseInt(d.slice(8, 10), 10)) * 7919;
    }
    var seed = waveNumber * 9301 + 49297 + daySalt;
    var srand = function () { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    var sizes = [[32, 32], [32, 64], [64, 32]];
    var count = 8 + Math.floor(srand() * 5); // 8..12 chunks
    var out = [];
    for (var i = 0; i < count; i++) {
      for (var attempt = 0; attempt < 10; attempt++) {
        var size = sizes[Math.floor(srand() * 3)];
        var cw = size[0], ch = size[1];
        var x = Math.round(30 + srand() * (W - 60 - cw));
        var y = Math.round(30 + srand() * (H - 60 - ch));
        // keep clear of the player spawn at canvas centre (80px radius)
        var nx = clamp(W / 2, x, x + cw), ny = clamp(H / 2, y, y + ch);
        var cdx = W / 2 - nx, cdy = H / 2 - ny;
        if (cdx * cdx + cdy * cdy < 80 * 80) continue;
        // no overlap with already-placed walls
        var hit = false;
        for (var j = 0; j < out.length; j++) {
          var o = out[j];
          if (x < o.x + o.w && x + cw > o.x && y < o.y + o.h && y + ch > o.y) { hit = true; break; }
        }
        if (hit) continue;
        // each biome's special blocks behave differently (waves <= 50; the
        // endless crypt is solid):
        //   1-10  BRICK  breakable, 3 hits
        //   11-20 SAND   soft mound — wade through at half speed
        //   21-30 ICE    brittle, 2 hits; shattering chills nearby foes
        //   31-40 MAGMA  solid, sears anyone pressed against it
        //   41-50 GILDED tough (4 hits) but always drops loot
        var kind = null;
        if (waveNumber <= 50 && srand() < 0.3) {
          var bIdx = waveNumber > 40 ? 4 : Math.floor((waveNumber - 1) / 10) % 4;
          kind = ['brick', 'sand', 'ice', 'magma', 'gilded'][bIdx];
        }
        var wObj = { x: x, y: y, w: cw, h: ch, tileVariant: Math.floor(srand() * 2), kind: kind };
        if (kind === 'brick')  { wObj.breakable = true; wObj.bhp = 3; }
        else if (kind === 'ice')    { wObj.breakable = true; wObj.bhp = 2; }
        else if (kind === 'gilded') { wObj.breakable = true; wObj.bhp = 4; }
        else if (kind === 'sand')   { wObj.soft = true; }
        else if (kind === 'magma')  { wObj.magma = true; }
        out.push(wObj);
        break;
      }
    }
    return out;
  }

  // First wall intersecting a centred box, or null. Soft sand mounds never
  // block anything — they slow instead (see softAt).
  function boxHitsWall(cx, cy, bw, bh) {
    var l = cx - bw / 2, r = cx + bw / 2, t = cy - bh / 2, b = cy + bh / 2;
    for (var i = 0; i < walls.length; i++) {
      var wl = walls[i];
      if (wl.soft) continue;
      if (l < wl.x + wl.w && r > wl.x && t < wl.y + wl.h && b > wl.y) return wl;
    }
    return null;
  }

  // Is the box wading through a soft sand mound?
  function softAt(cx, cy, bw, bh) {
    var l = cx - bw / 2, r = cx + bw / 2, t = cy - bh / 2, b = cy + bh / 2;
    for (var i = 0; i < walls.length; i++) {
      var wl = walls[i];
      if (wl.soft && l < wl.x + wl.w && r > wl.x && t < wl.y + wl.h && b > wl.y) return true;
    }
    return false;
  }

  // Nudge an entity out of any wall it overlaps (used when a new wave's wall
  // layout lands on top of carried-over enemies or the player).
  function pushOutOfWalls(ent) {
    for (var tries = 0; tries < 4; tries++) {
      var wl = boxHitsWall(ent.x, ent.y, ent.w, ent.h);
      if (!wl) return;
      var dl = (ent.x + ent.w / 2) - wl.x;
      var dr = (wl.x + wl.w) - (ent.x - ent.w / 2);
      var du = (ent.y + ent.h / 2) - wl.y;
      var dd = (wl.y + wl.h) - (ent.y - ent.h / 2);
      var m = Math.min(dl, dr, du, dd);
      if (m === dl) ent.x -= dl + 1;
      else if (m === dr) ent.x += dr + 1;
      else if (m === du) ent.y -= du + 1;
      else ent.y += dd + 1;
      ent.x = clamp(ent.x, ent.w / 2, W - ent.w / 2);
      ent.y = clamp(ent.y, ent.h / 2, H - ent.h / 2);
    }
  }

  // Rebuild the orbiting-shield orbs from the current shield level.
  function rebuildOrbs() {
    var p = game.player;
    var count = 4 + p.shield;                              // 1st pick = 5 orbs, +1 each after
    if (p.bladeOrbit) count += 2;                          // evolution: +2 orbs
    p.orbSpeed = (190 + (p.shield - 1) * 35) * Math.PI / 180; // 190deg/s, +35 per extra pick
    if (p.bladeOrbit) p.orbSpeed *= 1.5;                   // evolution: faster spin
    var orbs = [];
    for (var i = 0; i < count; i++) {
      orbs.push({ angle: (Math.PI * 2 / count) * i, x: p.x, y: p.y, hitCd: {} });
    }
    p.orbs = orbs;
    p.orbRadius = 40;
  }

  function startGame() {
    game.particles = [];
    game.xp = 0;
    game.level = 1;
    game.score = 0;
    game.damageFlash = 0;
    game.shakeTimer = 0;
    game.whiteFlash = 0;
    game.time = 0;
    game.enemyUid = 0;
    game.advanceAfterLevel = false;
    game.newRecord = false;
    game.enemyShots = [];
    game.waveBanner = 0;
    game.endlessBanner = 0;
    game.curseHpMult = 1;
    game.curseSpeedMult = 1;
    game.cultistLevel = 0;
    game.dmgDealt = 0;
    game.dmgBySource = {};
    game.floatTexts = [];
    game.pickups = [];
    game.hitStop = 0;
    game.zaps = [];
    game.beams = [];
    game.zones = [];
    game.pactBooms = [];
    game.spawnHaste = 1;
    game.freezeTimer = 0;
    game.coinsEarned = 0;
    game.tookDamage = false;
    game.mode = pendingMode;
    pendingMode = 'normal';
    leaderboard.submitState = '';
    game.player = makePlayer();
    // every run starts with the chosen class's stats
    var cls = classDef(currentClass);
    var pl = game.player;
    pl.maxHp = cls.hp; pl.hp = cls.hp;
    pl.speed = cls.speed;
    pl.damage = cls.damage;
    pl.attackCooldown = cls.cooldown;
    pl.pierce = cls.pierce;
    pl.homingBase = cls.homingBase;
    if (cls.shotSpeed) pl.shotSpeed = cls.shotSpeed; // ranger: fast arrows
    // equipped tomes on top of class stats (only the 3 equipped apply; none in Daily)
    pl.maxHp += 20 * tomeLevel('vit'); pl.hp = pl.maxHp;
    pl.damage = Math.round(pl.damage * (1 + 0.1 * tomeLevel('mig')));
    pl.speed += 5 * tomeLevel('swf');
    pl.xpMult *= (1 + 0.1 * tomeLevel('wis'));
    buildFloor();
    beginWave(1);
    setMusicTrack(combatTrackName());
  }

  // Set up a wave. Wave 1 gets the frozen 2-second intro card; later waves
  // flow continuously — surviving enemies carry over and a banner fades in.
  function beginWave(n) {
    // achievements that resolve on wave boundaries
    if (n > 2 && !game.tookDamage) unlockAch('untouchable');
    game.tookDamage = false;
    if (n >= 5) unlockAch('wave_5');
    if (n >= 10) unlockAch('wave_10');
    game.wave = n;
    game.bossWave = (n % 10 === 0); // bosses are biome finales (10/20/30...)
    // the Keeper has fallen: the crypt opens into the endless waves
    if (n === 51) game.endlessBanner = 5;
    // crossing into a new biome swaps the doom track (no-op mid-biome)
    if (music.playing) setMusicTrack(combatTrackName());
    game.boss = null;
    game.waveKills = 0;
    game.waveTarget = game.bossWave ? 1 : (15 + n * 5);
    game.spawnTimer = 0;
    game.shockwaves = [];
    walls = generateWalls(n);
    bgDirty = true; // new wall layout (and possibly biome) — recache the background
    // free anything the new wall layout trapped, and reset edge flags
    for (var ce = 0; ce < game.enemies.length; ce++) {
      pushOutOfWalls(game.enemies[ce]);
      game.enemies[ce].atEdge = false;
      game.enemies[ce].edgeTimer = 0;
    }
    if (game.player) pushOutOfWalls(game.player);
    if (n === 1) {
      game.enemies = [];
      game.projectiles = [];
      game.enemyShots = [];
      game.gameState = 'waveintro';
      game.waveIntroTimer = 2.0;
    } else {
      game.waveBanner = 2.0;
      game.gameState = 'playing';
      // no wave-transition heal — HP only changes from combat, pickups and upgrades
      if (game.bossWave) spawnBoss();
    }
  }

  // ---------------------------------------------------------------------------
  // ENEMY FACTORY
  // ---------------------------------------------------------------------------
  function enemyTypeForWave(wave) {
    var roll = Math.random();
    if (wave >= 5 && roll < 0.10) return 'wraith';
    if (wave >= 3 && roll < 0.22) return 'bomber';
    if (wave >= 2 && roll < 0.36) return 'splitter';
    if (wave >= 6 && roll < 0.44) return 'caster'; // the biome's ranged menace
    if (wave >= 4 && roll < 0.55) return 'orc';
    if (roll < 0.75) return 'skeleton';
    return 'slime';
  }

  var ENEMY_DATA = {
    skeleton: { hp: 30, color: '#8b9bb4', tile: TILE.skeleton },
    slime:    { hp: 50, color: '#43e1b3', tile: TILE.slime },
    orc:      { hp: 120, color: '#e84537', tile: TILE.orc },
    cultist:  { hp: 45, color: '#9b59b6', tile: TILE.skeleton },
    caster:   { hp: 40, color: '#b06ce8', tile: TILE.skeleton }, // biome mage: archer/spitter/ice mage/fire imp
    splitter: { hp: 70, color: '#7ad9a8', tile: TILE.slime },     // splits into minis
    mini:     { hp: 16, color: '#43e1b3', tile: TILE.slime },     // splitter offspring
    bomber:   { hp: 35, color: '#ff7733', tile: TILE.orc },       // suicide explosion
    wraith:   { hp: 25, color: '#ccccff', tile: { x: 16, y: 160 } } // ghost: ignores walls
  };

  function spawnEnemy() {
    if (game.enemies.length >= 200) return;
    var type = enemyTypeForWave(game.wave);
    // Dark Pact curse: ranged cultists join the spawn pool
    if (game.cultistLevel > 0 && Math.random() < 0.08 + 0.05 * game.cultistLevel) {
      type = 'cultist';
    }
    var data = ENEMY_DATA[type];
    // pick an edge (not corners): bias spawn away from exact corners
    var edge = randInt(0, 3);
    var x, y;
    if (edge === 0) { x = rand(20, W - 20); y = -16; }          // top
    else if (edge === 1) { x = W + 16; y = rand(20, H - 20); }  // right
    else if (edge === 2) { x = rand(20, W - 20); y = H + 16; }  // bottom
    else { x = -16; y = rand(20, H - 20); }                     // left

    spawnEnemyAt(type, x, y);
  }

  function spawnEnemyAt(type, x, y) {
    var data = ENEMY_DATA[type];
    // early-game ease: 5% softer at wave 1, fading to full by wave 6
    var ease = 1 - Math.max(0, 6 - game.wave) * 0.01;
    // difficulty scaling: +30% HP per wave (plus curses), faster, harder hits
    var hp = Math.round(data.hp * (1 + (game.wave - 1) * 0.3) * game.curseHpMult * ease);
    var speed = (40 + game.wave * 6) * game.curseSpeedMult * ease;
    var size = 14;
    if (type === 'cultist') speed *= 0.8;
    if (type === 'caster') speed *= 0.75;
    if (type === 'wraith') { speed *= 1.35; size = 12; }
    if (type === 'bomber') speed *= 1.15;
    if (type === 'splitter') { speed *= 0.8; size = 16; }
    if (type === 'mini') { speed *= 1.2; size = 10; }
    // cap: past this, enemies overshoot the player every frame and turn
    // into invisible ballistic ghosts (the wave-144 "spawning stopped" bug)
    speed = Math.min(speed, 300);
    var e = {
      type: type, isBoss: false, uid: game.enemyUid++,
      x: x, y: y,
      w: size, h: size,
      hp: hp, maxHp: hp,
      // XP follows base hp, not the scaled value, so curses/waves don't
      // feed the player more XP for the same kill
      xpVal: (data.hp / 5) * (1 + (game.wave - 1) * 0.1),
      color: data.color,
      tile: data.tile,
      speed: speed,
      contact: 10 + Math.floor(game.wave / 3) * 3,
      shootTimer: rand(1.0, 2.0),
      fuse: -1,            // bomber: countdown once armed
      elite: false,
      kx: 0, ky: 0,        // knockback velocity
      hitFlash: 0,
      animPhase: rand(0, Math.PI * 2)
    };
    // biome dress code: melee families wear the biome's palette as a wash,
    // the caster wears it boldly and fires bolts in the biome's colour
    var eB = currentBiome();
    if (type === 'caster') {
      e.skinTint = eB.skin || '#b06ce8';
      e.skinAlpha = 0.55;
      e.shotCol = eB.shot;
    } else if (eB.skin && (type === 'skeleton' || type === 'slime' || type === 'orc' ||
               type === 'splitter' || type === 'mini')) {
      e.skinTint = eB.skin;
      e.skinAlpha = 0.30;
    }
    // elite roll: rare gold-ringed variant, triple HP, juicy XP
    if (game.wave >= 3 && type !== 'mini' && Math.random() < 0.06) {
      e.elite = true;
      e.hp = e.maxHp = e.hp * 3;
      e.xpVal *= 2.5;
      e.speed *= 1.05;
      e.contact += 5;
      e.w += 2; e.h += 2;
    }
    // mid-screen spawns (summoner minions, splitter minis) must not start
    // inside a wall, or they would be stuck on both axes forever
    pushOutOfWalls(e);
    game.enemies.push(e);
    return e;
  }

  // Spawn a single boss from the top-centre of the canvas. Three kinds rotate
  // by boss number, each with its own name, sprite, size and signature move:
  //   charger  → THE WARDEN      (plumed knight; the dash ends in a radial slam)
  //   summoner → THE NECROMANCER (robed lich; alternates summons and soul volleys)
  //   spiral   → THE REVENANT    (giant ghost; phases walls, blinks to the player)
  var BOSS_KINDS = ['charger', 'summoner', 'spiral'];
  var BOSS_DEFS = {
    charger:  { name: 'THE WARDEN',      color: '#ffd700', tile: TILE.bossWarden,   size: 26, draw: 30, speed: 22 },
    summoner: { name: 'THE NECROMANCER', color: '#b06ce8', tile: null,              size: 30, draw: 36, speed: 28 },
    spiral:   { name: 'THE REVENANT',    color: '#7fe8dd', tile: TILE.bossRevenant, size: 24, draw: 32, speed: 30, ghost: true },
    // wave 50 finale: rotates every signature move, enrages below half HP
    keeper:   { name: 'THE VAULT KEEPER', color: '#c9a227', tile: null,             size: 34, draw: 46, speed: 26 }
  };

  function spawnBoss() {
    var kind = game.wave === 50 ? 'keeper'
             : BOSS_KINDS[(Math.round(game.wave / 10) - 1 + 300) % 3];
    var def = BOSS_DEFS[kind];
    // 1.3x: biome-finale bosses hit the end of a 10-wave arc, so they get a
    // little extra bulk over the old every-5 cadence
    var hp = Math.round((600 + game.wave * 80) * 1.3 * game.curseHpMult);
    if (kind === 'keeper') hp = Math.round(hp * 2.2); // the run's true wall
    var boss = {
      type: 'boss', isBoss: true, kind: kind, uid: game.enemyUid++,
      name: def.name, drawSize: def.draw, ghost: !!def.ghost,
      x: W / 2, y: -20,
      w: def.size, h: def.size,
      hp: hp, maxHp: hp,
      color: def.color,
      tile: def.tile,
      speed: def.speed,
      contact: 25,
      aiTimer: 3,          // time until next special (dash/summon/ring)
      dashTimer: 0,        // charger: remaining dash time
      dashVx: 0, dashVy: 0,
      telegraph: 0,        // charger: wind-up before the dash
      blinkTimer: 6,       // revenant: time until the next blink
      blinkPhase: 0,       // revenant: fading out pre-teleport while > 0
      volley: false,       // necromancer: alternates soul volley / summons
      kx: 0, ky: 0,
      hitFlash: 0,
      animPhase: 0
    };
    game.enemies.push(boss);
    game.boss = boss;
  }

  // ---------------------------------------------------------------------------
  // PARTICLES
  // ---------------------------------------------------------------------------
  function spawnDeathParticles(x, y, color) {
    for (var i = 0; i < 8; i++) {
      if (game.particles.length >= 500) break;
      var ang = (Math.PI * 2 / 8) * i + rand(-0.3, 0.3);
      var spd = rand(40, 110);
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0.5, maxLife: 0.5,
        size: 2,
        color: color
      });
    }
  }

  // Floating combat text (damage numbers, heals, pickups).
  function spawnFloatText(x, y, txt, color) {
    if (game.floatTexts.length >= 80) return;
    game.floatTexts.push({ x: x + rand(-4, 4), y: y - 8, txt: txt, color: color, t: 0, life: 0.55 });
  }

  // Small grey sparks where a projectile strikes a wall.
  function spawnWallSparks(x, y) {
    for (var i = 0; i < 3; i++) {
      if (game.particles.length >= 500) break;
      var ang = rand(0, Math.PI * 2);
      var spd = rand(30, 70);
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0.3, maxLife: 0.3,
        size: 2,
        color: '#99a3ad'
      });
    }
  }

  // Over-the-top boss death burst: 40 red/orange/gold 3x3 particles.
  function bossExplosion(x, y) {
    var cols = ['#ff2d2d', '#ff8c00', '#ffd700'];
    for (var i = 0; i < 40; i++) {
      if (game.particles.length >= 500) break;
      var ang = rand(0, Math.PI * 2);
      var spd = rand(100, 300);
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1.2, maxLife: 1.2,
        size: 3,
        color: cols[randInt(0, 2)]
      });
    }
  }

  // ---------------------------------------------------------------------------
  // SHOOTING
  // ---------------------------------------------------------------------------
  function findNearestEnemy(px, py) {
    var best = null, bestD = Infinity;
    for (var i = 0; i < game.enemies.length; i++) {
      var e = game.enemies[i];
      var dx = e.x - px, dy = e.y - py;
      var d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; best = e; }
    }
    return best;
  }

  function spawnProjectile(p, ang, dmg) {
    // berserker passive: +35% damage while below half HP
    if (p.ascendancy && p.ascendancy.id === 'berserker' && p.hp < p.maxHp * 0.5) {
      dmg *= 1.35;
    }
    // crits: chance from Keen Edge/Assassin, multiplier from Executioner
    var crit = p.critChance > 0 && Math.random() < p.critChance;
    if (crit) dmg *= p.critMult;
    game.projectiles.push({
      x: p.x, y: p.y,
      vx: Math.cos(ang) * p.shotSpeed,
      vy: Math.sin(ang) * p.shotSpeed,
      damage: dmg,
      crit: crit,
      pierce: p.railgun ? 99 : p.pierce,
      // deathseeker evolution: crits ricochet to another foe
      bounces: (crit && p.deathseeker) ? 1 : p.ricochet,
      // homing strength: 0.08 base, +0.04 per extra pick; mage has an
      // innate 0.06 without the upgrade.
      homing: p.homing > 0 ? (0.08 + (p.homing - 1) * 0.04) : (p.homingBase || 0),
      hitSet: []
    });
  }

  function fireWeapon() {
    var p = game.player;
    var target = findNearestEnemy(p.x, p.y);
    if (!target) return;
    var baseAng = Math.atan2(target.y - p.y, target.x - p.x);

    // main fan (multishot)
    var n = p.projectiles;
    var spread = 15 * Math.PI / 180; // 15 degrees between shots
    for (var i = 0; i < n; i++) {
      spawnProjectile(p, baseAng + (i - (n - 1) / 2) * spread, p.damage);
    }

    // shotgun blast: 4 heavy knockback pellets over 50deg, +1 pellet & +10deg
    // per extra pick. Seeker Swarm evolution: +3 pellets at 0.85x.
    if (p.shotgun > 0) {
      var pellets = 4 + (p.shotgun - 1) + (p.seekerSwarm ? 3 : 0);
      var arc = (50 + (p.shotgun - 1) * 10) * Math.PI / 180;
      var pfac = p.seekerSwarm ? 0.85 : 0.75;
      for (var k = 0; k < pellets; k++) {
        var t = pellets > 1 ? (k / (pellets - 1) - 0.5) : 0;
        spawnProjectile(p, baseAng + t * arc, p.damage * pfac);
        var pel = game.projectiles[game.projectiles.length - 1];
        pel.kb = 1;      // pellets shove enemies back
        pel.fat = 1;     // and are drawn/collided fatter
      }
    }

    playShoot();
  }

  // ---------------------------------------------------------------------------
  // XP / LEVEL UP
  // ---------------------------------------------------------------------------
  // cheap first levels so the run gets going, steep later so it can't snowball
  function xpForNext() { return 30 + game.level * 45 + game.level * game.level * 8; }

  function gainXP(amount) {
    game.xp += amount;
    while (game.xp >= xpForNext()) {
      game.xp -= xpForNext();
      game.level++;
      triggerLevelUp();
    }
  }

  function triggerLevelUp() {
    game.gameState = 'levelup';
    playLevelUp();
    var taken = game.player.upgradesTaken;
    // an unlocked evolution is always offered (first card)
    var chosen = [];
    for (var ev = 0; ev < EVOLUTIONS.length && chosen.length === 0; ev++) {
      var evo = EVOLUTIONS[ev];
      var ready = !taken[evo.id];
      for (var nd = 0; nd < evo.needs.length; nd++) {
        if (!taken[evo.needs[nd]]) ready = false;
      }
      if (ready) chosen.push(evo);
    }
    // fill the remaining slots with distinct regular upgrades; maxed-out
    // cards leave the pool (marathon runs broke every uncapped multiplier)
    var pool = UPGRADES.filter(function (u) {
      return !u.cap || (taken[u.id] || 0) < u.cap;
    });
    while (chosen.length < 3 && pool.length > 0) {
      var idx = randInt(0, pool.length - 1);
      chosen.push(pool.splice(idx, 1)[0]);
    }
    // everything maxed: offer the endless trio so the draft never jams and
    // marathon levels stay a real heal-vs-damage-vs-crit decision
    if (chosen.length === 0) chosen = TRIBUTE_CARDS.slice();
    // build card rects
    var cardW = 120, cardH = 160, gap = 20;
    var totalW = chosen.length * cardW + (chosen.length - 1) * gap;
    var startX = (W - totalW) / 2;
    var cy = (H - cardH) / 2;
    game.cards = chosen.map(function (u, i) {
      return {
        upgrade: u,
        x: startX + i * (cardW + gap),
        y: cy,
        w: cardW, h: cardH
      };
    });
  }

  function applyUpgrade(u) {
    var p = game.player;
    p.upgradesTaken[u.id] = (p.upgradesTaken[u.id] || 0) + 1;
    switch (u.id) {
      // every upgrade carries a con; clamps keep heavy stacking survivable
      case 'multishot': p.projectiles = Math.min(5, p.projectiles + 1);
                        p.damage = Math.max(5, Math.round(p.damage * 0.88)); break;
      case 'atkspeed':  p.attackCooldown = Math.max(0.2, p.attackCooldown - 0.1);
                        p.shotSpeed = Math.max(100, Math.round(p.shotSpeed * 0.9)); break;
      case 'damage':    p.damage += 15;
                        p.attackCooldown = Math.min(1.6, p.attackCooldown + 0.05); break;
      case 'health':    p.maxHp += 30;
                        // heal half of what's missing — a real panic button
                        p.hp = Math.min(p.maxHp, p.hp + Math.round((p.maxHp - p.hp) * 0.5 * p.healMult));
                        p.speed = Math.max(40, p.speed - 5); break;
      case 'movespeed': p.speed += 20;
                        p.maxHp = Math.max(30, p.maxHp - 10);
                        p.hp = Math.min(p.hp, p.maxHp); break;
      case 'pierce':    p.pierce += 1;
                        p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
      case 'vampire':   p.vampire += 3;
                        p.maxHp = Math.max(30, p.maxHp - 15);
                        p.hp = Math.min(p.hp, p.maxHp); break;
      case 'xpmagnet':  p.xpMult = Math.min(3, p.xpMult * 1.2);
                        game.curseSpeedMult *= 1.04; break;
      case 'shotgun':   p.shotgun += 1;
                        p.attackCooldown = Math.min(1.6, p.attackCooldown + 0.1); break;
      case 'homing':    p.homing += 1;
                        p.shotSpeed = Math.max(100, Math.round(p.shotSpeed * 0.85)); break;
      case 'shield':    p.shield += 1; rebuildOrbs();
                        p.speed = Math.max(40, p.speed - 8); break;
      case 'frost':     p.frost += 1;
                        p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
      case 'crit':      p.critChance = Math.min(0.6, p.critChance + 0.10);
                        p.damage = Math.max(5, Math.round(p.damage * 0.95)); break;
      case 'armor':     p.armor = Math.min(0.5, p.armor + 0.10);
                        p.speed = Math.max(40, p.speed - 5); break;
      case 'static':    p.staticLvl += 1;
                        p.attackCooldown = Math.min(1.6, p.attackCooldown + 0.05); break;
      case 'velocity':  p.shotSpeed = Math.round(p.shotSpeed * 1.25);
                        p.maxHp = Math.max(30, p.maxHp - 10);
                        p.hp = Math.min(p.hp, p.maxHp); break;
      case 'heavyshot': p.projSize += 1;
                        p.attackCooldown = Math.min(1.6, p.attackCooldown + 0.05); break;
      // cursed upgrades — the downside is permanent for the rest of the run
      case 'lucky':       p.lucky += 1; game.curseHpMult *= 1.2; break;
      case 'darkpact':    p.pactLvl += 1; game.cultistLevel++; break;
      case 'executioner': p.critMult += 0.5; game.curseSpeedMult *= 1.10; break;
      case 'glasscannon': p.damage = Math.round(p.damage * 1.25);
                          p.maxHp = Math.max(30, p.maxHp - 20);
                          p.hp = Math.min(p.hp, p.maxHp); break;
      case 'hastepact': p.speed = Math.round(p.speed * 1.15);
                        p.attackCooldown = Math.max(0.2, p.attackCooldown * 0.87);
                        game.spawnHaste *= 1.15; break;
      case 'retribution': p.retribution += 1;
                        p.maxHp = Math.max(30, p.maxHp - 15);
                        p.hp = Math.min(p.hp, p.maxHp); break;
      // endless-run fallbacks: the pool is exhausted, small safe rewards
      case 'tribute':    p.hp = Math.min(p.maxHp, p.hp + Math.round(p.maxHp * 0.25 * p.healMult)); break;
      case 'bloodtithe': p.damage += 3; break;
      case 'deathsfavor':p.critChance = Math.min(0.9, p.critChance + 0.01); break;
      // evolutions
      case 'seekerswarm': p.seekerSwarm = 1;
                          p.shotSpeed = Math.max(100, Math.round(p.shotSpeed * 0.9)); break;
      case 'bladeorbit':  p.bladeOrbit = 1; rebuildOrbs();
                          p.speed = Math.max(40, p.speed - 5); break;
      case 'railgun':     p.railgun = 1; p.damage += 25;
                          p.attackCooldown = Math.min(1.9, p.attackCooldown + 0.3); break;
      case 'bulletstorm': p.bulletstorm = 1;
                          p.projectiles = Math.min(7, p.projectiles + 1);
                          p.attackCooldown = Math.max(0.15, p.attackCooldown - 0.1);
                          p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
      case 'deathseeker': p.deathseeker = 1;
                          p.critChance = Math.min(0.75, p.critChance + 0.15);
                          p.shotSpeed = Math.max(100, Math.round(p.shotSpeed * 0.9)); break;
    }
    // hard ceilings — no combination of stacks may break the simulation
    // (a level-3254 marathon proved every uncapped multiplier will be found)
    p.speed = Math.min(p.speed, 250);
    game.curseSpeedMult = Math.min(game.curseSpeedMult, 2.5);
    game.curseHpMult = Math.min(game.curseHpMult, 10);
    game.spawnHaste = Math.min(game.spawnHaste, 3);
    if (u.evolution) unlockAch('evolved');
    if (u.cursed) {
      var curses = 0;
      var cursedIds = ['lucky', 'darkpact', 'executioner', 'glasscannon'];
      for (var ci = 0; ci < cursedIds.length; ci++) if (p.upgradesTaken[cursedIds[ci]]) curses++;
      if (curses >= 4) unlockAch('curse_hoarder');
    }
  }

  function tryPickCard(mx, my) {
    for (var i = 0; i < game.cards.length; i++) {
      var c = game.cards[i];
      if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
        applyUpgrade(c.upgrade);
        game.cards = [];
        if (game.advanceAfterLevel) {
          // a forced boss-kill level-up: proceed to the next wave intro
          game.advanceAfterLevel = false;
          beginWave(game.wave + 1);
        } else {
          game.gameState = 'playing';
        }
        return;
      }
    }
  }

  // ---------------------------------------------------------------------------
  // ASCENDANCY — draft screen, pick handling, and the spacebar active
  // ---------------------------------------------------------------------------
  function triggerAscend() {
    game.gameState = 'ascend';
    playLevelUp();
    var pair = ASCENDANCIES[currentClass] || ASCENDANCIES.warrior;
    var cardW = 150, cardH = 180, gap = 28;
    var totalW = pair.length * cardW + (pair.length - 1) * gap;
    var startX = (W - totalW) / 2;
    var cy = (H - cardH) / 2 + 8;
    game.cards = pair.map(function (a, i) {
      return { asc: a, x: startX + i * (cardW + gap), y: cy, w: cardW, h: cardH };
    });
  }

  function tryPickAscend(mx, my) {
    for (var i = 0; i < game.cards.length; i++) {
      var c = game.cards[i];
      if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
        applyAscendancy(c.asc);
        game.cards = [];
        game.advanceAfterLevel = false;
        beginWave(game.wave + 1);
        return;
      }
    }
  }

  function applyAscendancy(a) {
    var p = game.player;
    p.ascendancy = a;
    p.abilityCd = 0;
    p.abilityMaxCd = a.cd;
    p.upgradesTaken['asc_' + a.id] = 1; // shows up in run analytics
    switch (a.id) {
      case 'juggernaut': p.ascendDR = 0.10; break;
      // berserker passive lives in spawnProjectile (needs live HP)
      case 'phantom':    p.speed += 15; break;
      case 'assassin':   p.critChance = 0.2; break;
      case 'frostmage':  p.frost = Math.max(p.frost, 1); break;
      case 'lightmage':  p.homingBase = Math.max(p.homingBase, 0.10); break;
      case 'sniper':     p.shotSpeed = Math.round(p.shotSpeed * 1.25); break;
      case 'trapper':    p.pierce += 1; break;
    }
  }

  function castAbility() {
    var p = game.player;
    if (!p || !p.ascendancy || p.abilityCd > 0 || game.gameState !== 'playing') return;
    var a = p.ascendancy;
    p.abilityCd = a.cd;
    p.abilityMaxCd = a.cd;
    var target, ang, i, e, ddx, ddy;
    switch (a.id) {
      case 'juggernaut':
        // charge toward the nearest enemy (or facing if the room is clear)
        target = findNearestEnemy(p.x, p.y);
        ang = target ? Math.atan2(target.y - p.y, target.x - p.x) : (p.facing === -1 ? Math.PI : 0);
        p.chargeT = 0.45;
        p.chargeVx = Math.cos(ang) * 320;
        p.chargeVy = Math.sin(ang) * 320;
        p.chargeHits = [];
        break;
      case 'berserker':
        // axe nova: everything nearby takes a heavy hit
        for (i = game.enemies.length - 1; i >= 0; i--) {
          e = game.enemies[i];
          ddx = e.x - p.x; ddy = e.y - p.y;
          if (ddx * ddx + ddy * ddy < 70 * 70) {
            e.hp -= 80;
            addDmg(80, 'ability');
            spawnFloatText(e.x, e.y, '80', a.color);
            e.hitFlash = 0.08;
            if (e.hp <= 0) { if (e.isBoss) killBoss(i, e); else killEnemy(i, e); }
          }
        }
        game.shakeTimer = 0.25;
        spawnRingParticles(p.x, p.y, a.color);
        break;
      case 'phantom':
        // blink along the current move direction (facing if standing still)
        var bdx = 0, bdy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) bdy -= 1;
        if (keys['KeyS'] || keys['ArrowDown']) bdy += 1;
        if (keys['KeyA'] || keys['ArrowLeft']) bdx -= 1;
        if (keys['KeyD'] || keys['ArrowRight']) bdx += 1;
        if (touchCtl.active && Math.abs(touchCtl.vx) + Math.abs(touchCtl.vy) > 0.2) {
          bdx = touchCtl.vx; bdy = touchCtl.vy;
        }
        if (bdx === 0 && bdy === 0) bdx = p.facing;
        var blen = Math.sqrt(bdx * bdx + bdy * bdy);
        bdx /= blen; bdy /= blen;
        spawnRingParticles(p.x, p.y, a.color);
        // step outward and keep the last spot that isn't inside a wall
        for (var step = 70; step >= 10; step -= 10) {
          var bx = clamp(p.x + bdx * step, p.w / 2, W - p.w / 2);
          var by = clamp(p.y + bdy * step, p.h / 2, H - p.h / 2);
          if (!boxHitsWall(bx, by, p.w, p.h)) { p.x = bx; p.y = by; break; }
        }
        p.invuln = Math.max(p.invuln, 0.8);
        break;
      case 'assassin':
        // fan of blades: a full ring of daggers at 1.5x damage
        for (i = 0; i < 12; i++) {
          spawnProjectile(p, (Math.PI * 2 / 12) * i, p.damage * 1.5);
        }
        break;
      case 'frostmage':
        for (i = 0; i < game.enemies.length; i++) {
          e = game.enemies[i];
          ddx = e.x - p.x; ddy = e.y - p.y;
          if (ddx * ddx + ddy * ddy < 90 * 90) {
            e.frozenT = 2;
            e.slowT = Math.max(e.slowT || 0, 3);
            e.slowAmt = 0.6;
          }
        }
        spawnRingParticles(p.x, p.y, a.color);
        break;
      case 'lightmage':
        target = findNearestEnemy(p.x, p.y);
        ang = target ? Math.atan2(target.y - p.y, target.x - p.x) : (p.facing === -1 ? Math.PI : 0);
        game.beams.push({ x: p.x, y: p.y, ang: ang, t: 0.25 });
        // hit everything within 12px of the ray
        var bcos = Math.cos(ang), bsin = Math.sin(ang);
        for (i = game.enemies.length - 1; i >= 0; i--) {
          e = game.enemies[i];
          ddx = e.x - p.x; ddy = e.y - p.y;
          var along = ddx * bcos + ddy * bsin;            // distance down the ray
          var off = Math.abs(-ddx * bsin + ddy * bcos);   // distance off the ray
          if (along > 0 && off < 12 + e.w / 2) {
            e.hp -= 90;
            addDmg(90, 'ability');
            spawnFloatText(e.x, e.y, '90', a.color);
            e.hitFlash = 0.08;
            if (e.hp <= 0) { if (e.isBoss) killBoss(i, e); else killEnemy(i, e); }
          }
        }
        break;
      case 'sniper':
        target = findNearestEnemy(p.x, p.y);
        ang = target ? Math.atan2(target.y - p.y, target.x - p.x) : (p.facing === -1 ? Math.PI : 0);
        spawnProjectile(p, ang, p.damage * 3);
        var mega = game.projectiles[game.projectiles.length - 1];
        mega.pierce = 99;
        mega.vx *= 1.8; mega.vy *= 1.8;
        mega.big = 1;
        break;
      case 'trapper':
        game.zones.push({ x: p.x, y: p.y, r: 40, t: 4, tick: 0 });
        break;
    }
    playPickup();
  }

  // small radial burst used by several ability visuals
  function spawnRingParticles(x, y, color) {
    for (var i = 0; i < 14; i++) {
      var ang = (Math.PI * 2 / 14) * i;
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * 90, vy: Math.sin(ang) * 90,
        life: 0.35, maxLife: 0.35, size: 2, color: color
      });
    }
  }

  // ---------------------------------------------------------------------------
  // UPDATE
  // ---------------------------------------------------------------------------
  function update(dt) {
    game.scanlineOffset = (game.scanlineOffset + 1) % 4;
    game.blinkTimer += dt;
    if (game.blinkTimer >= 0.5) { game.blinkTimer = 0; game.blinkOn = !game.blinkOn; }
    if (game.damageFlash > 0) game.damageFlash -= dt;
    if (game.shakeTimer > 0) game.shakeTimer -= dt;
    if (game.whiteFlash > 0) game.whiteFlash -= 1;
    if (game.waveBanner > 0) game.waveBanner -= dt;
    if (game.endlessBanner > 0) game.endlessBanner -= dt;
    for (var ti = game.toasts.length - 1; ti >= 0; ti--) {
      game.toasts[ti].t += dt;
      if (game.toasts[ti].t >= 3) game.toasts.splice(ti, 1);
    }

    // Wave intro card: freeze logic for 2s, then begin the wave.
    if (game.gameState === 'waveintro') {
      game.waveIntroTimer -= dt;
      if (game.waveIntroTimer <= 0) {
        game.gameState = 'playing';
        if (game.bossWave) spawnBoss();
      }
      return;
    }

    if (game.gameState !== 'playing') return;

    // run time only advances during actual play (not menus or pause)
    game.time += dt;

    // hit-stop: freeze the world for a few hundredths after a kill
    if (game.hitStop > 0) {
      game.hitStop -= dt;
      return;
    }

    var p = game.player;
    if (p.invuln > 0) p.invuln -= dt;
    if (p.abilityCd > 0) p.abilityCd -= dt;

    // ----- juggernaut charge: unstoppable, tramples everything in the path -----
    if (p.chargeT > 0) {
      p.chargeT -= dt;
      p.invuln = Math.max(p.invuln, 0.1);
      var cnx = p.x + p.chargeVx * dt, cny = p.y + p.chargeVy * dt;
      cnx = clamp(cnx, p.w / 2, W - p.w / 2);
      cny = clamp(cny, p.h / 2, H - p.h / 2);
      if (!boxHitsWall(cnx, cny, p.w, p.h)) { p.x = cnx; p.y = cny; }
      else p.chargeT = 0; // slams into a wall
      for (var ch = game.enemies.length - 1; ch >= 0; ch--) {
        var ce = game.enemies[ch];
        if (p.chargeHits.indexOf(ce) !== -1) continue;
        var chdx = ce.x - p.x, chdy = ce.y - p.y;
        if (chdx * chdx + chdy * chdy < 20 * 20) {
          p.chargeHits.push(ce);
          ce.hp -= 60;
          addDmg(60, 'ability');
          spawnFloatText(ce.x, ce.y, '60', '#ff6a3a');
          ce.hitFlash = 0.08;
          if (ce.hp <= 0) { if (ce.isBoss) killBoss(ch, ce); else killEnemy(ch, ce); }
        }
      }
    }

    // ----- player movement -----
    var dx = 0, dy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
    // virtual joystick (touch) overrides the keyboard when in use
    if (touchCtl.active && Math.abs(touchCtl.vx) + Math.abs(touchCtl.vy) > 0.2) {
      dx = touchCtl.vx; dy = touchCtl.vy;
    }
    p.moving = (dx !== 0 || dy !== 0);
    if (p.moving) {
      var len = Math.sqrt(dx * dx + dy * dy);
      dx /= len; dy /= len;
      // sand mounds: wade through at half speed
      var wade = softAt(p.x, p.y, p.w, p.h) ? 0.45 : 1;
      // axis-separated wall collision so the player slides along walls
      var pnx = p.x + dx * p.speed * wade * dt;
      var pny = p.y + dy * p.speed * wade * dt;
      if (!boxHitsWall(pnx, pny, p.w, p.h)) { p.x = pnx; p.y = pny; }
      else if (!boxHitsWall(pnx, p.y, p.w, p.h)) { p.x = pnx; }
      else if (!boxHitsWall(p.x, pny, p.w, p.h)) { p.y = pny; }
      if (dx < 0) p.facing = -1;
      else if (dx > 0) p.facing = 1;
      p.walkAnim += dt * 8;
    }
    // clamp to play area
    p.x = clamp(p.x, p.w / 2, W - p.w / 2);
    p.y = clamp(p.y, p.h / 2, H - p.h / 2);

    // ----- auto attack (frenzy pickup halves the cooldown) -----
    if (p.frenzyTimer > 0) p.frenzyTimer -= dt;
    p.attackTimer -= dt;
    if (p.attackTimer <= 0) {
      fireWeapon();
      p.attackTimer = p.attackCooldown * (p.frenzyTimer > 0 ? 0.5 : 1);
    }

    // ----- regen upgrade -----
    if (p.regen > 0 && p.hp < p.maxHp) {
      p.hp = Math.min(p.maxHp, p.hp + p.regen * p.healMult * dt);
    }

    // ----- static burst: periodic zap of the nearest foes -----
    if (p.staticLvl > 0) {
      p.staticTimer -= dt;
      if (p.staticTimer <= 0) {
        p.staticTimer = 2.5;
        var zapTargets = game.enemies.slice()
          .map(function (en2) { var zdx = en2.x - p.x, zdy = en2.y - p.y; return { e: en2, d: zdx * zdx + zdy * zdy }; })
          .filter(function (t2) { return t2.d < 180 * 180; })
          .sort(function (a2, b2) { return a2.d - b2.d; })
          .slice(0, 2 + p.staticLvl);
        var zapDmg = 70 + (p.staticLvl - 1) * 15;
        for (var zt = 0; zt < zapTargets.length; zt++) {
          var ze = zapTargets[zt].e;
          ze.hp -= zapDmg;
          ze.hitFlash = 0.1;
          addDmg(zapDmg, 'static');
          spawnFloatText(ze.x, ze.y, '' + zapDmg, '#f5f76e');
          game.zaps.push({ x1: p.x, y1: p.y, x2: ze.x, y2: ze.y, t: 0.15 });
          if (ze.hp <= 0) {
            var zi = game.enemies.indexOf(ze);
            if (zi !== -1) {
              if (ze.isBoss) killBoss(zi, ze); else killEnemy(zi, ze);
            }
          }
        }
        if (zapTargets.length) playPickup();
      }
    }
    for (var zz = game.zaps.length - 1; zz >= 0; zz--) {
      game.zaps[zz].t -= dt;
      if (game.zaps[zz].t <= 0) game.zaps.splice(zz, 1);
    }

    // ----- enemy spawning (continuous; slower trickle during boss waves) -----
    // gentle for the first few waves, then ramps to the same late-game pressure
    var spawnInterval = Math.max(0.25, 1.5 - game.wave * 0.1) / game.spawnHaste;
    if (game.bossWave) spawnInterval *= 1.8;
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      spawnEnemy();
      game.spawnTimer = spawnInterval;
    }

    // ----- update projectiles -----
    for (var i = game.projectiles.length - 1; i >= 0; i--) {
      var pr = game.projectiles[i];
      // homing steering — applied BEFORE the position update, capped at
      // 4deg/frame. Retargets at 10Hz, not every frame: the nearest-enemy
      // scan was O(projectiles x enemies) and the lag is imperceptible.
      if (pr.homing > 0) {
        pr.htT = (pr.htT || 0) - dt;
        if (!pr.ht || pr.ht.hp <= 0 || pr.htT <= 0) {
          pr.ht = findNearestEnemy(pr.x, pr.y);
          pr.htT = 0.1;
        }
        var ht = pr.ht;
        if (ht) {
          var desired = Math.atan2(ht.y - pr.y, ht.x - pr.x);
          var cur = Math.atan2(pr.vy, pr.vx);
          var diff = desired - cur;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          var step = diff * pr.homing;
          var maxStep = 4 * Math.PI / 180;
          if (step > maxStep) step = maxStep;
          else if (step < -maxStep) step = -maxStep;
          var na = cur + step;
          var spd = Math.sqrt(pr.vx * pr.vx + pr.vy * pr.vy);
          pr.vx = Math.cos(na) * spd;
          pr.vy = Math.sin(na) * spd;
        }
      }
      pr.x += pr.vx * dt;
      pr.y += pr.vy * dt;
      // wall impact — only on entry, so a piercing shot pays once per wall
      var hitWall = boxHitsWall(pr.x, pr.y, 6, 6);
      if (hitWall && !pr.inWall) {
        spawnWallSparks(pr.x, pr.y);
        // breakable blocks crumble after a few hits (Mario rules)
        if (hitWall.breakable) {
          hitWall.bhp--;
          bgDirty = true;
          if (hitWall.bhp <= 0) {
            var wcx = hitWall.x + hitWall.w / 2, wcy = hitWall.y + hitWall.h / 2;
            spawnDeathParticles(wcx, wcy, currentBiome().wallBorder);
            spawnDeathParticles(wcx, wcy, currentBiome().wallFill);
            walls.splice(walls.indexOf(hitWall), 1);
            game.shakeTimer = Math.max(game.shakeTimer, 0.12);
            if (hitWall.kind === 'ice') {
              // shattering ice chills everything nearby
              spawnDeathParticles(wcx, wcy, '#ffffff');
              for (var icn = 0; icn < game.enemies.length; icn++) {
                var ie = game.enemies[icn];
                var idx2 = ie.x - wcx, idy2 = ie.y - wcy;
                if (idx2 * idx2 + idy2 * idy2 < 55 * 55) {
                  ie.slowT = Math.max(ie.slowT || 0, 2);
                  ie.slowAmt = Math.max(ie.slowAmt || 0, 0.5);
                }
              }
            } else if (hitWall.kind === 'gilded') {
              // the Vault pays out: guaranteed pickup + coins
              var loot = ['potion', 'frenzy', 'barrier'][randInt(0, 2)];
              game.pickups.push({ x: wcx, y: wcy, type: loot, t: 8 });
              game.coinsEarned += 15;
              spawnFloatText(wcx, wcy, '+15', '#FFD700');
            } else {
              maybeDropPickup(wcx, wcy);
            }
          }
        }
        if (pr.pierce > 0) {
          pr.pierce--;
        } else {
          game.projectiles.splice(i, 1);
          continue;
        }
      }
      pr.inWall = !!hitWall;
      if (pr.x < -8 || pr.x > W + 8 || pr.y < -8 || pr.y > H + 8) {
        game.projectiles.splice(i, 1);
      }
    }

    // ----- update enemies (chrono pickup freezes them solid) -----
    if (game.freezeTimer > 0) game.freezeTimer -= dt;
    for (var j = game.enemies.length - 1; j >= 0; j--) {
      var e = game.enemies[j];
      if (e.hitFlash > 0) e.hitFlash -= dt;
      if (game.freezeTimer > 0) continue; // frozen: no moving, fusing, or shooting
      if (e.slowT > 0) e.slowT -= dt;
      // frost nova: frozen solid — no moving, fusing, or shooting
      if (e.frozenT > 0) { e.frozenT -= dt; continue; }
      // desired velocity: chase the player, plus decaying knockback.
      // cultists keep their distance and shoot instead of melee-rushing.
      var edx = p.x - e.x, edy = p.y - e.y;
      var ed = Math.sqrt(edx * edx + edy * edy) || 1;
      var chase = e.speed;
      if (e.type === 'cultist' || e.type === 'caster') {
        if (ed < 70) chase = -e.speed * 0.7;       // back away
        else if (ed < 110) chase = 0;              // hold range
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && ed < 220) {
          e.shootTimer = e.type === 'caster' ? 2.2 : Math.max(1.2, 2.4 - game.cultistLevel * 0.2);
          var sa = Math.atan2(edy, edx);
          game.enemyShots.push({ x: e.x, y: e.y, vx: Math.cos(sa) * 100, vy: Math.sin(sa) * 100, col: e.shotCol });
        }
      }
      // bomber: arm the fuse near the player, flash, then detonate
      if (e.type === 'bomber') {
        if (e.fuse < 0 && ed < 26) e.fuse = 0.8;
        if (e.fuse >= 0) {
          e.fuse -= dt;
          chase = 0; // stands its ground while fusing
          if (e.fuse <= 0) { explodeBomber(j, e); continue; }
        }
      }

      // boss specials
      if (e.isBoss) {
        e.aiTimer -= dt;
        if (e.kind === 'charger') {
          if (e.dashTimer > 0) {
            e.dashTimer -= dt;
            var dnx = e.x + e.dashVx * dt, dny = e.y + e.dashVy * dt;
            if (!boxHitsWall(dnx, dny, e.w, e.h)) { e.x = dnx; e.y = dny; }
            else e.dashTimer = 0; // slams into a wall
            chase = 0;
            if (e.dashTimer <= 0) {
              // signature: every dash ends in a radial shield slam
              for (var sl = 0; sl < 8; sl++) {
                var sla = (Math.PI * 2 / 8) * sl + Math.PI / 8;
                game.enemyShots.push({ x: e.x, y: e.y, vx: Math.cos(sla) * 95, vy: Math.sin(sla) * 95 });
              }
              game.shakeTimer = 0.3;
            }
          } else if (e.telegraph > 0) {
            e.telegraph -= dt;
            chase = 0;
            if (e.telegraph <= 0) {
              var da = Math.atan2(edy, edx);
              e.dashVx = Math.cos(da) * 300;
              e.dashVy = Math.sin(da) * 300;
              e.dashTimer = 0.5;
            }
          } else if (e.aiTimer <= 0) {
            e.telegraph = 0.8;
            e.aiTimer = 3.5;
          }
        } else if (e.kind === 'summoner') {
          if (ed < 130) chase = -e.speed;          // keeps its distance
          else if (ed < 170) chase = 0;
          if (e.aiTimer <= 0) {
            e.aiTimer = 4;
            e.volley = !e.volley;
            if (e.volley) {
              // signature: aimed three-bolt soul volley between summons
              var va = Math.atan2(edy, edx);
              for (var vb = -1; vb <= 1; vb++) {
                game.enemyShots.push({
                  x: e.x, y: e.y,
                  vx: Math.cos(va + vb * 0.22) * 115,
                  vy: Math.sin(va + vb * 0.22) * 115
                });
              }
              spawnFloatText(e.x, e.y - 18, 'PERISH!', '#b06ce8');
            } else if (game.enemies.length < 195) {
              for (var sm = 0; sm < 3; sm++) {
                spawnEnemyAt(enemyTypeForWave(game.wave), e.x + rand(-20, 20), e.y + rand(-20, 20));
              }
              spawnFloatText(e.x, e.y - 18, 'RISE!', '#b06ce8');
            }
          }
        } else if (e.kind === 'keeper') {
          // THE VAULT KEEPER: cycles dash / aimed fan / summons; below half
          // HP everything comes faster and the fan widens. Meant to kill
          // careless or underbuilt runs — the gate into the endless waves.
          var enraged = e.hp < e.maxHp * 0.5;
          if (e.dashTimer > 0) {
            e.dashTimer -= dt;
            var knx = e.x + e.dashVx * dt, kny = e.y + e.dashVy * dt;
            if (!boxHitsWall(knx, kny, e.w, e.h)) { e.x = knx; e.y = kny; }
            else e.dashTimer = 0;
            chase = 0;
            if (e.dashTimer <= 0) {
              // every charge detonates into a full ring
              for (var kr = 0; kr < 12; kr++) {
                var kra = (Math.PI * 2 / 12) * kr;
                game.enemyShots.push({ x: e.x, y: e.y, vx: Math.cos(kra) * 100, vy: Math.sin(kra) * 100 });
              }
              game.shakeTimer = 0.35;
            }
          } else if (e.telegraph > 0) {
            e.telegraph -= dt;
            chase = 0;
            if (e.telegraph <= 0) {
              var kda = Math.atan2(edy, edx);
              e.dashVx = Math.cos(kda) * 330;
              e.dashVy = Math.sin(kda) * 330;
              e.dashTimer = 0.55;
            }
          } else if (e.aiTimer <= 0) {
            e.aiTimer = enraged ? 2.2 : 3.2;
            e.phase = ((e.phase || 0) + 1) % 3;
            if (e.phase === 0) {
              e.telegraph = enraged ? 0.55 : 0.75;
            } else if (e.phase === 1) {
              var kfa = Math.atan2(edy, edx);
              var spreadN = enraged ? 3 : 2;
              for (var kf = -spreadN; kf <= spreadN; kf++) {
                game.enemyShots.push({
                  x: e.x, y: e.y,
                  vx: Math.cos(kfa + kf * 0.16) * 130,
                  vy: Math.sin(kfa + kf * 0.16) * 130
                });
              }
              spawnFloatText(e.x, e.y - 26, 'KNEEL!', '#c9a227');
            } else if (game.enemies.length < 195) {
              for (var kg = 0; kg < (enraged ? 4 : 3); kg++) {
                spawnEnemyAt(enemyTypeForWave(game.wave), e.x + rand(-26, 26), e.y + rand(-26, 26));
              }
              spawnFloatText(e.x, e.y - 26, 'GUARD ME!', '#c9a227');
            }
          }
        } else if (e.kind === 'spiral') {
          if (e.aiTimer <= 0) {
            e.aiTimer = 2.5;
            for (var sp = 0; sp < 12; sp++) {
              var spa = (Math.PI * 2 / 12) * sp + game.time;
              game.enemyShots.push({ x: e.x, y: e.y, vx: Math.cos(spa) * 80, vy: Math.sin(spa) * 80 });
            }
          }
          // signature: blink — fades out, then reappears beside the player
          if (e.blinkPhase > 0) {
            e.blinkPhase -= dt;
            chase = 0;
            if (e.blinkPhase <= 0) {
              var ba = rand(0, Math.PI * 2);
              e.x = clamp(p.x + Math.cos(ba) * 75, 20, W - 20);
              e.y = clamp(p.y + Math.sin(ba) * 75, 20, H - 20);
              pushOutOfWalls(e); // ghost, but never rematerialise inside a wall
              spawnDeathParticles(e.x, e.y, e.color);
            }
          } else {
            e.blinkTimer -= dt;
            if (e.blinkTimer <= 0) { e.blinkTimer = 6; e.blinkPhase = 0.7; }
          }
        }
      }

      var slowF = e.slowT > 0 ? (1 - (e.slowAmt || 0.3)) : 1; // frost shots
      // enemies wade through sand mounds too (wraiths float over)
      if (e.type !== 'wraith' && !e.ghost && softAt(e.x, e.y, e.w, e.h)) slowF *= 0.45;
      var mvx = (edx / ed) * chase * slowF + e.kx;
      var mvy = (edy / ed) * chase * slowF + e.ky;
      e.kx *= 0.85; e.ky *= 0.85;

      var ghost = (e.type === 'wraith' || e.ghost); // wraiths + THE REVENANT drift straight through walls
      if (!ghost) {
        // soft repulsion away from any wall within 20px — steering-based
        // avoidance so enemies flow around corners (no pathfinding)
        for (var wi = 0; wi < walls.length; wi++) {
          var wl = walls[wi];
          var wnx = clamp(e.x, wl.x, wl.x + wl.w);
          var wny = clamp(e.y, wl.y, wl.y + wl.h);
          var rdx = e.x - wnx, rdy = e.y - wny;
          var rd = Math.sqrt(rdx * rdx + rdy * rdy);
          if (rd > 0 && rd < 20) {
            var rf = (1 - rd / 20) * 60;
            mvx += (rdx / rd) * rf;
            mvy += (rdy / rd) * rf;
          }
        }
      }

      // axis-separated wall collision (full bounding box, not centre point)
      var enx = e.x + mvx * dt, eny = e.y + mvy * dt;
      if (ghost || !boxHitsWall(enx, eny, e.w, e.h)) {
        e.x = enx; e.y = eny;
      } else if (!boxHitsWall(enx, e.y, e.w, e.h)) {
        e.x = enx;
      } else if (!boxHitsWall(e.x, eny, e.w, e.h)) {
        e.y = eny;
      }
      // both axes blocked: stay put this frame

      // screen-edge danger countdown (bosses are immune)
      if (!e.isBoss) {
        var nearEdge = (e.x < 10 || e.x > W - 10 || e.y < 10 || e.y > H - 10);
        if (nearEdge) {
          if (!e.atEdge) { e.atEdge = true; e.edgeTimer = 0; }
          e.edgeTimer += dt;
          if (e.edgeTimer >= 1.5) {
            triggerShockwave(e.x, e.y);
            game.enemies.splice(j, 1);
            continue;
          }
        } else {
          e.atEdge = false;
          e.edgeTimer = 0;
        }
      }

      // contact with player (i-frames: damage at most once per 0.5s)
      if (Math.abs(p.x - e.x) < (p.w / 2 + e.w / 2) &&
          Math.abs(p.y - e.y) < (p.h / 2 + e.h / 2)) {
        // knock normal enemies back even during i-frames; boss is immovable
        if (!e.isBoss) {
          var kdx = (e.x - p.x) / ed;
          var kdy = (e.y - p.y) / ed;
          e.kx = kdx * 120;
          e.ky = kdy * 120;
        }
        // retribution: melee hits that land burn the attacker
        if (damagePlayer(e.contact, true) && p.retribution > 0) {
          var thorns = 60 + (p.retribution - 1) * 40;
          e.hp -= thorns;
          addDmg(thorns, 'pact');
          spawnFloatText(e.x, e.y, '' + thorns, '#8b0000');
          e.hitFlash = 0.08;
          if (e.hp <= 0) {
            if (e.isBoss) killBoss(j, e); else killEnemy(j, e);
            continue;
          }
        }
      }
    }

    // ----- cultist projectiles (also frozen by chrono) -----
    for (var es = game.enemyShots.length - 1; es >= 0; es--) {
      var sh = game.enemyShots[es];
      if (game.freezeTimer > 0) break;
      sh.x += sh.vx * dt;
      sh.y += sh.vy * dt;
      if (boxHitsWall(sh.x, sh.y, 5, 5)) {
        spawnWallSparks(sh.x, sh.y);
        game.enemyShots.splice(es, 1);
        continue;
      }
      if (Math.abs(sh.x - p.x) < (p.w / 2 + 3) && Math.abs(sh.y - p.y) < (p.h / 2 + 3)) {
        damagePlayer(10, false);
        game.enemyShots.splice(es, 1); // the bolt is spent either way
        continue;
      }
