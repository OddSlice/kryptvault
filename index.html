  function drawClassIcon(id, x, y) {
    // x,y is the top-left of a 40x40 icon area
    if (id === 'warrior') {
      // twin-bladed axe, matching the warrior's in-game projectile
      ctx.fillStyle = '#7a5a30';           // wooden haft
      ctx.fillRect(x + 18, y + 6, 4, 30);
      ctx.fillStyle = '#5a4020';           // haft cap
      ctx.fillRect(x + 17, y + 33, 6, 3);
      ctx.fillStyle = '#b8c4d4';           // steel double head
      ctx.beginPath();                     // left blade
      ctx.moveTo(x + 18, y + 8); ctx.lineTo(x + 6, y + 11);
      ctx.lineTo(x + 6, y + 21); ctx.lineTo(x + 18, y + 24);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();                     // right blade
      ctx.moveTo(x + 22, y + 8); ctx.lineTo(x + 34, y + 11);
      ctx.lineTo(x + 34, y + 21); ctx.lineTo(x + 22, y + 24);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#e8eef8';           // edge shine
      ctx.fillRect(x + 6, y + 12, 2, 8);
      ctx.fillRect(x + 32, y + 12, 2, 8);
    } else if (id === 'rogue') {
      // dagger tilted 45 degrees, dark green tones
      ctx.save();
      ctx.translate(x + 20, y + 20);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = '#9be8b0';
      ctx.fillRect(-2, -14, 4, 16);
      ctx.fillStyle = '#1d7a3c';
      ctx.fillRect(-6, 2, 12, 3);
      ctx.fillRect(-2, 5, 4, 8);
      ctx.restore();
    } else if (id === 'mage') {
      // staff: shaft, orb on top, small crossbars — purple and white
      ctx.fillStyle = '#b794f6';
      ctx.fillRect(x + 18, y + 10, 4, 26);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x + 20, y + 8, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6633cc';
      ctx.beginPath();
      ctx.arc(x + 20, y + 8, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#b794f6';
      ctx.fillRect(x + 13, y + 16, 14, 2);
      ctx.fillRect(x + 15, y + 22, 10, 2);
    } else if (id === 'ranger') {
      // bow: curved limb + string with a nocked arrow, amber
      ctx.strokeStyle = '#c99a3a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x + 12, y + 20, 12, -Math.PI / 2.3, Math.PI / 2.3);
      ctx.stroke();
      var a0 = -Math.PI / 2.3, a1 = Math.PI / 2.3;
      ctx.strokeStyle = '#dddddd';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 12 + 12 * Math.cos(a0), y + 20 + 12 * Math.sin(a0));
      ctx.lineTo(x + 12 + 12 * Math.cos(a1), y + 20 + 12 * Math.sin(a1));
      ctx.stroke();
      ctx.fillStyle = '#eaeaea';
      ctx.fillRect(x + 12, y + 19, 20, 2);          // arrow shaft
      ctx.fillStyle = '#c99a3a';
      ctx.beginPath();                               // arrowhead
      ctx.moveTo(x + 36, y + 20); ctx.lineTo(x + 31, y + 16); ctx.lineTo(x + 31, y + 24);
      ctx.closePath(); ctx.fill();
    }
  }

  function renderClassSelect() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('CHOOSE YOUR CLASS', W / 2, 24, 10, '#FFD700', 'center');
    // coin balance (matters for the coin-unlocked classes)
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(W / 2 - 44, 46, 5, 5);
    ctx.fillStyle = '#aa8800';
    ctx.fillRect(W / 2 - 43, 47, 3, 3);
    text(Math.round(runData.coins) + ' COINS', W / 2 - 34, 45, 6, '#FFD700');

    var labels = ['HP', 'SPEED', 'POWER'];
    for (var i = 0; i < classCards.length; i++) {
      var c = classCards[i];
      var cls = c.cls;
      var owned = classOwned(cls);
      var pending = classUnlockPending === cls.id;
      var hover = mouse.x >= c.x && mouse.x <= c.x + c.w &&
                  mouse.y >= c.y && mouse.y <= c.y + c.h;

      // 2px border: gold on hover, class colour otherwise
      ctx.fillStyle = hover ? '#FFD700' : cls.color;
      ctx.fillRect(c.x - 2, c.y - 2, c.w + 4, c.h + 4);
      ctx.fillStyle = '#101020';
      ctx.fillRect(c.x, c.y, c.w, c.h);

      // hero sprite centred; weapon icon tucked in the corner
      var spx = Math.round(c.x + c.w / 2 - 16);
      if (drawTile(cls.tile, spx, c.y + 22, 32, 32, false)) {
        drawClassIcon(cls.id, c.x + c.w - 36, c.y + 20);
      } else {
        drawClassIcon(cls.id, c.x + c.w / 2 - 20, c.y + 22);
      }

      // three compact 5-segment stat bars
      for (var b = 0; b < 3; b++) {
        var by = c.y + 66 + b * 14;
        text(labels[b], c.x + 6, by, 6, '#bbbbbb');
        for (var sg = 0; sg < 5; sg++) {
          ctx.fillStyle = sg < cls.bars[b] ? cls.color : '#2a2a3a';
          ctx.fillRect(c.x + 44 + sg * 11, by, 8, 6);
        }
      }

      // lock overlay for coin-unlocked classes
      if (!owned) {
        ctx.fillStyle = 'rgba(6,6,14,0.72)';
        ctx.fillRect(c.x, c.y, c.w, c.h);
        var lx = c.x + c.w / 2;
        // padlock: shackle + body + keyhole
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(lx, c.y + 44, 4, Math.PI, 0);
        ctx.stroke();
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(lx - 6, c.y + 44, 12, 9);
        ctx.fillStyle = '#101020';
        ctx.fillRect(lx - 1, c.y + 47, 2, 3);
        // unlock text sits below the (dimmed) stat bars, clear of them
        if (pending) {
          text('TAP AGAIN', lx, c.y + 110, 6, '#33cc66', 'center');
          text('TO BUY ' + cls.price + 'c', lx, c.y + 124, 6, '#FFD700', 'center');
        } else {
          text('UNLOCK', lx, c.y + 110, 6, '#ffffff', 'center');
          text(cls.price + 'c', lx, c.y + 124, 8, '#FFD700', 'center');
        }
      }

      // name + number on top so they stay crisp over the lock overlay
      text(cls.name, c.x + c.w / 2, c.y + 8, 7, '#ffffff', 'center');
      text(String(i + 1), c.x + 6, c.y + 7, 6, '#666666');
    }

    // COSMETICS button, centred below the cards (back is the shared top-left button)
    var ccb = CLASS_COSM_BTN;
    var ccH = mouse.x >= ccb.x && mouse.x <= ccb.x + ccb.w && mouse.y >= ccb.y && mouse.y <= ccb.y + ccb.h;
    ctx.fillStyle = ccH ? '#26263a' : '#161622';
    ctx.fillRect(ccb.x, ccb.y, ccb.w, ccb.h);
    ctx.strokeStyle = chromaColor(); ctx.lineWidth = 1;
    ctx.strokeRect(ccb.x + 0.5, ccb.y + 0.5, ccb.w - 1, ccb.h - 1);
    text('COSMETICS', ccb.x + ccb.w / 2, ccb.y + 6, 6, '#FFD700', 'center');

    text('CLICK A CLASS OR PRESS 1-4', W / 2, 250, 6, '#888888', 'center');
  }

  // Shop rows are also used as click targets.
  function shopRowRect(i) {
    return { x: 36, y: 66 + i * 33, w: 408, h: 29 };
  }
  // the "upgrade" button sub-region on the right of a tome row
  function shopUpgradeRect(i) {
    var r = shopRowRect(i);
    return { x: r.x + r.w - 84, y: r.y + 5, w: 78, h: 19 };
  }

  // Small colored "tome" book icon (distinct colour per tome).
  function drawTomeIcon(color, x, y, s) {
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(x - 1, y - 1, s + 2, s + 2);   // outline
    ctx.fillStyle = color;
    ctx.fillRect(x, y, s, s);                    // cover
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x, y, 3, s);                    // spine shadow
    ctx.fillStyle = '#f0ead8';
    ctx.fillRect(x + s - 2, y + 1, 2, s - 2);    // page edge
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(x + 5, y + 4, s - 8, 1);        // emblem lines
    ctx.fillRect(x + 5, y + 6, s - 10, 1);
  }

  function renderShop() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('THE VAULT', W / 2, 12, 10, '#FFD700', 'center');
    text('TOMES  —  EQUIP ' + runData.equippedTomes.length + '/' + MAX_EQUIPPED_TOMES +
         '   ' + Math.round(runData.coins) + 'c', W / 2, 34, 6, '#ffffff', 'center');
    for (var i = 0; i < SHOP_ITEMS.length; i++) {
      var item = SHOP_ITEMS[i];
      var lvl = runData.shop[item.id] || 0;
      var equipped = isTomeEquipped(item.id);
      var r = shopRowRect(i);
      var ur = shopUpgradeRect(i);
      var hover = mouse.x >= r.x && mouse.x <= r.x + r.w && mouse.y >= r.y && mouse.y <= r.y + r.h;
      var uHover = mouse.x >= ur.x && mouse.x <= ur.x + ur.w && mouse.y >= ur.y && mouse.y <= ur.y + ur.h;
      var maxed = lvl >= 5;
      var price = maxed ? 0 : SHOP_PRICES[lvl];
      var affordable = !maxed && runData.coins >= price;

      ctx.fillStyle = hover ? '#20202e' : '#16161f';
      ctx.fillRect(r.x, r.y, r.w, r.h);
      if (equipped) {
        ctx.globalAlpha = 0.10; ctx.fillStyle = item.color;
        ctx.fillRect(r.x, r.y, r.w, r.h); ctx.globalAlpha = 1;
        ctx.fillStyle = item.color; ctx.fillRect(r.x, r.y, 3, r.h);
      }
      ctx.fillStyle = equipped ? item.color : '#333344';
      ctx.fillRect(r.x, r.y, r.w, 1);
      ctx.fillRect(r.x, r.y + r.h - 1, r.w, 1);

      drawTomeIcon(item.color, r.x + 7, r.y + 7, 14);
      text(item.name, r.x + 28, r.y + 5, 6, '#ffffff');
      text(item.desc, r.x + 28, r.y + 16, 6, '#888888');

      var mx = r.x + 214;
      for (var pip = 0; pip < 5; pip++) {
        ctx.fillStyle = pip < lvl ? item.color : '#2a2a3a';
        ctx.fillRect(mx + pip * 9, r.y + 5, 6, 6);
      }
      ctx.fillStyle = equipped ? '#33cc66' : '#2a2a3a';
      ctx.fillRect(mx, r.y + 16, 7, 7);
      if (equipped) { ctx.fillStyle = '#0d0d1a'; ctx.fillRect(mx + 2, r.y + 18, 3, 3); }
      text(equipped ? 'EQUIPPED' : 'EQUIP', mx + 11, r.y + 17, 6, equipped ? '#33cc66' : '#777777');

      ctx.fillStyle = uHover && affordable ? '#3a3a20' : '#0d0d14';
      ctx.fillRect(ur.x, ur.y, ur.w, ur.h);
      ctx.strokeStyle = maxed ? '#33cc66' : (affordable ? '#FFD700' : '#442222');
      ctx.lineWidth = 1;
      ctx.strokeRect(ur.x + 0.5, ur.y + 0.5, ur.w - 1, ur.h - 1);
      if (maxed) text('MAX LVL', ur.x + ur.w / 2, ur.y + 7, 6, '#33cc66', 'center');
      else text('UP ' + price + 'c', ur.x + ur.w / 2, ur.y + 7, 6, affordable ? '#FFD700' : '#883333', 'center');
    }
    text('TAP TOME = EQUIP (MAX 3)   TAP PRICE = UPGRADE', W / 2, 236, 6, '#888888', 'center');
    text('TOMES ARE OFF IN DAILY  —  ESC / ENTER TO RETURN', W / 2, 248, 6, '#666666', 'center');
  }

  // ---------------------------------------------------------------------------
  // WARDROBE — hero skin gallery (cosmetics, separate from The Vault's power)
  // ---------------------------------------------------------------------------
  function skinCardRect(i) {
    return { x: 24 - wardrobeScroll + i * 146, y: 86, w: 134, h: 152 };
  }
  function wardrobeContentW() { return (SKINS[wardrobeClass] || []).length * 146 - 12; }
  function wardrobeMaxScroll() { return Math.max(0, wardrobeContentW() - (W - 48)); }

  // draw a class hero sprite with a skin applied, at (x,y,size)
  function drawSkinPreview(classId, skin, x, y, size) {
    var tile = classDef(classId).tile;
    var tint = skin.chroma ? chromaColor() : skin.tint;
    if (tint) {
      if (skin.chroma) {
        ctx.globalAlpha = 0.28 + 0.15 * Math.sin(game.time * 6);
        drawTintedTile(tile, x - 2, y - 2, size + 4, size + 4, false, tint, 1);
        ctx.globalAlpha = 1;
      }
      if (!drawTintedTile(tile, x, y, size, size, false, tint, skin.chroma ? 0.62 : 0.5)) {
        ctx.fillStyle = tint; ctx.fillRect(x, y, size, size);
      }
    } else if (!drawTile(tile, x, y, size, size, false)) {
      ctx.fillStyle = classDef(classId).color; ctx.fillRect(x, y, size, size);
    }
  }

  function drawSkinCard(skin, r) {
    if (r.x + r.w < 0 || r.x > W) return; // scrolled off-screen
    var owned = skinOwned(skin.id);
    var equipped = equippedSkinId(wardrobeClass) === skin.id;
    var pending = skinPending === skin.id;
    var locked = skin.tier === 'epic' && !epicUnlocked();
    var hover = mouse.x >= r.x && mouse.x <= r.x + r.w && mouse.y >= r.y && mouse.y <= r.y + r.h;
    var accent = skin.tier === 'epic' ? (skin.chroma ? chromaColor() : '#ffd24a')
                : (skin.tier === 'basic' ? '#54a0ff' : '#8890a0');

    ctx.fillStyle = equipped ? '#33cc66' : (hover ? '#FFD700' : accent);
    ctx.fillRect(r.x - 2, r.y - 2, r.w + 4, r.h + 4);
    ctx.fillStyle = '#101018';
    ctx.fillRect(r.x, r.y, r.w, r.h);

    // tier ribbon
    ctx.fillStyle = accent;
    ctx.fillRect(r.x, r.y, r.w, 12);
    text(skin.tier.toUpperCase(), r.x + r.w / 2, r.y + 3, 6, '#101018', 'center');

    // preview sprite (dimmed if locked)
    if (locked) ctx.globalAlpha = 0.35;
    drawSkinPreview(wardrobeClass, skin, r.x + r.w / 2 - 24, r.y + 22, 48);
    ctx.globalAlpha = 1;

    text(skin.name, r.x + r.w / 2, r.y + 78, 6, '#ffffff', 'center');

    // status line
    if (equipped) {
      text('EQUIPPED', r.x + r.w / 2, r.y + 116, 6, '#33cc66', 'center');
    } else if (owned) {
      text('TAP TO EQUIP', r.x + r.w / 2, r.y + 116, 6, '#aaaaaa', 'center');
    } else if (locked) {
      text('LOCKED', r.x + r.w / 2, r.y + 110, 6, '#ff5555', 'center');
      text('REACH W' + EPIC_SKIN_WAVE, r.x + r.w / 2, r.y + 122, 6, '#ff8888', 'center');
    } else {
      var aff = runData.coins >= skin.price;
      if (pending) text('TAP TO BUY', r.x + r.w / 2, r.y + 104, 6, '#33cc66', 'center');
      text(skin.price + 'c', r.x + r.w / 2, r.y + (pending ? 118 : 112), 8, aff ? '#FFD700' : '#883333', 'center');
    }
  }

  function renderWardrobe() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);
    text('SKINS', W / 2, 10, 10, '#FFD700', 'center');
    text(Math.round(runData.coins) + 'c', W / 2, 30, 6, '#FFD700', 'center');

    // character selector
    var tabW = 108, gap = 6, total = CLASSES.length * tabW + (CLASSES.length - 1) * gap;
    var tx0 = (W - total) / 2;
    for (var ci = 0; ci < CLASSES.length; ci++) {
      var cls = CLASSES[ci];
      var tx = tx0 + ci * (tabW + gap), ty = 44, th = 20;
      var active = wardrobeClass === cls.id;
      var hov = mouse.x >= tx && mouse.x <= tx + tabW && mouse.y >= ty && mouse.y <= ty + th;
      ctx.fillStyle = active ? '#2a2a3e' : (hov ? '#1a1a26' : '#101018');
      ctx.fillRect(tx, ty, tabW, th);
      ctx.fillStyle = active ? cls.color : '#333344';
      ctx.fillRect(tx, ty + th - 1, tabW, 1);
      text(cls.name, tx + tabW / 2, ty + 7, 6, active ? '#ffffff' : '#888888', 'center');
    }

    var list = SKINS[wardrobeClass] || [];
    for (var i = 0; i < list.length; i++) drawSkinCard(list[i], skinCardRect(i));

    // scroll arrows when the cards overflow
    if (wardrobeMaxScroll() > 0) {
      if (wardrobeScroll > 4) text('<', 12, 156, 10, '#FFD700');
      if (wardrobeScroll < wardrobeMaxScroll() - 4) text('>', W - 18, 156, 10, '#FFD700');
    }
    text('TAP CARD = EQUIP / BUY    ESC = BACK', W / 2, 252, 6, '#888888', 'center');
  }

  // play flow: pick a run mode before class select
  var MODE_CARDS = [
    { id: 'normal', x: 48,  y: 62, w: 180, h: 142 },
    { id: 'daily',  x: 252, y: 62, w: 180, h: 142 }
  ];

  function renderModeSelect() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('CHOOSE YOUR RUN', W / 2, 26, 10, '#FFD700', 'center');

    for (var i = 0; i < MODE_CARDS.length; i++) {
      var c = MODE_CARDS[i];
      var hover = mouse.x >= c.x && mouse.x <= c.x + c.w && mouse.y >= c.y && mouse.y <= c.y + c.h;
      var accent = c.id === 'daily' ? '#ff2dd0' : '#FFD700';
      if (hover) {
        ctx.fillStyle = c.id === 'daily' ? 'rgba(255,45,208,0.35)' : 'rgba(255,215,0,0.35)';
        ctx.fillRect(c.x - 4, c.y - 4, c.w + 8, c.h + 8);
      }
      ctx.fillStyle = accent;
      ctx.fillRect(c.x - 2, c.y - 2, c.w + 4, c.h + 4);
      ctx.fillStyle = '#101020';
      ctx.fillRect(c.x, c.y, c.w, c.h);
      text(String(i + 1), c.x + 8, c.y + 8, 6, '#666666');
      if (c.id === 'normal') {
        text('STANDARD', c.x + c.w / 2, c.y + 12, 8, accent, 'center');
        text('THE ENDLESS CRYPT', c.x + c.w / 2, c.y + 36, 6, '#ffffff', 'center');
        text('NEW RANDOM DUNGEON', c.x + c.w / 2, c.y + 58, 6, '#bbbbbb', 'center');
        text('EVERY SINGLE RUN', c.x + c.w / 2, c.y + 70, 6, '#bbbbbb', 'center');
        text('COMPETE ON THE', c.x + c.w / 2, c.y + 92, 6, '#888888', 'center');
        text('ALL-TIME LEADERBOARD', c.x + c.w / 2, c.y + 104, 6, '#888888', 'center');
      } else {
        text('DAILY CHALLENGE', c.x + c.w / 2, c.y + 12, 8, accent, 'center');
        text('ONE SHARED DUNGEON', c.x + c.w / 2, c.y + 36, 6, '#ffffff', 'center');
        text('SAME LAYOUT FOR', c.x + c.w / 2, c.y + 58, 6, '#bbbbbb', 'center');
        text('EVERYONE TODAY (UTC)', c.x + c.w / 2, c.y + 70, 6, '#bbbbbb', 'center');
        text('ITS OWN DAILY', c.x + c.w / 2, c.y + 92, 6, '#888888', 'center');
        text('LEADERBOARD', c.x + c.w / 2, c.y + 104, 6, '#888888', 'center');
      }
      text('CLICK TO PLAY', c.x + c.w / 2, c.y + 124, 6, hover ? '#ffffff' : '#555566', 'center');
    }

    text('ENTER = QUICK-START STANDARD', W / 2, 256, 6, '#555566', 'center');
  }

  function renderCodex() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('RECIPE CODEX', W / 2, 12, 10, '#FFD700', 'center');
    text('STANDARD: FAIR TRADE', 100, 34, 6, '#FFD700', 'center');
    text('CURSED: RUN PAYS', 245, 34, 6, '#9b59b6', 'center');
    text('EVOLUTION: COMBO', 378, 34, 6, '#ff2dd0', 'center');

    var recipes = [
      ['SHOTGUN', 'HOMING SHOT', 'SEEKER SWARM'],
      ['ORBIT SHIELD', 'DMG BOOST', 'BLADE ORBIT'],
      ['PIERCE', 'DMG BOOST', 'RAILGUN'],
      ['MULTI-SHOT', 'ATTACK SPD', 'BULLET STORM'],
      ['KEEN EDGE', 'HOMING SHOT', 'DEATHSEEKER']
    ];
    var evoIds = ['seekerswarm', 'bladeorbit', 'railgun', 'bulletstorm', 'deathseeker'];
    for (var i = 0; i < recipes.length; i++) {
      var ry = 50 + i * 27;
      var owned = game.player && game.player.upgradesTaken && game.player.upgradesTaken[evoIds[i]];
      // ingredient boxes
      ctx.fillStyle = '#8a7500';
      ctx.fillRect(23, ry - 1, 110, 20);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(24, ry, 108, 18);
      text(recipes[i][0], 78, ry + 6, 6, '#FFD700', 'center');
      text('+', 146, ry + 6, 8, '#ffffff', 'center');
      ctx.fillStyle = '#8a7500';
      ctx.fillRect(159, ry - 1, 110, 20);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(160, ry, 108, 18);
      text(recipes[i][1], 214, ry + 6, 6, '#FFD700', 'center');
      text('=', 282, ry + 6, 8, '#ffffff', 'center');
      ctx.fillStyle = '#ff2dd0';
      ctx.fillRect(295, ry - 1, 162, 20);
      ctx.fillStyle = '#1f1018';
      ctx.fillRect(296, ry, 160, 18);
      text(recipes[i][2] + (owned ? ' *' : ''), 376, ry + 6, 6, '#ff2dd0', 'center');
    }
    text('OWN BOTH CARDS AND THE EVOLUTION IS GUARANTEED IN YOUR NEXT DRAFT', W / 2, 186, 6, '#bbbbbb', 'center');

    text('TIPS', W / 2, 204, 6, '#FFD700', 'center');
    text('DMG BOOST FEEDS TWO RECIPES — SAFEST EARLY PICK', W / 2, 216, 6, '#888888', 'center');
    text('FROST + FAST FIRE = A PERMANENT SLOW FIELD', W / 2, 227, 6, '#888888', 'center');
    text('CURSES HIT HARDER THE EARLIER YOU TAKE THEM', W / 2, 238, 6, '#888888', 'center');

    text('ESC / ENTER / R TO RETURN', W / 2, 256, 6, '#666666', 'center');
  }

  // Post-first-death nudge: ratings on itch are what make the game visible.
  var FEEDBACK_BTNS = [
    { id: 'rate',  label: 'RATE IT ON ITCH.IO', x: 150, y: 150, w: 180, h: 24, gold: true },
    { id: 'later', label: 'MAYBE LATER',        x: 150, y: 184, w: 180, h: 20 }
  ];

  function renderFeedback() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('ENJOYING KRYPTVAULT?', W / 2, 60, 10, '#FFD700', 'center');
    text('RATINGS AND COMMENTS ON ITCH ARE WHAT', W / 2, 92, 6, '#bbbbbb', 'center');
    text('MAKE A TINY FREE GAME VISIBLE TO OTHERS', W / 2, 104, 6, '#bbbbbb', 'center');
    text('IT TAKES 20 SECONDS AND HELPS A TON', W / 2, 122, 6, '#888888', 'center');

    for (var i = 0; i < FEEDBACK_BTNS.length; i++) {
      var b = FEEDBACK_BTNS[i];
      var hover = mouse.x >= b.x && mouse.x <= b.x + b.w && mouse.y >= b.y && mouse.y <= b.y + b.h;
      ctx.fillStyle = hover ? '#FFD700' : (b.gold ? '#8a7500' : '#444466');
      ctx.fillRect(b.x - 1, b.y - 1, b.w + 2, b.h + 2);
      ctx.fillStyle = hover ? '#1f1a08' : '#0d0d1a';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      text(b.label, b.x + b.w / 2, b.y + (b.h - (b.gold ? 8 : 6)) / 2, b.gold ? 8 : 6,
           b.gold ? '#FFD700' : '#cccccc', 'center');
    }
    text('ENTER OPENS ITCH — ESC SKIPS', W / 2, 226, 6, '#555566', 'center');
  }

  function renderAchievements() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('ACHIEVEMENTS', W / 2, 14, 10, '#FFD700', 'center');
    var unlockedCount = 0;
    for (var c = 0; c < ACHIEVEMENTS.length; c++) if (runData.achievements[ACHIEVEMENTS[c].id]) unlockedCount++;
    text(unlockedCount + ' / ' + ACHIEVEMENTS.length, W / 2, 32, 6, '#888888', 'center');

    for (var i = 0; i < ACHIEVEMENTS.length; i++) {
      var a = ACHIEVEMENTS[i];
      var got = !!runData.achievements[a.id];
      var col = i % 2, row = Math.floor(i / 2);
      var x = 30 + col * 215, y = 52 + row * 42;
      ctx.fillStyle = got ? '#1f1a08' : '#101016';
      ctx.fillRect(x, y, 200, 36);
      ctx.fillStyle = got ? '#FFD700' : '#2a2a3a';
      ctx.fillRect(x, y, 200, 1);
      ctx.fillRect(x, y + 35, 200, 1);
      text(got ? '*' : '-', x + 8, y + 8, 8, got ? '#FFD700' : '#444455');
      text(a.name, x + 24, y + 6, 6, got ? '#FFD700' : '#666677');
      text(a.desc, x + 24, y + 18, 6, got ? '#bbbbbb' : '#444455');
    }

    text('ESC / ENTER TO RETURN', W / 2, 244, 6, '#888888', 'center');
  }

  // Achievement toast popups, drawn over every screen.
  function drawToasts() {
    for (var i = 0; i < game.toasts.length; i++) {
      var t = game.toasts[i];
      var alpha = t.t < 0.3 ? t.t / 0.3 : (t.t > 2.4 ? Math.max(0, 1 - (t.t - 2.4) / 0.6) : 1);
      ctx.globalAlpha = alpha;
      var tw = 220, tx = (W - tw) / 2, ty = 30 + i * 20;
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(tx - 1, ty - 1, tw + 2, 16);
      ctx.fillStyle = '#1a1408';
      ctx.fillRect(tx, ty, tw, 14);
      text(t.txt, W / 2, ty + 4, 6, '#FFD700', 'center');
      ctx.globalAlpha = 1;
    }
  }

  function renderWaveIntro() {
    // frozen world behind a translucent overlay
    renderWorld();
    renderHUD();
    ctx.fillStyle = 'rgba(0,0,10,0.6)';
    ctx.fillRect(0, 0, W, H);

    var cw = 240, ch = 100, cx = (W - cw) / 2, cy = (H - ch) / 2;
    ctx.fillStyle = '#FFD700';                 // 2px gold border
    ctx.fillRect(cx - 2, cy - 2, cw + 4, ch + 4);
    ctx.fillStyle = '#0d0d1a';                 // dark background
    ctx.fillRect(cx, cy, cw, ch);

    text('WAVE', W / 2, cy + 12, 8, '#FFD700', 'center');
    text(pad(game.wave, 2), W / 2, cy + 28, 20, '#FFD700', 'center');

    if (game.bossWave) {
      if (game.blinkOn) {
        text('! BOSS WAVE !', W / 2, cy + 68, 8, '#ff2d2d', 'center');
      }
      // tease the incoming boss by name (kind rotation is deterministic)
      var upKind = BOSS_KINDS[(Math.round(game.wave / 10) - 1 + 300) % 3];
      text(BOSS_DEFS[upKind].name, W / 2, cy + 84, 6, BOSS_DEFS[upKind].color, 'center');
    } else {
      text('~' + game.waveTarget + ' ENEMIES', W / 2, cy + 68, 6, '#ffffff', 'center');
      // announce the biome on the first wave after each boss (11, 21, 31...)
      if (game.wave > 10 && game.wave % 10 === 1) {
        text('ENTERING ' + currentBiome().name, W / 2, cy + 84, 6, '#ffb347', 'center');
      }
    }
  }

  // simple word-wrap renderer centred at cx
  function wrapText(str, cx, y, size, color, maxW) {
    ctx.font = size + 'px "Press Start 2P"';
    var words = str.split(' ');
    var lines = [];
    var line = '';
    for (var i = 0; i < words.length; i++) {
      var test = line ? line + ' ' + words[i] : words[i];
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = words[i];
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    for (var l = 0; l < lines.length; l++) {
      text(lines[l], cx, y + l * (size + 3), size, color, 'center');
    }
  }

  // ---------------------------------------------------------------------------
  // MAIN RENDER
  // ---------------------------------------------------------------------------
  function render() {
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // once we leave a typed screen, dismiss the mobile keyboard
    if (game.gameState !== 'nameentry' && document.activeElement === nameInput) {
      nameInput.blur();
    }
    if (game.gameState !== 'login' && document.activeElement === loginInput) {
      loginInput.blur();
    }

    if (game.gameState === 'title') {
      renderTitle();
    } else if (game.gameState === 'nameentry') {
      renderNameEntry();
      drawScanlines();
    } else if (game.gameState === 'settings') {
      renderSettings();
      drawScanlines();
    } else if (game.gameState === 'account') {
      renderAccount();
      drawScanlines();
    } else if (game.gameState === 'login') {
      renderLogin();
      drawScanlines();
    } else if (game.gameState === 'accountinfo') {
      renderAccountInfo();
      drawScanlines();
    } else if (game.gameState === 'classselect') {
      renderClassSelect();
      drawScanlines();
    } else if (game.gameState === 'shop') {
      renderShop();
      drawScanlines();
    } else if (game.gameState === 'wardrobe') {
      renderWardrobe();
      drawScanlines();
    } else if (game.gameState === 'codex') {
      renderCodex();
      drawScanlines();
    } else if (game.gameState === 'modeselect') {
      renderModeSelect();
      drawScanlines();
    } else if (game.gameState === 'feedback') {
      renderFeedback();
      drawScanlines();
    } else if (game.gameState === 'achievements') {
      renderAchievements();
      drawScanlines();
    } else if (game.gameState === 'gameover') {
      renderGameOver();
      drawScanlines();
    } else if (game.gameState === 'levelup') {
      renderLevelUp();
      drawScanlines();
    } else if (game.gameState === 'ascend') {
      renderAscend();
      drawScanlines();
    } else if (game.gameState === 'waveintro') {
      renderWaveIntro();
      drawScanlines();
    } else if (game.gameState === 'paused') {
      renderWorld();
      renderHUD();
      ctx.fillStyle = 'rgba(0,0,10,0.65)';
      ctx.fillRect(0, 0, W, H);
      text('PAUSED', W / 2, 105, 16, '#FFD700', 'center');
      if (game.blinkOn) {
        text('P / ESC / CLICK TO RESUME', W / 2, 140, 6, '#bbbbbb', 'center');
      }
      drawScanlines();
    } else {
      renderWorld();
      renderHUD();
      drawScanlines();
    }

    // shared back button on every menu screen (class-select has its own below the cards)
    if (BACK_STATES[game.gameState]) drawBackButton();

    // boss-death white flash, drawn on top of everything for a few frames
    if (game.whiteFlash > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(0, 0, W, H);
    }

    drawToasts();
  }

  // ---------------------------------------------------------------------------
  // GAME LOOP
  // ---------------------------------------------------------------------------
  fetchLeaderboard();
  initMenuBackdrop();
  // migrate pre-account players: claim a tag for the locally saved name
  if (runData.name && runData.name.length === 3 && !runData.playerDisc) {
    registerAccount(true);
  }

  var lastTime = performance.now();
  function loop(ts) {
    var dt = (ts - lastTime) / 1000;
    lastTime = ts;
    if (dt > 0.05) dt = 0.05; // cap to avoid spiral of death
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
