      orbs: [],          // orbiting shield orbs
      orbRadius: 40,
      orbSpeed: 0,       // radians/sec
      upgradesTaken: {}
    };
  }

  // Rebuild the orbiting-shield orbs from the current shield level.
  function rebuildOrbs() {
    var p = game.player;
    var count = 2 + p.shield;                              // 1st pick = 3 orbs, +1 each after
    p.orbSpeed = (120 + (p.shield - 1) * 30) * Math.PI / 180; // 120deg/s, +30 per extra pick
    if (p.bladeOrbit) p.orbSpeed *= 1.3;                   // evolution: faster spin
    var orbs = [];
    for (var i = 0; i < count; i++) {
      orbs.push({ angle: (Math.PI * 2 / count) * i, x: p.x, y: p.y, hitCd: {} });
    }
    p.orbs = orbs;
    p.orbRadius = 40;
  }

  function startGame() {
    game.particles = [];
    game.xp = 0;
    game.level = 1;
    game.score = 0;
    game.damageFlash = 0;
    game.shakeTimer = 0;
    game.whiteFlash = 0;
    game.time = 0;
    game.enemyUid = 0;
    game.advanceAfterLevel = false;
    game.newRecord = false;
    game.enemyShots = [];
    game.waveBanner = 0;
    game.curseHpMult = 1;
    game.curseSpeedMult = 1;
    game.cultistLevel = 0;
    game.dmgDealt = 0;
    game.floatTexts = [];
    game.pickups = [];
    game.hitStop = 0;
    game.zaps = [];
    game.spawnHaste = 1;
    game.freezeTimer = 0;
    game.coinsEarned = 0;
    game.tookDamage = false;
    game.mode = pendingMode;
    pendingMode = 'normal';
    leaderboard.submitState = '';
    game.player = makePlayer();
    // every run starts with the chosen class's stats
    var cls = classDef(currentClass);
    var pl = game.player;
    pl.maxHp = cls.hp; pl.hp = cls.hp;
    pl.speed = cls.speed;
    pl.damage = cls.damage;
    pl.attackCooldown = cls.cooldown;
    pl.pierce = cls.pierce;
    pl.homingBase = cls.homingBase;
    // permanent vault-shop perks on top of class stats
    var shop = runData.shop;
    pl.maxHp += 20 * shop.vit; pl.hp = pl.maxHp;
    pl.damage = Math.round(pl.damage * (1 + 0.1 * shop.mig));
    pl.speed += 5 * shop.swf;
    pl.xpMult *= (1 + 0.1 * shop.wis);
    buildFloor();
    beginWave(1);
    startMusic();
  }

  // Set up a wave. Wave 1 gets the frozen 2-second intro card; later waves
  // flow continuously — surviving enemies carry over and a banner fades in.
  function beginWave(n) {
    // achievements that resolve on wave boundaries
    if (n > 2 && !game.tookDamage) unlockAch('untouchable');
    game.tookDamage = false;
    if (n >= 5) unlockAch('wave_5');
    if (n >= 10) unlockAch('wave_10');
    game.wave = n;
    game.bossWave = (n % 5 === 0);
    game.boss = null;
    game.waveKills = 0;
    game.waveTarget = game.bossWave ? 1 : (15 + n * 5);
    game.spawnTimer = 0;
    game.shockwaves = [];
    walls = generateWalls(n);
    // free anything the new wall layout trapped, and reset edge flags
    for (var ce = 0; ce < game.enemies.length; ce++) {
      pushOutOfWalls(game.enemies[ce]);
      game.enemies[ce].atEdge = false;
      game.enemies[ce].edgeTimer = 0;
    }
    if (game.player) pushOutOfWalls(game.player);
    if (n === 1) {
      game.enemies = [];
      game.projectiles = [];
      game.enemyShots = [];
      game.gameState = 'waveintro';
      game.waveIntroTimer = 2.0;
    } else {
      game.waveBanner = 2.0;
      game.gameState = 'playing';
      // breather: a small heal for surviving the wave
      var hpl = game.player;
      var heal = Math.min(Math.round(15 * hpl.healMult), hpl.maxHp - hpl.hp);
      if (heal > 0) {
        hpl.hp += heal;
        spawnFloatText(hpl.x, hpl.y, '+' + Math.round(heal), '#33ff66');
      }
      if (game.bossWave) spawnBoss();
    }
  }

  // ---------------------------------------------------------------------------
  // ENEMY FACTORY
  // ---------------------------------------------------------------------------
  function enemyTypeForWave(wave) {
    var roll = Math.random();
    if (wave >= 5 && roll < 0.10) return 'wraith';
    if (wave >= 3 && roll < 0.22) return 'bomber';
    if (wave >= 2 && roll < 0.36) return 'splitter';
    if (wave >= 4 && roll < 0.55) return 'orc';
    if (roll < 0.75) return 'skeleton';
    return 'slime';
  }

  var ENEMY_DATA = {
    skeleton: { hp: 30, color: '#8b9bb4', tile: TILE.skeleton },
    slime:    { hp: 50, color: '#43e1b3', tile: TILE.slime },
    orc:      { hp: 120, color: '#e84537', tile: TILE.orc },
    cultist:  { hp: 45, color: '#9b59b6', tile: TILE.skeleton },
    splitter: { hp: 70, color: '#7ad9a8', tile: TILE.slime },     // splits into minis
    mini:     { hp: 16, color: '#43e1b3', tile: TILE.slime },     // splitter offspring
    bomber:   { hp: 35, color: '#ff7733', tile: TILE.orc },       // suicide explosion
    wraith:   { hp: 25, color: '#ccccff', tile: { x: 16, y: 160 } } // ghost: ignores walls
  };

  function spawnEnemy() {
    if (game.enemies.length >= 200) return;
    var type = enemyTypeForWave(game.wave);
    // Dark Pact curse: ranged cultists join the spawn pool
    if (game.cultistLevel > 0 && Math.random() < 0.08 + 0.05 * game.cultistLevel) {
      type = 'cultist';
    }
    var data = ENEMY_DATA[type];
    // pick an edge (not corners): bias spawn away from exact corners
    var edge = randInt(0, 3);
    var x, y;
    if (edge === 0) { x = rand(20, W - 20); y = -16; }          // top
    else if (edge === 1) { x = W + 16; y = rand(20, H - 20); }  // right
    else if (edge === 2) { x = rand(20, W - 20); y = H + 16; }  // bottom
    else { x = -16; y = rand(20, H - 20); }                     // left

    spawnEnemyAt(type, x, y);
  }

  function spawnEnemyAt(type, x, y) {
    var data = ENEMY_DATA[type];
    // early-game ease: 5% softer at wave 1, fading to full by wave 6
    var ease = 1 - Math.max(0, 6 - game.wave) * 0.01;
    // difficulty scaling: +30% HP per wave (plus curses), faster, harder hits
    var hp = Math.round(data.hp * (1 + (game.wave - 1) * 0.3) * game.curseHpMult * ease);
    var speed = (40 + game.wave * 6) * game.curseSpeedMult * ease;
    var size = 14;
    if (type === 'cultist') speed *= 0.8;
    if (type === 'wraith') { speed *= 1.35; size = 12; }
    if (type === 'bomber') speed *= 1.15;
    if (type === 'splitter') { speed *= 0.8; size = 16; }
    if (type === 'mini') { speed *= 1.2; size = 10; }
    var e = {
      type: type, isBoss: false, uid: game.enemyUid++,
      x: x, y: y,
      w: size, h: size,
      hp: hp, maxHp: hp,
      // XP follows base hp, not the scaled value, so curses/waves don't
      // feed the player more XP for the same kill
      xpVal: (data.hp / 5) * (1 + (game.wave - 1) * 0.1),
      color: data.color,
      tile: data.tile,
      speed: speed,
      contact: 10 + Math.floor(game.wave / 3) * 3,
      shootTimer: rand(1.0, 2.0),
      fuse: -1,            // bomber: countdown once armed
      elite: false,
      kx: 0, ky: 0,        // knockback velocity
      hitFlash: 0,
      animPhase: rand(0, Math.PI * 2)
    };
    // elite roll: rare gold-ringed variant, triple HP, juicy XP
    if (game.wave >= 3 && type !== 'mini' && Math.random() < 0.06) {
      e.elite = true;
      e.hp = e.maxHp = e.hp * 3;
      e.xpVal *= 2.5;
      e.speed *= 1.05;
      e.contact += 5;
      e.w += 2; e.h += 2;
    }
    // mid-screen spawns (summoner minions, splitter minis) must not start
    // inside a wall, or they would be stuck on both axes forever
    pushOutOfWalls(e);
    game.enemies.push(e);
    return e;
  }

  // Spawn a single boss from the top-centre of the canvas. Three kinds rotate
  // by boss number: charger (dashes), summoner (spawns minions), spiral
  // (bullet rings).
  var BOSS_KINDS = ['charger', 'summoner', 'spiral'];

  function spawnBoss() {
    var kind = BOSS_KINDS[(Math.round(game.wave / 5) - 1 + 300) % 3];
    var hp = Math.round((600 + game.wave * 80) * game.curseHpMult);
    var boss = {
      type: 'boss', isBoss: true, kind: kind, uid: game.enemyUid++,
      x: W / 2, y: -20,
      w: 28, h: 28,
      hp: hp, maxHp: hp,
      color: kind === 'summoner' ? '#9b59b6' : (kind === 'spiral' ? '#2ec4b6' : '#e84537'),
      tile: TILE.boss,
      speed: kind === 'charger' ? 22 : 28,
      contact: 25,
      aiTimer: 3,          // time until next special (dash/summon/ring)
      dashTimer: 0,        // charger: remaining dash time
      dashVx: 0, dashVy: 0,
      telegraph: 0,        // charger: wind-up before the dash
      kx: 0, ky: 0,
      hitFlash: 0,
      animPhase: 0
    };
    game.enemies.push(boss);
    game.boss = boss;
  }

  // ---------------------------------------------------------------------------
  // PARTICLES
  // ---------------------------------------------------------------------------
  function spawnDeathParticles(x, y, color) {
    for (var i = 0; i < 8; i++) {
      if (game.particles.length >= 500) break;
      var ang = (Math.PI * 2 / 8) * i + rand(-0.3, 0.3);
      var spd = rand(40, 110);
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0.5, maxLife: 0.5,
        size: 2,
        color: color
      });
    }
  }

  // Floating combat text (damage numbers, heals, pickups).
  function spawnFloatText(x, y, txt, color) {
    if (game.floatTexts.length >= 80) return;
    game.floatTexts.push({ x: x + rand(-4, 4), y: y - 8, txt: txt, color: color, t: 0, life: 0.55 });
  }

  // Small grey sparks where a projectile strikes a wall.
  function spawnWallSparks(x, y) {
    for (var i = 0; i < 3; i++) {
      if (game.particles.length >= 500) break;
      var ang = rand(0, Math.PI * 2);
      var spd = rand(30, 70);
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 0.3, maxLife: 0.3,
        size: 2,
        color: '#99a3ad'
      });
    }
  }

  // Over-the-top boss death burst: 40 red/orange/gold 3x3 particles.
  function bossExplosion(x, y) {
    var cols = ['#ff2d2d', '#ff8c00', '#ffd700'];
    for (var i = 0; i < 40; i++) {
      if (game.particles.length >= 500) break;
      var ang = rand(0, Math.PI * 2);
      var spd = rand(100, 300);
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1.2, maxLife: 1.2,
        size: 3,
        color: cols[randInt(0, 2)]
      });
    }
  }

  // ---------------------------------------------------------------------------
  // SHOOTING
  // ---------------------------------------------------------------------------
  function findNearestEnemy(px, py) {
    var best = null, bestD = Infinity;
    for (var i = 0; i < game.enemies.length; i++) {
      var e = game.enemies[i];
      var dx = e.x - px, dy = e.y - py;
      var d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; best = e; }
    }
    return best;
  }

  function spawnProjectile(p, ang, dmg) {
    game.projectiles.push({
      x: p.x, y: p.y,
      vx: Math.cos(ang) * p.shotSpeed,
      vy: Math.sin(ang) * p.shotSpeed,
      damage: dmg,
      pierce: p.railgun ? 99 : p.pierce,
      bounces: p.ricochet,
      // homing strength: 0.08 base, +0.04 per extra pick; mage has an
      // innate 0.06 without the upgrade.
      homing: p.homing > 0 ? (0.08 + (p.homing - 1) * 0.04) : (p.homingBase || 0),
      hitSet: []
    });
  }

  function fireWeapon() {
    var p = game.player;
    var target = findNearestEnemy(p.x, p.y);
    if (!target) return;
    var baseAng = Math.atan2(target.y - p.y, target.x - p.x);

    // main fan (multishot)
    var n = p.projectiles;
    var spread = 15 * Math.PI / 180; // 15 degrees between shots
    for (var i = 0; i < n; i++) {
      spawnProjectile(p, baseAng + (i - (n - 1) / 2) * spread, p.damage);
    }

    // shotgun blast: 5 pellets over 60deg, +2 pellets & +10deg per extra pick.
    // Seeker Swarm evolution: +4 pellets that hit at 0.8x instead of 0.6x.
    if (p.shotgun > 0) {
      var pellets = 5 + (p.shotgun - 1) * 2 + (p.seekerSwarm ? 4 : 0);
      var arc = (60 + (p.shotgun - 1) * 10) * Math.PI / 180;
      var pfac = p.seekerSwarm ? 0.8 : 0.6;
      for (var k = 0; k < pellets; k++) {
        var t = pellets > 1 ? (k / (pellets - 1) - 0.5) : 0;
        spawnProjectile(p, baseAng + t * arc, p.damage * pfac);
      }
    }

    playShoot();
  }

  // ---------------------------------------------------------------------------
  // XP / LEVEL UP
  // ---------------------------------------------------------------------------
  // cheap first levels so the run gets going, steep later so it can't snowball
  function xpForNext() { return 30 + game.level * 45 + game.level * game.level * 8; }

  function gainXP(amount) {
    game.xp += amount;
    while (game.xp >= xpForNext()) {
      game.xp -= xpForNext();
      game.level++;
      triggerLevelUp();
    }
  }

  function triggerLevelUp() {
    game.gameState = 'levelup';
    playLevelUp();
    var taken = game.player.upgradesTaken;
    // an unlocked evolution is always offered (first card)
    var chosen = [];
    for (var ev = 0; ev < EVOLUTIONS.length && chosen.length === 0; ev++) {
      var evo = EVOLUTIONS[ev];
      var ready = !taken[evo.id];
      for (var nd = 0; nd < evo.needs.length; nd++) {
        if (!taken[evo.needs[nd]]) ready = false;
      }
      if (ready) chosen.push(evo);
    }
    // fill the remaining slots with distinct regular upgrades
    var pool = UPGRADES.slice();
    while (chosen.length < 3 && pool.length > 0) {
      var idx = randInt(0, pool.length - 1);
      chosen.push(pool.splice(idx, 1)[0]);
    }
    // build card rects
    var cardW = 120, cardH = 160, gap = 20;
    var totalW = chosen.length * cardW + (chosen.length - 1) * gap;
    var startX = (W - totalW) / 2;
    var cy = (H - cardH) / 2;
    game.cards = chosen.map(function (u, i) {
      return {
        upgrade: u,
        x: startX + i * (cardW + gap),
        y: cy,
        w: cardW, h: cardH
      };
    });
  }

  function applyUpgrade(u) {
    var p = game.player;
    p.upgradesTaken[u.id] = (p.upgradesTaken[u.id] || 0) + 1;
    switch (u.id) {
      // every upgrade carries a con; clamps keep heavy stacking survivable
      case 'multishot': p.projectiles = Math.min(5, p.projectiles + 1);
                        p.damage = Math.max(5, Math.round(p.damage * 0.85)); break;
      case 'atkspeed':  p.attackCooldown = Math.max(0.2, p.attackCooldown - 0.1);
                        p.shotSpeed = Math.max(100, Math.round(p.shotSpeed * 0.9)); break;
      case 'damage':    p.damage += 15;
                        p.attackCooldown = Math.min(1.6, p.attackCooldown + 0.05); break;
      case 'health':    p.maxHp += 30; p.hp = Math.min(p.maxHp, p.hp + Math.round(30 * p.healMult));
                        p.speed = Math.max(40, p.speed - 5); break;
      case 'movespeed': p.speed += 20;
                        p.maxHp = Math.max(30, p.maxHp - 10);
                        p.hp = Math.min(p.hp, p.maxHp); break;
      case 'pierce':    p.pierce += 1;
                        p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
      case 'vampire':   p.vampire += 3;
                        p.maxHp = Math.max(30, p.maxHp - 15);
                        p.hp = Math.min(p.hp, p.maxHp); break;
      case 'xpmagnet':  p.xpMult *= 1.2;
                        game.curseSpeedMult *= 1.08; break;
      case 'shotgun':   p.shotgun += 1;
                        p.attackCooldown = Math.min(1.6, p.attackCooldown + 0.1); break;
      case 'homing':    p.homing += 1;
                        p.shotSpeed = Math.max(100, Math.round(p.shotSpeed * 0.85)); break;
      case 'shield':    p.shield += 1; rebuildOrbs();
                        p.speed = Math.max(40, p.speed - 8); break;
      // cursed upgrades — the downside is permanent for the rest of the run
      case 'greed':       p.coinMult *= 2; game.curseHpMult *= 1.3; break;
      case 'darkpact':    p.projectiles = Math.min(6, p.projectiles + 1); game.cultistLevel++; break;
      case 'bloodrage':   p.damage += 25; game.curseSpeedMult *= 1.25; break;
      case 'glasscannon': p.damage = Math.round(p.damage * 1.6);
                          p.maxHp = Math.max(30, p.maxHp - 30);
                          p.hp = Math.min(p.hp, p.maxHp); break;
      case 'frost':     p.frost += 1;
                        p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
      case 'ricochet':  p.ricochet += 1;
                        p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
      case 'regen':     p.regen += 1;
                        p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
      case 'static':    p.staticLvl += 1;
                        p.attackCooldown = Math.min(1.6, p.attackCooldown + 0.05); break;
      case 'hastepact': p.speed = Math.round(p.speed * 1.15);
                        p.attackCooldown = Math.max(0.2, p.attackCooldown * 0.87);
                        game.spawnHaste *= 1.15; break;
      case 'bloodaltar': p.damage = Math.round(p.damage * 1.4);
                        p.healMult *= 0.5; break;
      // evolutions
      case 'seekerswarm': p.seekerSwarm = 1;
                          p.shotSpeed = Math.max(100, Math.round(p.shotSpeed * 0.9)); break;
      case 'bladeorbit':  p.bladeOrbit = 1; rebuildOrbs();
                          p.speed = Math.max(40, p.speed - 5); break;
      case 'railgun':     p.railgun = 1; p.damage += 25;
                          p.attackCooldown = Math.min(1.9, p.attackCooldown + 0.3); break;
      case 'bulletstorm': p.bulletstorm = 1;
                          p.projectiles = Math.min(7, p.projectiles + 1);
                          p.attackCooldown = Math.max(0.15, p.attackCooldown - 0.1);
                          p.damage = Math.max(5, Math.round(p.damage * 0.9)); break;
    }
    if (u.evolution) unlockAch('evolved');
    if (u.cursed) {
      var curses = 0;
      var cursedIds = ['greed', 'darkpact', 'bloodrage', 'glasscannon'];
      for (var ci = 0; ci < cursedIds.length; ci++) if (p.upgradesTaken[cursedIds[ci]]) curses++;
      if (curses >= 4) unlockAch('curse_hoarder');
    }
  }

  function tryPickCard(mx, my) {
    for (var i = 0; i < game.cards.length; i++) {
      var c = game.cards[i];
      if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
        applyUpgrade(c.upgrade);
        game.cards = [];
        if (game.advanceAfterLevel) {
          // a forced boss-kill level-up: proceed to the next wave intro
          game.advanceAfterLevel = false;
          beginWave(game.wave + 1);
        } else {
          game.gameState = 'playing';
        }
        return;
      }
    }
  }

  // ---------------------------------------------------------------------------
  // UPDATE
  // ---------------------------------------------------------------------------
  function update(dt) {
    game.scanlineOffset = (game.scanlineOffset + 1) % 4;
    game.blinkTimer += dt;
    if (game.blinkTimer >= 0.5) { game.blinkTimer = 0; game.blinkOn = !game.blinkOn; }
    if (game.damageFlash > 0) game.damageFlash -= dt;
    if (game.shakeTimer > 0) game.shakeTimer -= dt;
    if (game.whiteFlash > 0) game.whiteFlash -= 1;
    if (game.waveBanner > 0) game.waveBanner -= dt;
    for (var ti = game.toasts.length - 1; ti >= 0; ti--) {
      game.toasts[ti].t += dt;
      if (game.toasts[ti].t >= 3) game.toasts.splice(ti, 1);
    }

    // Wave intro card: freeze logic for 2s, then begin the wave.
    if (game.gameState === 'waveintro') {
      game.waveIntroTimer -= dt;
      if (game.waveIntroTimer <= 0) {
        game.gameState = 'playing';
        if (game.bossWave) spawnBoss();
      }
      return;
    }

    if (game.gameState !== 'playing') return;

    // run time only advances during actual play (not menus or pause)
    game.time += dt;

    // hit-stop: freeze the world for a few hundredths after a kill
    if (game.hitStop > 0) {
      game.hitStop -= dt;
      return;
    }

    var p = game.player;
    if (p.invuln > 0) p.invuln -= dt;

    // ----- player movement -----
    var dx = 0, dy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
    // virtual joystick (touch) overrides the keyboard when in use
    if (touchCtl.active && Math.abs(touchCtl.vx) + Math.abs(touchCtl.vy) > 0.2) {
      dx = touchCtl.vx; dy = touchCtl.vy;
    }
    p.moving = (dx !== 0 || dy !== 0);
    if (p.moving) {
      var len = Math.sqrt(dx * dx + dy * dy);
      dx /= len; dy /= len;
      // axis-separated wall collision so the player slides along walls
      var pnx = p.x + dx * p.speed * dt;
      var pny = p.y + dy * p.speed * dt;
      if (!boxHitsWall(pnx, pny, p.w, p.h)) { p.x = pnx; p.y = pny; }
      else if (!boxHitsWall(pnx, p.y, p.w, p.h)) { p.x = pnx; }
      else if (!boxHitsWall(p.x, pny, p.w, p.h)) { p.y = pny; }
      if (dx < 0) p.facing = -1;
      else if (dx > 0) p.facing = 1;
      p.walkAnim += dt * 8;
    }
    // clamp to play area
    p.x = clamp(p.x, p.w / 2, W - p.w / 2);
    p.y = clamp(p.y, p.h / 2, H - p.h / 2);

    // ----- auto attack (frenzy pickup halves the cooldown) -----
    if (p.frenzyTimer > 0) p.frenzyTimer -= dt;
    p.attackTimer -= dt;
    if (p.attackTimer <= 0) {
      fireWeapon();
      p.attackTimer = p.attackCooldown * (p.frenzyTimer > 0 ? 0.5 : 1);
    }

    // ----- regen upgrade -----
    if (p.regen > 0 && p.hp < p.maxHp) {
      p.hp = Math.min(p.maxHp, p.hp + p.regen * p.healMult * dt);
    }

    // ----- static burst: periodic zap of the nearest foes -----
    if (p.staticLvl > 0) {
      p.staticTimer -= dt;
      if (p.staticTimer <= 0) {
        p.staticTimer = 6;
        var zapTargets = game.enemies.slice()
          .map(function (en2) { var zdx = en2.x - p.x, zdy = en2.y - p.y; return { e: en2, d: zdx * zdx + zdy * zdy }; })
          .filter(function (t2) { return t2.d < 180 * 180; })
          .sort(function (a2, b2) { return a2.d - b2.d; })
          .slice(0, 2 + p.staticLvl);
        var zapDmg = 40 + (p.staticLvl - 1) * 15;
        for (var zt = 0; zt < zapTargets.length; zt++) {
          var ze = zapTargets[zt].e;
          ze.hp -= zapDmg;
          ze.hitFlash = 0.1;
          game.dmgDealt += zapDmg;
          spawnFloatText(ze.x, ze.y, '' + zapDmg, '#f5f76e');
          game.zaps.push({ x1: p.x, y1: p.y, x2: ze.x, y2: ze.y, t: 0.15 });
          if (ze.hp <= 0) {
            var zi = game.enemies.indexOf(ze);
            if (zi !== -1) {
              if (ze.isBoss) killBoss(zi, ze); else killEnemy(zi, ze);
            }
          }
        }
        if (zapTargets.length) playPickup();
      }
    }
    for (var zz = game.zaps.length - 1; zz >= 0; zz--) {
      game.zaps[zz].t -= dt;
      if (game.zaps[zz].t <= 0) game.zaps.splice(zz, 1);
    }

    // ----- enemy spawning (continuous; slower trickle during boss waves) -----
    // gentle for the first few waves, then ramps to the same late-game pressure
    var spawnInterval = Math.max(0.25, 1.5 - game.wave * 0.1) / game.spawnHaste;
    if (game.bossWave) spawnInterval *= 1.8;
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      spawnEnemy();
      game.spawnTimer = spawnInterval;
    }

    // ----- update projectiles -----
    for (var i = game.projectiles.length - 1; i >= 0; i--) {
      var pr = game.projectiles[i];
      // homing steering — applied BEFORE the position update, capped at 4deg/frame
      if (pr.homing > 0) {
        var ht = findNearestEnemy(pr.x, pr.y);
        if (ht) {
          var desired = Math.atan2(ht.y - pr.y, ht.x - pr.x);
          var cur = Math.atan2(pr.vy, pr.vx);
          var diff = desired - cur;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          var step = diff * pr.homing;
          var maxStep = 4 * Math.PI / 180;
          if (step > maxStep) step = maxStep;
          else if (step < -maxStep) step = -maxStep;
          var na = cur + step;
          var spd = Math.sqrt(pr.vx * pr.vx + pr.vy * pr.vy);
          pr.vx = Math.cos(na) * spd;
          pr.vy = Math.sin(na) * spd;
        }
      }
      pr.x += pr.vx * dt;
      pr.y += pr.vy * dt;
      // wall impact — only on entry, so a piercing shot pays once per wall
      var hitWall = boxHitsWall(pr.x, pr.y, 6, 6);
      if (hitWall && !pr.inWall) {
        spawnWallSparks(pr.x, pr.y);
        if (pr.pierce > 0) {
          pr.pierce--;
        } else {
          game.projectiles.splice(i, 1);
          continue;
        }
      }
      pr.inWall = !!hitWall;
      if (pr.x < -8 || pr.x > W + 8 || pr.y < -8 || pr.y > H + 8) {
        game.projectiles.splice(i, 1);
      }
    }

    // ----- update enemies (chrono pickup freezes them solid) -----
    if (game.freezeTimer > 0) game.freezeTimer -= dt;
    for (var j = game.enemies.length - 1; j >= 0; j--) {
      var e = game.enemies[j];
      if (e.hitFlash > 0) e.hitFlash -= dt;
      if (game.freezeTimer > 0) continue; // frozen: no moving, fusing, or shooting
      if (e.slowT > 0) e.slowT -= dt;
      // desired velocity: chase the player, plus decaying knockback.
      // cultists keep their distance and shoot instead of melee-rushing.
      var edx = p.x - e.x, edy = p.y - e.y;
      var ed = Math.sqrt(edx * edx + edy * edy) || 1;
      var chase = e.speed;
      if (e.type === 'cultist') {
        if (ed < 70) chase = -e.speed * 0.7;       // back away
        else if (ed < 110) chase = 0;              // hold range
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && ed < 220) {
          e.shootTimer = Math.max(1.2, 2.4 - game.cultistLevel * 0.2);
          var sa = Math.atan2(edy, edx);
          game.enemyShots.push({ x: e.x, y: e.y, vx: Math.cos(sa) * 100, vy: Math.sin(sa) * 100 });
        }
      }
      // bomber: arm the fuse near the player, flash, then detonate
      if (e.type === 'bomber') {
        if (e.fuse < 0 && ed < 26) e.fuse = 0.8;
        if (e.fuse >= 0) {
          e.fuse -= dt;
          chase = 0; // stands its ground while fusing
          if (e.fuse <= 0) { explodeBomber(j, e); continue; }
        }
      }

      // boss specials
      if (e.isBoss) {
        e.aiTimer -= dt;
        if (e.kind === 'charger') {
          if (e.dashTimer > 0) {
            e.dashTimer -= dt;
            var dnx = e.x + e.dashVx * dt, dny = e.y + e.dashVy * dt;
            if (!boxHitsWall(dnx, dny, e.w, e.h)) { e.x = dnx; e.y = dny; }
            else e.dashTimer = 0; // slams into a wall
            chase = 0;
          } else if (e.telegraph > 0) {
            e.telegraph -= dt;
            chase = 0;
            if (e.telegraph <= 0) {
              var da = Math.atan2(edy, edx);
              e.dashVx = Math.cos(da) * 300;
              e.dashVy = Math.sin(da) * 300;
              e.dashTimer = 0.5;
            }
          } else if (e.aiTimer <= 0) {
            e.telegraph = 0.8;
            e.aiTimer = 3.5;
          }
        } else if (e.kind === 'summoner') {
          if (ed < 130) chase = -e.speed;          // keeps its distance
          else if (ed < 170) chase = 0;
          if (e.aiTimer <= 0 && game.enemies.length < 195) {
            e.aiTimer = 4;
            for (var sm = 0; sm < 3; sm++) {
              spawnEnemyAt(enemyTypeForWave(game.wave), e.x + rand(-20, 20), e.y + rand(-20, 20));
            }
            spawnFloatText(e.x, e.y - 18, 'RISE!', '#9b59b6');
          }
        } else if (e.kind === 'spiral') {
          if (e.aiTimer <= 0) {
            e.aiTimer = 2.5;
            for (var sp = 0; sp < 12; sp++) {
              var spa = (Math.PI * 2 / 12) * sp + game.time;
              game.enemyShots.push({ x: e.x, y: e.y, vx: Math.cos(spa) * 80, vy: Math.sin(spa) * 80 });
            }
          }
        }
      }

      var slowF = e.slowT > 0 ? (1 - (e.slowAmt || 0.3)) : 1; // frost shots
      var mvx = (edx / ed) * chase * slowF + e.kx;
      var mvy = (edy / ed) * chase * slowF + e.ky;
      e.kx *= 0.85; e.ky *= 0.85;

      var ghost = (e.type === 'wraith'); // wraiths drift straight through walls
      if (!ghost) {
        // soft repulsion away from any wall within 20px — steering-based
        // avoidance so enemies flow around corners (no pathfinding)
        for (var wi = 0; wi < walls.length; wi++) {
          var wl = walls[wi];
          var wnx = clamp(e.x, wl.x, wl.x + wl.w);
          var wny = clamp(e.y, wl.y, wl.y + wl.h);
          var rdx = e.x - wnx, rdy = e.y - wny;
          var rd = Math.sqrt(rdx * rdx + rdy * rdy);
          if (rd > 0 && rd < 20) {
            var rf = (1 - rd / 20) * 60;
            mvx += (rdx / rd) * rf;
            mvy += (rdy / rd) * rf;
          }
        }
      }

      // axis-separated wall collision (full bounding box, not centre point)
      var enx = e.x + mvx * dt, eny = e.y + mvy * dt;
      if (ghost || !boxHitsWall(enx, eny, e.w, e.h)) {
        e.x = enx; e.y = eny;
      } else if (!boxHitsWall(enx, e.y, e.w, e.h)) {
        e.x = enx;
      } else if (!boxHitsWall(e.x, eny, e.w, e.h)) {
        e.y = eny;
      }
      // both axes blocked: stay put this frame

      // screen-edge danger countdown (bosses are immune)
      if (!e.isBoss) {
        var nearEdge = (e.x < 10 || e.x > W - 10 || e.y < 10 || e.y > H - 10);
        if (nearEdge) {
          if (!e.atEdge) { e.atEdge = true; e.edgeTimer = 0; }
          e.edgeTimer += dt;
          if (e.edgeTimer >= 1.5) {
            triggerShockwave(e.x, e.y);
            game.enemies.splice(j, 1);
            continue;
          }
        } else {
          e.atEdge = false;
          e.edgeTimer = 0;
        }
      }

      // contact with player (i-frames: damage at most once per 0.5s)
      if (Math.abs(p.x - e.x) < (p.w / 2 + e.w / 2) &&
          Math.abs(p.y - e.y) < (p.h / 2 + e.h / 2)) {
        // knock normal enemies back even during i-frames; boss is immovable
        if (!e.isBoss) {
          var kdx = (e.x - p.x) / ed;
          var kdy = (e.y - p.y) / ed;
          e.kx = kdx * 120;
          e.ky = kdy * 120;
        }
        damagePlayer(e.contact, true);
      }
    }

    // ----- cultist projectiles (also frozen by chrono) -----
    for (var es = game.enemyShots.length - 1; es >= 0; es--) {
      var sh = game.enemyShots[es];
      if (game.freezeTimer > 0) break;
      sh.x += sh.vx * dt;
      sh.y += sh.vy * dt;
      if (boxHitsWall(sh.x, sh.y, 5, 5)) {
        spawnWallSparks(sh.x, sh.y);
        game.enemyShots.splice(es, 1);
        continue;
      }
      if (Math.abs(sh.x - p.x) < (p.w / 2 + 3) && Math.abs(sh.y - p.y) < (p.h / 2 + 3)) {
        damagePlayer(10, false);
        game.enemyShots.splice(es, 1); // the bolt is spent either way
        continue;
      }
      if (sh.x < -8 || sh.x > W + 8 || sh.y < -8 || sh.y > H + 8) {
        game.enemyShots.splice(es, 1);
      }
    }

    // ----- edge shockwave effects tick -----
    for (var sw = game.shockwaves.length - 1; sw >= 0; sw--) {
      game.shockwaves[sw].t += dt;
      if (game.shockwaves[sw].t >= 0.6) game.shockwaves.splice(sw, 1);
    }

    // ----- floating combat text -----
    for (var ft = game.floatTexts.length - 1; ft >= 0; ft--) {
      var f = game.floatTexts[ft];
      f.t += dt;
      f.y -= 24 * dt;
      if (f.t >= f.life) game.floatTexts.splice(ft, 1);
    }

    // ----- pickups: expire and collect -----
    for (var pk = game.pickups.length - 1; pk >= 0; pk--) {
      var pu = game.pickups[pk];
      pu.t -= dt;
      if (pu.t <= 0) { game.pickups.splice(pk, 1); continue; }
      var pdx = pu.x - p.x, pdy = pu.y - p.y;
      if (pdx * pdx + pdy * pdy < 12 * 12) {
        collectPickup(pu);
        game.pickups.splice(pk, 1);
      }
    }

    // ----- projectile vs enemy collisions -----
    for (var pi = game.projectiles.length - 1; pi >= 0; pi--) {
      var proj = game.projectiles[pi];
      var removed = false;
      for (var ei = game.enemies.length - 1; ei >= 0; ei--) {
        var en = game.enemies[ei];
        if (proj.hitSet.indexOf(en) !== -1) continue;
        if (Math.abs(proj.x - en.x) < (en.w / 2 + 3) &&
            Math.abs(proj.y - en.y) < (en.h / 2 + 3)) {
          en.hp -= proj.damage;
          game.dmgDealt += proj.damage;
          spawnFloatText(en.x, en.y, '' + Math.round(proj.damage), '#ffe600');
          en.hitFlash = 0.08;
          // frost shots chill whatever they hit
          if (p.frost > 0) {
            en.slowT = 1.0;
            en.slowAmt = Math.min(0.6, 0.3 + (p.frost - 1) * 0.15);
          }
          proj.hitSet.push(en);
          if (en.hp <= 0) {
            if (en.isBoss) killBoss(ei, en); else killEnemy(ei, en);
          }
          if (proj.pierce > 0) {
            proj.pierce--;
          } else if (proj.bounces > 0) {
            // ricochet: retarget the nearest unhit enemy within 120px
            var bTarget = null, bDist = 120 * 120;
            for (var bi2 = 0; bi2 < game.enemies.length; bi2++) {
              var cand = game.enemies[bi2];
              if (proj.hitSet.indexOf(cand) !== -1) continue;
              var bdx = cand.x - proj.x, bdy = cand.y - proj.y;
              var bd2 = bdx * bdx + bdy * bdy;
              if (bd2 < bDist) { bDist = bd2; bTarget = cand; }
            }
            if (bTarget) {
              proj.bounces--;
              var bAng = Math.atan2(bTarget.y - proj.y, bTarget.x - proj.x);
              var bSpd = Math.sqrt(proj.vx * proj.vx + proj.vy * proj.vy);
              proj.vx = Math.cos(bAng) * bSpd;
              proj.vy = Math.sin(bAng) * bSpd;
            } else {
              game.projectiles.splice(pi, 1);
              removed = true;
              break;
            }
          } else {
            game.projectiles.splice(pi, 1);
            removed = true;
            break;
          }
        }
      }
      if (removed) continue;
    }

    // ----- orbiting shield orbs -----
    if (p.orbs && p.orbs.length) {
      for (var oi = 0; oi < p.orbs.length; oi++) {
        var orb = p.orbs[oi];
        orb.angle += p.orbSpeed * dt;
        orb.x = p.x + Math.cos(orb.angle) * p.orbRadius;
        orb.y = p.y + Math.sin(orb.angle) * p.orbRadius;
        // collide with enemies (descending so splices are safe)
        for (var oe = game.enemies.length - 1; oe >= 0; oe--) {
          var oen = game.enemies[oe];
          var rr = oen.w / 2 + 6;
          var odx = orb.x - oen.x, ody = orb.y - oen.y;
          if (odx * odx + ody * ody < rr * rr) {
            var until = orb.hitCd[oen.uid] || 0;
            if (game.time >= until) {
              var orbDmg = p.bladeOrbit ? 40 : 15;
              oen.hp -= orbDmg;
              game.dmgDealt += orbDmg;
              spawnFloatText(oen.x, oen.y, '' + orbDmg, '#00e5ff');
              oen.hitFlash = 0.08;
              orb.hitCd[oen.uid] = game.time + 0.5; // per-orb, per-enemy cooldown
              if (oen.hp <= 0) {
                if (oen.isBoss) killBoss(oe, oen); else killEnemy(oe, oen);
              }
            }
          }
        }
      }
    }

    // ----- update particles -----
    for (var pa = game.particles.length - 1; pa >= 0; pa--) {
      var part = game.particles[pa];
      part.life -= dt;
      if (part.life <= 0) { game.particles.splice(pa, 1); continue; }
      part.x += part.vx * dt;
      part.y += part.vy * dt;
      part.vx *= 0.92; part.vy *= 0.92;
    }

    // ----- wave completion (normal waves; boss waves end on boss death) -----
    if (!game.bossWave && game.waveKills >= game.waveTarget) {
      beginWave(game.wave + 1);
    }
  }

  function killEnemy(index, en) {
    spawnDeathParticles(en.x, en.y, en.color);
    var p = game.player;
    gainXP((en.xpVal || en.maxHp / 5) * p.xpMult);
    if (p.vampire > 0) {
      p.hp = Math.min(p.maxHp, p.hp + p.vampire * p.healMult);
    }
    game.score++;
    game.waveKills++;
    game.coinsEarned += (1 + Math.floor(game.wave / 5)) * (1 + 0.25 * runData.shop.frt) * p.coinMult;
    if (game.score === 1) unlockAch('first_blood');
    game.hitStop = Math.max(game.hitStop, 0.03); // tiny punch on every kill
    maybeDropPickup(en.x, en.y);
    game.enemies.splice(index, 1);
    // splitters burst into two fast minis
    if (en.type === 'splitter' && game.enemies.length < 198) {
      spawnEnemyAt('mini', en.x - 6, en.y);
      spawnEnemyAt('mini', en.x + 6, en.y);
    }
  }

  // Bomber self-destruct: hurts the player AND other enemies caught in it.
  function explodeBomber(index, e) {
    game.enemies.splice(index, 1);
    game.shockwaves.push({ x: e.x, y: e.y, t: 0, color: '#ff9f1c', label: 'BOOM!' });
    game.shakeTimer = 0.25;
    var p = game.player;
    var dx = p.x - e.x, dy = p.y - e.y;
    if (dx * dx + dy * dy < 50 * 50) {
      damagePlayer(25, false);
    }
    for (var i = game.enemies.length - 1; i >= 0; i--) {
      var o = game.enemies[i];
      var ox = o.x - e.x, oy = o.y - e.y;
      if (ox * ox + oy * oy < 50 * 50) {
        o.hp -= 40;
        o.hitFlash = 0.1;
        game.dmgDealt += 40;
        if (o.hp <= 0) {
          if (o.isBoss) killBoss(i, o); else killEnemy(i, o);
        }
      }
    }
    spawnDeathParticles(e.x, e.y, '#ff9f1c');
  }

  // ---------------------------------------------------------------------------
  // PICKUPS — potions heal, bombs clear, frenzy doubles fire rate briefly
  // ---------------------------------------------------------------------------
  function maybeDropPickup(x, y) {
    if (game.pickups.length >= 6) return;
    var roll = Math.random();
    var type = null;
    if (roll < 0.04) type = 'potion';
    else if (roll < 0.055) type = 'bomb';
    else if (roll < 0.07) type = 'frenzy';
    else if (roll < 0.085) type = 'barrier';
    else if (roll < 0.095) type = 'chrono';
    if (!type) return;
    game.pickups.push({ x: x, y: y, type: type, t: 8 });
  }

  function collectPickup(pk) {
    var p = game.player;
    playPickup();
    if (pk.type === 'potion') {
      var heal = Math.min(Math.round(25 * p.healMult), p.maxHp - p.hp);
      p.hp += heal;
      spawnFloatText(p.x, p.y, '+' + Math.round(heal), '#33ff66');
    } else if (pk.type === 'barrier') {
      p.barrier = 3;
      spawnFloatText(p.x, p.y, 'BARRIER!', '#00e5ff');
    } else if (pk.type === 'chrono') {
      game.freezeTimer = 2.5;
      spawnFloatText(p.x, p.y, 'TIME FREEZE!', '#8fd8ff');
    } else if (pk.type === 'bomb') {
      game.whiteFlash = 3;
      game.shakeTimer = 0.4;
      for (var i = game.enemies.length - 1; i >= 0; i--) {
        var e = game.enemies[i];
        e.hp -= 60;
        e.hitFlash = 0.1;
        game.dmgDealt += 60;
        spawnFloatText(e.x, e.y, '60', '#ff9f1c');
        if (e.hp <= 0) {
          if (e.isBoss) killBoss(i, e); else killEnemy(i, e);
        }
      }
    } else if (pk.type === 'frenzy') {
      p.frenzyTimer = 5;
      spawnFloatText(p.x, p.y, 'FRENZY!', '#ffe600');
    }
  }

  function killBoss(index, en) {
    bossExplosion(en.x, en.y);
    playBossDeath();
    unlockAch('boss_slayer');
    game.coinsEarned += 25 * (1 + 0.25 * runData.shop.frt) * game.player.coinMult;
    game.whiteFlash = 3;          // flash white for 3 frames
    game.shakeTimer = 0.5;
    game.hitStop = 0.2;           // dramatic freeze-frame
    game.score++;
    game.enemies.splice(index, 1);
    game.boss = null;
    // boss always grants a level-up, then the next wave intro follows.
    game.advanceAfterLevel = true;
    gainXP(xpForNext() - game.xp + 1); // guarantees exactly one level-up
  }

  // Single entry point for anything that hurts the player: respects i-frames
  // and barrier charges, handles death.
  function damagePlayer(amount, shake) {
    var p = game.player;
    if (p.invuln > 0) return;
    if (p.barrier > 0) {
      p.barrier--;
      p.invuln = 0.4;
      spawnFloatText(p.x, p.y - 10, 'BLOCKED', '#00e5ff');
      playPickup();
      return;
    }
    p.hp -= amount;
    p.invuln = 0.5;
    game.tookDamage = true;
    game.damageFlash = 0.1;
    if (shake) game.shakeTimer = 0.3;
    playHit();
    if (p.hp <= 0) {
      p.hp = 0;
      endRun();
    }
  }

  // An enemy survived 1.5s at a screen edge: detonate it.
  function triggerShockwave(x, y) {
    game.shockwaves.push({ x: x, y: y, t: 0 });
    var p = game.player;
    var dx = p.x - x, dy = p.y - y;
    if (dx * dx + dy * dy < 120 * 120) {
      damagePlayer(20, true);
    }
  }

  // The only place persistent records are written — never mid-run.
  function endRun() {
    if (game.gameState === 'gameover') return;
    game.gameState = 'gameover';
    game.newRecord = false;
    if (game.wave > runData.bestWave) { runData.bestWave = game.wave; game.newRecord = true; }
    if (game.score > runData.bestKills) { runData.bestKills = game.score; game.newRecord = true; }
    if (game.level > runData.bestLevel) { runData.bestLevel = game.level; game.newRecord = true; }
    runData.totalRuns++;
    runData.totalKills += game.score;
    runData.coins += Math.round(game.coinsEarned);
    if (runData.coins >= 500) unlockAch('moneybags');
    saveRunData();
    submitScore();
    stopMusic();
  }

  // ---------------------------------------------------------------------------
  // RENDER HELPERS
  // ---------------------------------------------------------------------------
  function text(str, x, y, size, color, align) {
    ctx.font = size + 'px "Press Start 2P"';
    ctx.textAlign = align || 'left';
    ctx.textBaseline = 'top';
    // 1px black shadow
    ctx.fillStyle = '#000';
    ctx.fillText(str, x + 1, y + 1);
    ctx.fillStyle = color;
    ctx.fillText(str, x, y);
  }

  function pad(num, len) {
    var s = '' + num;
    while (s.length < len) s = '0' + s;
    return s;
  }

  // ---------------------------------------------------------------------------
  // RENDER WORLD
  // ---------------------------------------------------------------------------
  function drawFloor() {
    var useSheet = !useProceduralSprites && sheetReady;
    for (var i = 0; i < floorTiles.length; i++) {
      var t = floorTiles[i];
      if (useSheet) {
        var tile = t.variant === 2 ? TILE.floorAlt : (t.variant === 1 ? TILE.wall : TILE.floor);
        drawTile(tile, t.x, t.y, TILE_SIZE, TILE_SIZE, false);
        if (t.variant === 1) {
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          ctx.fillRect(t.x, t.y, TILE_SIZE, TILE_SIZE);
        }
      } else {
        var sh = t.shade;
        if (t.variant === 1) sh = Math.floor(sh * 0.5);
        else if (t.variant === 2) sh = sh + 10;
        ctx.fillStyle = 'rgb(' + sh + ',' + sh + ',' + (sh + 6) + ')';
        ctx.fillRect(t.x, t.y, TILE_SIZE, TILE_SIZE);
        // subtle grid lines
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(t.x, t.y, TILE_SIZE, 1);
        ctx.fillRect(t.x, t.y, 1, TILE_SIZE);
      }
    }
  }

  function drawWalls() {
    // NOTE: the sheet tile at (0,144) is the slime sprite in this packing, so
    // walls always use the boxy procedural style to stay visually distinct.
    for (var i = 0; i < walls.length; i++) {
      var wl = walls[i];
      ctx.fillStyle = wl.tileVariant === 1 ? '#36475a' : '#334455';
      ctx.fillRect(wl.x, wl.y, wl.w, wl.h);
      // 1px border
      ctx.fillStyle = '#556677';
      ctx.fillRect(wl.x, wl.y, wl.w, 1);
      ctx.fillRect(wl.x, wl.y + wl.h - 1, wl.w, 1);
      ctx.fillRect(wl.x, wl.y, 1, wl.h);
      ctx.fillRect(wl.x + wl.w - 1, wl.y, 1, wl.h);
      // inner shadow along top/left for 8-bit depth
      ctx.fillStyle = '#223344';
      ctx.fillRect(wl.x + 1, wl.y + 1, wl.w - 2, 1);
      ctx.fillRect(wl.x + 1, wl.y + 1, 1, wl.h - 2);
      // 16px seams so big chunks read as tiled blocks
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for (var sx2 = 16; sx2 < wl.w; sx2 += 16) ctx.fillRect(wl.x + sx2, wl.y, 1, wl.h);
      for (var sy2 = 16; sy2 < wl.h; sy2 += 16) ctx.fillRect(wl.x, wl.y + sy2, wl.w, 1);
    }
  }

  function drawPickups() {
    for (var i = 0; i < game.pickups.length; i++) {
      var pk = game.pickups[i];
      // blink during the last 2 seconds before despawning
      if (pk.t < 2 && Math.floor(pk.t * 6) % 2 === 0) continue;
      var x = Math.round(pk.x), y = Math.round(pk.y);
      if (pk.type === 'potion') {
        ctx.fillStyle = '#dddddd';
        ctx.fillRect(x - 2, y - 7, 4, 3);        // neck
        ctx.fillStyle = '#33ff66';
        ctx.fillRect(x - 4, y - 4, 8, 8);        // flask body
        ctx.fillStyle = '#88ffaa';
        ctx.fillRect(x - 3, y - 3, 2, 2);        // shine
      } else if (pk.type === 'bomb') {
        ctx.fillStyle = '#222233';
        ctx.fillRect(x - 5, y - 4, 10, 9);
        ctx.fillStyle = '#555566';
        ctx.fillRect(x - 4, y - 3, 3, 3);
        ctx.fillStyle = '#ff9f1c';
        ctx.fillRect(x + 2, y - 7, 2, 3);        // lit fuse
      } else if (pk.type === 'frenzy') {
        ctx.fillStyle = '#ffe600';
        ctx.fillRect(x - 1, y - 7, 3, 6);        // lightning bolt
        ctx.fillRect(x - 3, y - 2, 5, 3);
        ctx.fillRect(x, y + 1, 3, 6);
      } else if (pk.type === 'barrier') {
        ctx.strokeStyle = '#00e5ff';             // shield bubble
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#00e5ff';
        ctx.fillRect(x - 2, y - 2, 4, 4);
      } else if (pk.type === 'chrono') {
        ctx.fillStyle = '#ffffff';               // clock face
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#223344';
        ctx.fillRect(x, y - 4, 1, 4);            // hands
        ctx.fillRect(x, y, 3, 1);
      }
    }
  }

  function drawFloatTexts() {
    for (var i = 0; i < game.floatTexts.length; i++) {
      var f = game.floatTexts[i];
      ctx.globalAlpha = Math.max(0, 1 - f.t / f.life);
      text(f.txt, f.x, f.y, 6, f.color, 'center');
      ctx.globalAlpha = 1;
    }
  }

  // Pulsing warning rings on edge enemies + expanding shockwave rings.
  function drawEdgeEffects() {
    for (var i = 0; i < game.enemies.length; i++) {
      var e = game.enemies[i];
      if (e.atEdge) {
        var r = 16 + Math.sin(game.time * Math.PI * 4) * 4; // 12..20px, 0.5s cycle
        ctx.strokeStyle = 'rgba(255,45,45,0.6)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    for (var s = 0; s < game.shockwaves.length; s++) {
      var sw = game.shockwaves[s];
      if (sw.t < 0.4) {
        var prog = sw.t / 0.4;
        ctx.strokeStyle = sw.color || '#ff4444';
        ctx.globalAlpha = 0.8 * (1 - prog);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, prog * (sw.label === 'BOOM!' ? 50 : 80), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      ctx.globalAlpha = Math.max(0, 1 - sw.t / 0.6);
      text(sw.label || 'SHOCKWAVE!', sw.x, sw.y - 24, 8, sw.color || '#ff2d2d', 'center');
      ctx.globalAlpha = 1;
    }
  }

  // Permanent red strips along all four edges: the edges are dangerous.
  function drawEdgeTint() {
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.fillRect(0, 0, W, 4);
    ctx.fillRect(0, H - 4, W, 4);
    ctx.fillRect(0, 4, 4, H - 8);
    ctx.fillRect(W - 4, 4, 4, H - 8);
  }

  function drawPlayer() {
    var p = game.player;
    // blink while invulnerable so the i-frames read clearly
    if (p.invuln > 0 && Math.floor(p.invuln * 14) % 2 === 0) return;
    var dx = Math.round(p.x - 8);
    var dy = Math.round(p.y - 8);
    var bob = (p.moving && Math.floor(p.walkAnim) % 2 === 0) ? -1 : 0;
    // each class has its own hero sprite
    var tile = classDef(currentClass).tile;
    var drew = drawTile(tile, dx, dy + bob, 16, 16, p.facing === -1);
    if (!drew) {
      // procedural: 12x16 white body + 4x4 cyan head
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.round(p.x - 6), Math.round(p.y - 8) + bob, 12, 16);
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(Math.round(p.x - 2), Math.round(p.y - 8) + bob, 4, 4);
      // a little eye to show facing
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.round(p.x - 2 + (p.facing === 1 ? 2 : 0)), Math.round(p.y - 2) + bob, 2, 2);
    }
    // class-coloured marker under the hero
    ctx.fillStyle = classDef(currentClass).color;
    ctx.fillRect(Math.round(p.x - 6), Math.round(p.y + 9), 12, 2);
    // frenzy aura
    if (p.frenzyTimer > 0) {
      ctx.strokeStyle = 'rgba(255,230,0,' + (0.3 + 0.3 * Math.abs(Math.sin(game.time * 10))) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 13, 0, Math.PI * 2);
      ctx.stroke();
    }
    // barrier bubble (one notch fades per charge)
    if (p.barrier > 0) {
      ctx.strokeStyle = 'rgba(0,229,255,' + (0.25 + 0.15 * p.barrier) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawEnemyHpBar(e) {
    var bx = Math.round(e.x - 8), by = Math.round(e.y - 13);
    ctx.fillStyle = '#000';
    ctx.fillRect(bx - 1, by - 1, 18, 5);
    ctx.fillStyle = '#3a0000';
    ctx.fillRect(bx, by, 16, 3);
    ctx.fillStyle = e.elite ? '#FFD700' : '#ff2d2d';
    ctx.fillRect(bx, by, Math.round(16 * clamp(e.hp / e.maxHp, 0, 1)), 3);
  }

  // Cultists are always drawn procedurally — a hooded purple figure that
  // reads as "different" next to the spritesheet enemies.
  function drawCultist(e) {
    var col = e.hitFlash > 0 ? '#fff' : '#5b2c8e';
    ctx.fillStyle = col;
    ctx.fillRect(Math.round(e.x - 6), Math.round(e.y - 4), 12, 11);   // robe
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#7d3cc8';
    ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 8), 8, 6);     // hood
    ctx.fillStyle = '#ff44aa';
    ctx.fillRect(Math.round(e.x - 3), Math.round(e.y - 5), 2, 2);     // glowing eyes
    ctx.fillRect(Math.round(e.x + 1), Math.round(e.y - 5), 2, 2);
  }

  function drawEnemy(e) {
    if (e.isBoss) { drawBoss(e); return; }
    var dx = Math.round(e.x - 8);
    var dy = Math.round(e.y - 8);
    // elite aura: pulsing gold ring behind the sprite
    if (e.elite) {
      ctx.strokeStyle = 'rgba(255,215,0,' + (0.5 + 0.3 * Math.sin(game.time * 6 + e.animPhase)) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.w / 2 + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (e.type === 'wraith') {
      ctx.globalAlpha = 0.65 + 0.2 * Math.sin(game.time * 5 + e.animPhase);
      var wdrew = drawTile(e.tile, dx, dy, 16, 16, false);
      if (!wdrew) {
        ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#ccccff';
        ctx.fillRect(Math.round(e.x - 6), Math.round(e.y - 7), 12, 12);
        ctx.fillRect(Math.round(e.x - 7), Math.round(e.y + 3), 3, 3);
        ctx.fillRect(Math.round(e.x + 4), Math.round(e.y + 3), 3, 3);
        ctx.fillStyle = '#222244';
        ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 4), 2, 3);
        ctx.fillRect(Math.round(e.x + 2), Math.round(e.y - 4), 2, 3);
      } else if (e.hitFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(dx, dy, 16, 16);
      }
      ctx.globalAlpha = 1;
      drawEnemyHpBar(e);
      return;
    }
    if (e.type === 'bomber') {
      // round dark bomb-creature; flashes white-orange while fusing
      var fusing = e.fuse >= 0;
      var flash = fusing && Math.floor(e.fuse * 10) % 2 === 0;
      ctx.fillStyle = e.hitFlash > 0 || flash ? '#ffffff' : '#552211';
      ctx.fillRect(Math.round(e.x - 6), Math.round(e.y - 5), 12, 11);
      ctx.fillStyle = flash ? '#ff9f1c' : '#ff7733';
      ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 3), 8, 7);
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.round(e.x - 3), Math.round(e.y - 1), 2, 2);
      ctx.fillRect(Math.round(e.x + 1), Math.round(e.y - 1), 2, 2);
      ctx.fillStyle = '#ffe600';
      ctx.fillRect(Math.round(e.x), Math.round(e.y - 8), 2, 3); // fuse
      drawEnemyHpBar(e);
      return;
    }
    if (e.type === 'splitter' || e.type === 'mini') {
      var ss = e.type === 'splitter' ? 20 : 10;
      var sdrew = drawTile(e.tile, Math.round(e.x - ss / 2), Math.round(e.y - ss / 2), ss, ss, false);
      if (!sdrew) {
        ctx.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
        ctx.fillRect(Math.round(e.x - ss / 2), Math.round(e.y - ss / 3), ss, Math.round(ss * 0.66));
        ctx.fillRect(Math.round(e.x - ss / 3), Math.round(e.y - ss / 2), Math.round(ss * 0.66), Math.round(ss / 3));
      } else if (e.hitFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(Math.round(e.x - ss / 2), Math.round(e.y - ss / 2), ss, ss);
      }
      drawEnemyHpBar(e);
      return;
    }
    if (e.type === 'cultist') {
      drawCultist(e);
      drawEnemyHpBar(e);
      return;
    }
    var drew = drawTile(e.tile, dx, dy, 16, 16, false);
    if (drew) {
      if (e.hitFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(dx, dy, 16, 16);
      }
      if (e.slowT > 0 || game.freezeTimer > 0) {
        ctx.fillStyle = 'rgba(140,215,255,0.35)'; // frost / chrono chill
        ctx.fillRect(dx, dy, 16, 16);
      }
    } else {
      var col = e.hitFlash > 0 ? '#fff' : e.color;
      if (e.type === 'slime') {
        // green blob
        ctx.fillStyle = col;
        ctx.fillRect(Math.round(e.x - 7), Math.round(e.y - 3), 14, 9);
        ctx.fillRect(Math.round(e.x - 5), Math.round(e.y - 6), 10, 4);
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.round(e.x - 3), Math.round(e.y - 1), 2, 2);
        ctx.fillRect(Math.round(e.x + 1), Math.round(e.y - 1), 2, 2);
      } else {
        ctx.fillStyle = col;
        ctx.fillRect(Math.round(e.x - 7), Math.round(e.y - 7), 14, 14);
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 3), 2, 2);
        ctx.fillRect(Math.round(e.x + 2), Math.round(e.y - 3), 2, 2);
      }
    }
    drawEnemyHpBar(e);
  }

  function drawBoss(e) {
    // pulse between 30 and 34px on a 1-second sine cycle
    var ds = 32 + Math.sin(game.time * Math.PI * 2) * 2;
    var dsr = Math.round(ds);
    var bx = Math.round(e.x - dsr / 2);
    var by = Math.round(e.y - dsr / 2);
    // kind-coloured ring so each boss reads differently
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(e.x, e.y, dsr / 2 + 5, 0, Math.PI * 2);
    ctx.stroke();
    // charger telegraph: violent white flashing + shake before the dash
    var tg = e.telegraph > 0 && Math.floor(e.telegraph * 12) % 2 === 0;
    if (e.telegraph > 0) { bx += randInt(-2, 2); by += randInt(-2, 2); }
    var drew = drawTile(e.tile, bx, by, dsr, dsr, false);
    if (drew) {
      if (e.hitFlash > 0 || tg) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(bx, by, dsr, dsr);
      }
    } else {
      ctx.fillStyle = (e.hitFlash > 0 || tg) ? '#fff' : e.color;
      ctx.fillRect(bx, by, dsr, dsr);
      ctx.fillStyle = '#000';
      ctx.fillRect(bx + 6, by + 8, 4, 4);
      ctx.fillRect(bx + dsr - 10, by + 8, 4, 4);
    }
    // boss uses the big dedicated HUD bar, so no small bar here.
  }

  function drawOrbs() {
    var p = game.player;
    if (!p.orbs || !p.orbs.length) return;
    for (var i = 0; i < p.orbs.length; i++) {
      var orb = p.orbs[i];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(Math.round(orb.x - 3), Math.round(orb.y - 3), 6, 6);
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(Math.round(orb.x - 2), Math.round(orb.y - 2), 4, 4);
    }
  }

  function drawProjectiles() {
    for (var i = 0; i < game.projectiles.length; i++) {
      var pr = game.projectiles[i];
      // glow
      ctx.fillStyle = 'rgba(255,230,0,0.3)';
      ctx.fillRect(Math.round(pr.x - 3), Math.round(pr.y - 3), 6, 6);
      // core
      ctx.fillStyle = '#ffe600';
      ctx.fillRect(Math.round(pr.x - 2), Math.round(pr.y - 2), 4, 4);
    }
    // cultist shots: magenta so they can't be confused with the player's
    for (var s = 0; s < game.enemyShots.length; s++) {
      var sh = game.enemyShots[s];
      ctx.fillStyle = 'rgba(255,60,255,0.3)';
      ctx.fillRect(Math.round(sh.x - 3), Math.round(sh.y - 3), 6, 6);
      ctx.fillStyle = '#ff44aa';
      ctx.fillRect(Math.round(sh.x - 2), Math.round(sh.y - 2), 4, 4);
    }
  }

  function drawParticles() {
    for (var i = 0; i < game.particles.length; i++) {
      var p = game.particles[i];
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      var ps = p.size || 2;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), ps, ps);
    }
    ctx.globalAlpha = 1;
  }

  function renderWorld() {
    ctx.save();
    // screen shake
    if (game.shakeTimer > 0) {
      ctx.translate(randInt(-3, 3), randInt(-3, 3));
    }
    drawFloor();
    drawWalls();
    drawPickups();
    drawParticles();
    // draw enemies sorted by y for a touch of depth
    var sorted = game.enemies.slice().sort(function (a, b) { return a.y - b.y; });
    for (var i = 0; i < sorted.length; i++) drawEnemy(sorted[i]);
    drawPlayer();
    drawOrbs();
    drawProjectiles();
    drawEdgeEffects();
    // static-burst lightning: jagged 3-segment bolts
    for (var zi2 = 0; zi2 < game.zaps.length; zi2++) {
      var z = game.zaps[zi2];
      ctx.strokeStyle = 'rgba(245,247,110,' + (z.t / 0.15) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(z.x1, z.y1);
      var zmx = (z.x1 + z.x2) / 2 + rand(-6, 6), zmy = (z.y1 + z.y2) / 2 + rand(-6, 6);
      ctx.lineTo(zmx, zmy);
      ctx.lineTo(z.x2, z.y2);
      ctx.stroke();
    }
    drawFloatTexts();
    ctx.restore();

    drawEdgeTint();

    // virtual joystick overlay while a touch-drag is active
    if (touchCtl.active && touchCtl.moved) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(touchCtl.ox, touchCtl.oy, 22, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(touchCtl.ox + touchCtl.vx * 18, touchCtl.oy + touchCtl.vy * 18, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    // damage flash overlay
    if (game.damageFlash > 0) {
      ctx.fillStyle = 'rgba(255,0,0,0.2)';
      ctx.fillRect(0, 0, W, H);
    }
    // chrono freeze tint
    if (game.freezeTimer > 0) {
      ctx.fillStyle = 'rgba(120,200,255,0.10)';
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ---------------------------------------------------------------------------
  // HUD
  // ---------------------------------------------------------------------------
  function renderHUD() {
    var p = game.player;

    // ----- HP bar (top-left) -----
    text('HP', 6, 6, 6, '#ffffff');
    var segs = 20, segW = 8, segH = 6, gap = 1;
    var hpRatio = clamp(p.hp / p.maxHp, 0, 1);
    var filled = Math.round(segs * hpRatio);
    for (var i = 0; i < segs; i++) {
      var sx = 6 + i * (segW + gap);
      var sy = 16;
      ctx.fillStyle = '#000';
      ctx.fillRect(sx + 1, sy + 1, segW, segH);
      ctx.fillStyle = i < filled ? '#ff2d2d' : '#3a3a3a';
      ctx.fillRect(sx, sy, segW, segH);
    }

    // ----- wave (top-centre) -----
    text('WAVE ' + pad(game.wave, 2), W / 2, 6, 12, '#ffe600', 'center');

    // ----- fading wave banner (continuous wave flow) -----
    if (game.waveBanner > 0) {
      ctx.globalAlpha = Math.min(1, game.waveBanner / 0.6);
      text('WAVE ' + pad(game.wave, 2), W / 2, 44, 16, '#FFD700', 'center');
      if (game.bossWave) {
        text('! BOSS !', W / 2, 66, 8, '#ff2d2d', 'center');
      }
      ctx.globalAlpha = 1;
    }

    // ----- kills (top-right) -----
    text('KILLS: ' + pad(game.score, 4), W - 6, 6, 8, '#ffffff', 'right');

    // ----- run coins (under the kill counter) -----
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(W - 66, 21, 5, 5);
    ctx.fillStyle = '#aa8800';
    ctx.fillRect(W - 65, 22, 3, 3);
    text(pad(Math.round(game.coinsEarned), 4), W - 28, 20, 6, '#FFD700', 'right');

    // ----- daily-mode tag -----
    if (game.mode === 'daily') {
      text('DAILY', W / 2, 22, 6, '#ff2dd0', 'center');
    }

    // ----- pause button (clickable; P/ESC also work) -----
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(W - 23, 19, 18, 18);
    ctx.fillStyle = '#888888';
    ctx.fillRect(W - 23, 19, 18, 1);
    ctx.fillRect(W - 23, 36, 18, 1);
    ctx.fillRect(W - 23, 19, 1, 18);
    ctx.fillRect(W - 6, 19, 1, 18);
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(W - 18, 23, 3, 10);
    ctx.fillRect(W - 13, 23, 3, 10);

    // ----- XP bar (bottom-left, full width) -----
    text('LVL ' + pad(game.level, 2), 6, H - 24, 6, '#ffffff');
    var barX = 6, barY = H - 14, barW = W - 12, barH = 8;
    ctx.fillStyle = '#000';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
    ctx.fillStyle = '#0a2a33';
    ctx.fillRect(barX, barY, barW, barH);
    var xpRatio = clamp(game.xp / xpForNext(), 0, 1);
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(barX, barY, Math.round(barW * xpRatio), barH);

    // ----- active upgrades (bottom-right) -----
    var keysList = Object.keys(p.upgradesTaken);
    var ty = H - 30 - keysList.length * 8;
    for (var k = 0; k < keysList.length; k++) {
      var id = keysList[k];
      var def = null;
      for (var u = 0; u < UPGRADES.length; u++) if (UPGRADES[u].id === id) def = UPGRADES[u];
      for (var ev = 0; ev < EVOLUTIONS.length; ev++) if (EVOLUTIONS[ev].id === id) def = EVOLUTIONS[ev];
      var label = (def ? def.name : id) + ' x' + p.upgradesTaken[id];
      text(label, W - 6, ty + k * 8, 6, '#bbbbbb', 'right');
    }

    // ----- current class (below the active upgrades list) -----
    text('CLASS: ' + currentClass.toUpperCase(), W - 6, H - 30, 6, '#777777', 'right');

    // ----- boss health bar (only while a boss is alive) -----
    if (game.bossWave && game.boss) {
      var bw = 200, bh = 10, bx = (W - bw) / 2, by = 24;
      text('BOSS', bx - 4, by + 2, 6, '#ff2d2d', 'right');
      ctx.fillStyle = '#FFD700';                 // 1px gold border
      ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
      ctx.fillStyle = '#3a0000';                 // dark red bg
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#ff2d2d';                 // bright red fill
      ctx.fillRect(bx, by, Math.round(bw * clamp(game.boss.hp / game.boss.maxHp, 0, 1)), bh);
    }
  }

  // ---------------------------------------------------------------------------
  // SCANLINES
  // ---------------------------------------------------------------------------
  function drawScanlines() {
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var y = 0; y < H; y += 4) {
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(W, y + 0.5);
    }
    ctx.stroke();
  }

  function drawAnimatedScanlines(opacity) {
    ctx.strokeStyle = 'rgba(255,255,255,' + opacity + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var y = -4 + game.scanlineOffset; y < H; y += 4) {
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(W, y + 0.5);
    }
    ctx.stroke();
  }
