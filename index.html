      if (sh.x < -8 || sh.x > W + 8 || sh.y < -8 || sh.y > H + 8) {
        game.enemyShots.splice(es, 1);
      }
    }

    // ----- magma blocks sear anyone pressed against them -----
    game.magmaTick = (game.magmaTick || 0) - dt;
    if (game.magmaTick <= 0) {
      game.magmaTick = 0.5;
      for (var mg = 0; mg < walls.length; mg++) {
        var mw = walls[mg];
        if (!mw.magma) continue;
        if (p.x + p.w / 2 > mw.x - 8 && p.x - p.w / 2 < mw.x + mw.w + 8 &&
            p.y + p.h / 2 > mw.y - 8 && p.y - p.h / 2 < mw.y + mw.h + 8) {
          if (damagePlayer(8, false)) spawnFloatText(p.x, p.y - 10, 'SEARED', '#ff7a2a');
          break;
        }
      }
    }

    // ----- dark pact: kill-explosions queued last tick detonate now -----
    if (game.pactBooms.length) {
      var booms = game.pactBooms;
      game.pactBooms = []; // chained kills queue into the fresh array
      for (var pb = 0; pb < booms.length; pb++) {
        var boom = booms[pb];
        game.shockwaves.push({ x: boom.x, y: boom.y, t: 0.2, color: '#9b59b6' });
        for (var be = game.enemies.length - 1; be >= 0; be--) {
          var bEn = game.enemies[be];
          var bdx = bEn.x - boom.x, bdy = bEn.y - boom.y;
          if (bdx * bdx + bdy * bdy < 30 * 30) {
            bEn.hp -= boom.dmg;
            addDmg(boom.dmg, 'pact');
            bEn.hitFlash = 0.08;
            if (bEn.hp <= 0) {
              if (bEn.isBoss) killBoss(be, bEn); else killEnemy(be, bEn);
            }
          }
        }
      }
    }

    // ----- spike-trap zones: shred and chill whoever stands inside -----
    for (var zn = game.zones.length - 1; zn >= 0; zn--) {
      var z = game.zones[zn];
      z.t -= dt; z.tick -= dt;
      if (z.t <= 0) { game.zones.splice(zn, 1); continue; }
      if (z.tick <= 0) {
        z.tick = 0.5;
        for (var ze = game.enemies.length - 1; ze >= 0; ze--) {
          var zEn = game.enemies[ze];
          var zdx = zEn.x - z.x, zdy = zEn.y - z.y;
          if (zdx * zdx + zdy * zdy < z.r * z.r) {
            zEn.hp -= 25;
            addDmg(25, 'ability');
            zEn.slowT = Math.max(zEn.slowT || 0, 0.8);
            zEn.slowAmt = Math.max(zEn.slowAmt || 0, 0.4);
            zEn.hitFlash = 0.08;
            if (zEn.hp <= 0) { if (zEn.isBoss) killBoss(ze, zEn); else killEnemy(ze, zEn); }
          }
        }
      }
    }

    // ----- radiant-beam visuals fade -----
    for (var bm = game.beams.length - 1; bm >= 0; bm--) {
      game.beams[bm].t -= dt;
      if (game.beams[bm].t <= 0) game.beams.splice(bm, 1);
    }

    // ----- edge shockwave effects tick -----
    for (var sw = game.shockwaves.length - 1; sw >= 0; sw--) {
      game.shockwaves[sw].t += dt;
      if (game.shockwaves[sw].t >= 0.6) game.shockwaves.splice(sw, 1);
    }

    // ----- floating combat text -----
    for (var ft = game.floatTexts.length - 1; ft >= 0; ft--) {
      var f = game.floatTexts[ft];
      f.t += dt;
      f.y -= 24 * dt;
      if (f.t >= f.life) game.floatTexts.splice(ft, 1);
    }

    // ----- pickups: expire and collect -----
    for (var pk = game.pickups.length - 1; pk >= 0; pk--) {
      var pu = game.pickups[pk];
      pu.t -= dt;
      if (pu.t <= 0) { game.pickups.splice(pk, 1); continue; }
      var pdx = pu.x - p.x, pdy = pu.y - p.y;
      if (pdx * pdx + pdy * pdy < 12 * 12) {
        collectPickup(pu);
        game.pickups.splice(pk, 1);
      }
    }

    // ----- projectile vs enemy collisions -----
    for (var pi = game.projectiles.length - 1; pi >= 0; pi--) {
      var proj = game.projectiles[pi];
      var removed = false;
      for (var ei = game.enemies.length - 1; ei >= 0; ei--) {
        var en = game.enemies[ei];
        if (proj.hitSet.indexOf(en) !== -1) continue;
        // heavy shot stacks and fat shotgun pellets widen the hitbox
        var pad = 3 + p.projSize * 2 + (proj.fat ? 2 : 0);
        if (Math.abs(proj.x - en.x) < (en.w / 2 + pad) &&
            Math.abs(proj.y - en.y) < (en.h / 2 + pad)) {
          en.hp -= proj.damage;
          addDmg(proj.damage, 'shot');
          spawnFloatText(en.x, en.y, '' + Math.round(proj.damage), proj.crit ? '#ff9f1c' : '#ffe600');
          en.hitFlash = 0.08;
          // shotgun pellets shove non-boss enemies back
          if (proj.kb && !en.isBoss) {
            var kbLen = Math.sqrt(proj.vx * proj.vx + proj.vy * proj.vy) || 1;
            en.kx = (proj.vx / kbLen) * 140;
            en.ky = (proj.vy / kbLen) * 140;
          }
          // frost shots chill whatever they hit
          if (p.frost > 0) {
            en.slowT = 1.0;
            en.slowAmt = Math.min(0.6, 0.3 + (p.frost - 1) * 0.15);
          }
          proj.hitSet.push(en);
          if (en.hp <= 0) {
            if (en.isBoss) killBoss(ei, en); else killEnemy(ei, en);
          }
          if (proj.pierce > 0) {
            proj.pierce--;
          } else if (proj.bounces > 0) {
            // ricochet: retarget the nearest unhit enemy within 120px
            var bTarget = null, bDist = 120 * 120;
            for (var bi2 = 0; bi2 < game.enemies.length; bi2++) {
              var cand = game.enemies[bi2];
              if (proj.hitSet.indexOf(cand) !== -1) continue;
              var bdx = cand.x - proj.x, bdy = cand.y - proj.y;
              var bd2 = bdx * bdx + bdy * bdy;
              if (bd2 < bDist) { bDist = bd2; bTarget = cand; }
            }
            if (bTarget) {
              proj.bounces--;
              var bAng = Math.atan2(bTarget.y - proj.y, bTarget.x - proj.x);
              var bSpd = Math.sqrt(proj.vx * proj.vx + proj.vy * proj.vy);
              proj.vx = Math.cos(bAng) * bSpd;
              proj.vy = Math.sin(bAng) * bSpd;
            } else {
              game.projectiles.splice(pi, 1);
              removed = true;
              break;
            }
          } else {
            game.projectiles.splice(pi, 1);
            removed = true;
            break;
          }
        }
      }
      if (removed) continue;
    }

    // ----- orbiting shield orbs -----
    if (p.orbs && p.orbs.length) {
      for (var oi = 0; oi < p.orbs.length; oi++) {
        var orb = p.orbs[oi];
        orb.angle += p.orbSpeed * dt;
        orb.x = p.x + Math.cos(orb.angle) * p.orbRadius;
        orb.y = p.y + Math.sin(orb.angle) * p.orbRadius;
        // collide with enemies (descending so splices are safe)
        for (var oe = game.enemies.length - 1; oe >= 0; oe--) {
          var oen = game.enemies[oe];
          var rr = oen.w / 2 + 10;
          var odx = orb.x - oen.x, ody = orb.y - oen.y;
          if (odx * odx + ody * ody < rr * rr) {
            var until = orb.hitCd[oen.uid] || 0;
            if (game.time >= until) {
              var orbDmg = p.bladeOrbit ? 40 : 15;
              oen.hp -= orbDmg;
              addDmg(orbDmg, 'orb');
              spawnFloatText(oen.x, oen.y, '' + orbDmg, '#00e5ff');
              oen.hitFlash = 0.08;
              orb.hitCd[oen.uid] = game.time + 0.3; // per-orb, per-enemy cooldown
              if (oen.hp <= 0) {
                if (oen.isBoss) killBoss(oe, oen); else killEnemy(oe, oen);
              }
            }
          }
        }
      }
    }

    // ----- update particles -----
    for (var pa = game.particles.length - 1; pa >= 0; pa--) {
      var part = game.particles[pa];
      part.life -= dt;
      if (part.life <= 0) { game.particles.splice(pa, 1); continue; }
      part.x += part.vx * dt;
      part.y += part.vy * dt;
      part.vx *= 0.92; part.vy *= 0.92;
    }

    // ----- wave completion (normal waves; boss waves end on boss death) -----
    if (!game.bossWave && game.waveKills >= game.waveTarget) {
      beginWave(game.wave + 1);
    }
  }

  function killEnemy(index, en) {
    spawnDeathParticles(en.x, en.y, en.color);
    var p = game.player;
    gainXP((en.xpVal || en.maxHp / 5) * p.xpMult);
    if (p.vampire > 0) {
      p.hp = Math.min(p.maxHp, p.hp + p.vampire * p.healMult);
    }
    game.score++;
    game.waveKills++;
    game.coinsEarned += (1 + Math.floor(game.wave / 5)) * (1 + 0.25 * tomeLevel('frt')) * p.coinMult;
    if (game.score === 1) unlockAch('first_blood');
    game.hitStop = Math.max(game.hitStop, 0.03); // tiny punch on every kill
    maybeDropPickup(en.x, en.y);
    // dark pact: kills detonate (queued — resolved next tick so we never
    // recurse into the enemies array mid-splice)
    if (p.pactLvl > 0 && !en.isBoss) {
      game.pactBooms.push({ x: en.x, y: en.y, dmg: 30 + (p.pactLvl - 1) * 15 });
    }
    game.enemies.splice(index, 1);
    // splitters burst into two fast minis
    if (en.type === 'splitter' && game.enemies.length < 198) {
      spawnEnemyAt('mini', en.x - 6, en.y);
      spawnEnemyAt('mini', en.x + 6, en.y);
    }
  }

  // Bomber self-destruct: hurts the player AND other enemies caught in it.
  function explodeBomber(index, e) {
    game.enemies.splice(index, 1);
    game.shockwaves.push({ x: e.x, y: e.y, t: 0, color: '#ff9f1c', label: 'BOOM!' });
    game.shakeTimer = 0.25;
    var p = game.player;
    var dx = p.x - e.x, dy = p.y - e.y;
    if (dx * dx + dy * dy < 50 * 50) {
      damagePlayer(25, false);
    }
    for (var i = game.enemies.length - 1; i >= 0; i--) {
      var o = game.enemies[i];
      var ox = o.x - e.x, oy = o.y - e.y;
      if (ox * ox + oy * oy < 50 * 50) {
        o.hp -= 40;
        o.hitFlash = 0.1;
        addDmg(40, 'other');
        if (o.hp <= 0) {
          if (o.isBoss) killBoss(i, o); else killEnemy(i, o);
        }
      }
    }
    spawnDeathParticles(e.x, e.y, '#ff9f1c');
  }

  // ---------------------------------------------------------------------------
  // PICKUPS — potions heal, bombs clear, frenzy doubles fire rate briefly
  // ---------------------------------------------------------------------------
  function maybeDropPickup(x, y) {
    if (game.pickups.length >= 6) return;
    var roll = Math.random();
    // lucky charm: each stack halves the roll = doubles every drop chance
    roll /= Math.pow(2, game.player.lucky || 0);
    var type = null;
    if (roll < 0.04) type = 'potion';
    else if (roll < 0.055) type = 'bomb';
    else if (roll < 0.07) type = 'frenzy';
    else if (roll < 0.085) type = 'barrier';
    else if (roll < 0.095) type = 'chrono';
    if (!type) return;
    game.pickups.push({ x: x, y: y, type: type, t: 8 });
  }

  function collectPickup(pk) {
    var p = game.player;
    playPickup();
    if (pk.type === 'potion') {
      var heal = Math.min(Math.round(25 * p.healMult), p.maxHp - p.hp);
      p.hp += heal;
      spawnFloatText(p.x, p.y, '+' + Math.round(heal), '#33ff66');
    } else if (pk.type === 'barrier') {
      p.barrier = 3;
      spawnFloatText(p.x, p.y, 'BARRIER!', '#00e5ff');
    } else if (pk.type === 'chrono') {
      game.freezeTimer = 2.5;
      spawnFloatText(p.x, p.y, 'TIME FREEZE!', '#8fd8ff');
    } else if (pk.type === 'bomb') {
      game.whiteFlash = 3;
      game.shakeTimer = 0.4;
      for (var i = game.enemies.length - 1; i >= 0; i--) {
        var e = game.enemies[i];
        e.hp -= 60;
        e.hitFlash = 0.1;
        addDmg(60, 'bomb');
        spawnFloatText(e.x, e.y, '60', '#ff9f1c');
        if (e.hp <= 0) {
          if (e.isBoss) killBoss(i, e); else killEnemy(i, e);
        }
      }
    } else if (pk.type === 'frenzy') {
      p.frenzyTimer = 5;
      spawnFloatText(p.x, p.y, 'FRENZY!', '#ffe600');
    }
  }

  function killBoss(index, en) {
    game.lastBossName = en.name || 'THE BOSS';
    bossExplosion(en.x, en.y);
    if (en.name) spawnFloatText(en.x, en.y - 22, en.name + ' SLAIN', en.color);
    playBossDeath();
    unlockAch('boss_slayer');
    game.coinsEarned += 25 * (1 + 0.25 * tomeLevel('frt')) * game.player.coinMult;
    game.whiteFlash = 3;          // flash white for 3 frames
    game.shakeTimer = 0.5;
    game.hitStop = 0.2;           // dramatic freeze-frame
    game.score++;
    game.enemies.splice(index, 1);
    game.boss = null;
    // first boss grants the ascendancy draft; later bosses a normal level-up.
    game.advanceAfterLevel = true;
    if (!game.player.ascendancy) {
      triggerAscend();
    } else {
      gainXP(xpForNext() - game.xp + 1); // guarantees exactly one level-up
    }
  }

  // Single entry point for anything that hurts the player: respects i-frames
  // and barrier charges, handles death.
  function damagePlayer(amount, shake) {
    var p = game.player;
    if (p.invuln > 0) return;
    if (p.barrier > 0) {
      p.barrier--;
      p.invuln = 0.4;
      spawnFloatText(p.x, p.y - 10, 'BLOCKED', '#00e5ff');
      playPickup();
      return;
    }
    // warriors shrug off 15% of all incoming damage (innate armor);
    // iron skin stacks and the juggernaut ascendancy multiply on top
    if (currentClass === 'warrior') amount = amount * 0.85;
    if (p.ascendDR > 0) amount = amount * (1 - p.ascendDR);
    if (p.armor > 0) amount = amount * (1 - p.armor);
    amount = Math.max(1, Math.round(amount));
    p.hp -= amount;
    p.invuln = 0.5;
    game.tookDamage = true;
    game.damageFlash = 0.1;
    if (shake) game.shakeTimer = 0.3;
    playHit();
    if (p.hp <= 0) {
      p.hp = 0;
      endRun();
    }
    return true; // a real hit landed (callers use this for retribution)
  }

  // An enemy survived 1.5s at a screen edge: detonate it.
  function triggerShockwave(x, y) {
    game.shockwaves.push({ x: x, y: y, t: 0 });
    var p = game.player;
    var dx = p.x - x, dy = p.y - y;
    if (dx * dx + dy * dy < 120 * 120) {
      damagePlayer(20, true);
    }
  }

  // The only place persistent records are written — never mid-run.
  function endRun() {
    if (game.gameState === 'gameover') return;
    game.gameState = 'gameover';
    game.newRecord = false;
    if (game.wave > runData.bestWave) { runData.bestWave = game.wave; game.newRecord = true; }
    if (game.score > runData.bestKills) { runData.bestKills = game.score; game.newRecord = true; }
    if (game.level > runData.bestLevel) { runData.bestLevel = game.level; game.newRecord = true; }
    runData.totalRuns++;
    runData.totalKills += game.score;
    runData.coins += Math.round(game.coinsEarned);
    if (runData.coins >= 500) unlockAch('moneybags');
    saveRunData();
    submitScore();
    setMusicTrack('lobby'); // back to the mellow menu loop
  }

  // ---------------------------------------------------------------------------
  // RENDER HELPERS
  // ---------------------------------------------------------------------------
  function text(str, x, y, size, color, align) {
    ctx.font = size + 'px "Press Start 2P"';
    ctx.textAlign = align || 'left';
    ctx.textBaseline = 'top';
    // 1px black shadow
    ctx.fillStyle = '#000';
    ctx.fillText(str, x + 1, y + 1);
    ctx.fillStyle = color;
    ctx.fillText(str, x, y);
  }

  function pad(num, len) {
    var s = '' + num;
    while (s.length < len) s = '0' + s;
    return s;
  }

  // ---------------------------------------------------------------------------
  // RENDER WORLD
  // ---------------------------------------------------------------------------
  function drawFloor() {
    var useSheet = !useProceduralSprites && sheetReady;
    var B = currentBiome();
    for (var i = 0; i < floorTiles.length; i++) {
      var t = floorTiles[i];
      if (useSheet) {
        var tile = t.variant === 2 ? TILE.floorAlt : (t.variant === 1 ? TILE.wall : TILE.floor);
        drawTile(tile, t.x, t.y, TILE_SIZE, TILE_SIZE, false);
        if (t.variant === 1) {
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          ctx.fillRect(t.x, t.y, TILE_SIZE, TILE_SIZE);
        }
      } else {
        var sh = t.shade;
        if (t.variant === 1) sh = Math.floor(sh * 0.5);
        else if (t.variant === 2) sh = sh + 10;
        ctx.fillStyle = 'rgb(' + sh + ',' + sh + ',' + (sh + 6) + ')';
        ctx.fillRect(t.x, t.y, TILE_SIZE, TILE_SIZE);
        // subtle grid lines
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(t.x, t.y, TILE_SIZE, 1);
        ctx.fillRect(t.x, t.y, 1, TILE_SIZE);
      }
    }
    // biome palette wash over the whole floor (walls draw on top, unaffected)
    if (B.tint) {
      ctx.fillStyle = B.tint;
      ctx.fillRect(0, 0, W, H);
    }
    // sparse biome texture specks (embers/ice glints/pebbles), deterministic
    // per tile so they don't shimmer frame to frame
    if (B.speck) {
      ctx.fillStyle = B.speck;
      for (var s = 0; s < floorTiles.length; s++) {
        var ft = floorTiles[s];
        if (ft.shade % 6 === 0 && ft.variant === 0) {
          ctx.fillRect(ft.x + (ft.shade % 13), ft.y + (ft.shade % 11), 2, 2);
        }
      }
    }
  }

  function drawWalls() {
    // NOTE: the sheet tile at (0,144) is the slime sprite in this packing, so
    // walls always use the boxy procedural style to stay visually distinct.
    var B = currentBiome();
    for (var i = 0; i < walls.length; i++) {
      var wl = walls[i];
      if (wl.soft) {
        // sand mound: pale, round-shouldered, borderless — reads passable
        ctx.fillStyle = 'rgba(214,178,110,0.75)';
        ctx.fillRect(wl.x + 1, wl.y + 1, wl.w - 2, wl.h - 2);
        ctx.fillStyle = 'rgba(240,210,150,0.8)';
        ctx.fillRect(wl.x + 3, wl.y + 2, wl.w - 6, 3);
        ctx.fillStyle = 'rgba(120,90,50,0.5)';
        for (var sd = 0; sd < 6; sd++) {
          ctx.fillRect(wl.x + 3 + ((sd * 11 + wl.x) % Math.max(1, wl.w - 6)),
                       wl.y + 5 + ((sd * 7 + wl.y) % Math.max(1, wl.h - 8)), 2, 2);
        }
        continue;
      }
      ctx.fillStyle = wl.tileVariant === 1 ? B.wallAlt : B.wallFill;
      ctx.fillRect(wl.x, wl.y, wl.w, wl.h);
      // 1px border
      ctx.fillStyle = B.wallBorder;
      ctx.fillRect(wl.x, wl.y, wl.w, 1);
      ctx.fillRect(wl.x, wl.y + wl.h - 1, wl.w, 1);
      ctx.fillRect(wl.x, wl.y, 1, wl.h);
      ctx.fillRect(wl.x + wl.w - 1, wl.y, 1, wl.h);
      // inner shadow along top/left for 8-bit depth
      ctx.fillStyle = B.wallShadow;
      ctx.fillRect(wl.x + 1, wl.y + 1, wl.w - 2, 1);
      ctx.fillRect(wl.x + 1, wl.y + 1, 1, wl.h - 2);
      // per-biome texture pass (details are deterministic per 16px cell so
      // nothing shimmers frame to frame; only inferno veins animate)
      if (B.texture === 'strata') {
        // horizontal sandstone strata instead of block seams
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        for (var st = 6; st < wl.h; st += 6) ctx.fillRect(wl.x + 1, wl.y + st, wl.w - 2, 1);
      } else if (B.texture === 'ice') {
        // faint seams + diagonal cracks + white glints
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        for (var ix = 16; ix < wl.w; ix += 16) ctx.fillRect(wl.x + ix, wl.y, 1, wl.h);
        for (var iy = 16; iy < wl.h; iy += 16) ctx.fillRect(wl.x, wl.y + iy, wl.w, 1);
        for (var cy2 = 0; cy2 + 16 <= wl.h; cy2 += 16) {
          for (var cx2 = 0; cx2 + 16 <= wl.w; cx2 += 16) {
            var ih = ((wl.x + cx2) * 7 + (wl.y + cy2) * 13) % 5;
            if (ih === 0) {
              ctx.fillStyle = 'rgba(220,240,255,0.35)';
              for (var dstep = 0; dstep < 4; dstep++) {
                ctx.fillRect(wl.x + cx2 + 4 + dstep * 2, wl.y + cy2 + 4 + dstep * 2, 2, 1);
              }
            } else if (ih === 2) {
              ctx.fillStyle = 'rgba(255,255,255,0.5)';
              ctx.fillRect(wl.x + cx2 + 10, wl.y + cy2 + 6, 2, 2);
            }
          }
        }
      } else if (B.texture === 'ember') {
        // deep seams (the pulsing molten veins draw live in drawEmberVeins)
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        for (var ex = 16; ex < wl.w; ex += 16) ctx.fillRect(wl.x + ex, wl.y, 1, wl.h);
        for (var ey = 16; ey < wl.h; ey += 16) ctx.fillRect(wl.x, wl.y + ey, wl.w, 1);
      } else if (B.texture === 'vault') {
        // gilded strongbox panels: deep seams with gold studs at the joints
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        for (var gx = 16; gx < wl.w; gx += 16) ctx.fillRect(wl.x + gx, wl.y, 1, wl.h);
        for (var gy = 16; gy < wl.h; gy += 16) ctx.fillRect(wl.x, wl.y + gy, wl.w, 1);
        ctx.fillStyle = '#c9a227';
        for (var jy = 0; jy <= wl.h; jy += 16) {
          for (var jx = 0; jx <= wl.w; jx += 16) {
            ctx.fillRect(wl.x + Math.min(jx, wl.w - 2) + (jx ? -1 : 1), wl.y + Math.min(jy, wl.h - 2) + (jy ? -1 : 1), 2, 2);
          }
        }
      } else {
        // catacombs brick: 16px seams so big chunks read as tiled blocks
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (var sx2 = 16; sx2 < wl.w; sx2 += 16) ctx.fillRect(wl.x + sx2, wl.y, 1, wl.h);
        for (var sy2 = 16; sy2 < wl.h; sy2 += 16) ctx.fillRect(wl.x, wl.y + sy2, wl.w, 1);
      }
      // magma: searing orange rim so the danger reads before it burns
      if (wl.magma) {
        ctx.fillStyle = 'rgba(255,110,30,0.8)';
        ctx.fillRect(wl.x - 1, wl.y - 1, wl.w + 2, 1);
        ctx.fillRect(wl.x - 1, wl.y + wl.h, wl.w + 2, 1);
        ctx.fillRect(wl.x - 1, wl.y - 1, 1, wl.h + 2);
        ctx.fillRect(wl.x + wl.w, wl.y - 1, 1, wl.h + 2);
      }
      // gilded: a treasure glint marks the loot blocks
      if (wl.kind === 'gilded') {
        ctx.fillStyle = '#ffe08a';
        ctx.fillRect(wl.x + 3, wl.y + 3, 3, 2);
        ctx.fillRect(wl.x + 4, wl.y + 2, 1, 4);
      }
      // ice: frosty top sheen
      if (wl.kind === 'ice') {
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillRect(wl.x + 2, wl.y + 2, wl.w - 4, 2);
      }
      // breakable blocks wear a chipped face; cracks deepen per hit taken
      if (wl.breakable) {
        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        ctx.fillRect(wl.x + 2, wl.y + 2, 4, 1);
        ctx.fillRect(wl.x + 2, wl.y + 2, 1, 3);
        var dmg = 3 - (wl.bhp || 3);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        for (var ck = 0; ck <= dmg * 3; ck++) {
          var ckx = wl.x + 2 + ((ck * 7 + wl.x) % Math.max(1, wl.w - 6));
          var cky = wl.y + 3 + ((ck * 11 + wl.y) % Math.max(1, wl.h - 8));
          ctx.fillRect(ckx, cky, 2, 4);
          ctx.fillRect(ckx - 2, cky + 3, 2, 2);
        }
      }
    }
  }

  // Inferno's animated molten veins — the only time-varying part of the
  // background, drawn live over the cached floor+walls image.
  function drawEmberVeins() {
    for (var i = 0; i < walls.length; i++) {
      var wl = walls[i];
      for (var vy = 0; vy + 16 <= wl.h; vy += 16) {
        for (var vx = 0; vx + 16 <= wl.w; vx += 16) {
          if (((wl.x + vx) * 7 + (wl.y + vy) * 13) % 3 === 1) {
            var glow = 0.65 + 0.3 * Math.sin(game.time * 3 + vx + vy);
            ctx.fillStyle = 'rgba(255,100,30,' + glow.toFixed(2) + ')';
            ctx.fillRect(wl.x + vx + 3, wl.y + vy + 9, 7, 2);
            ctx.fillRect(wl.x + vx + 8, wl.y + vy + 5, 2, 4);
          }
        }
      }
    }
  }

  // The floor and walls are static for a whole wave, so they render once
  // into an offscreen canvas; every frame then pays a single drawImage
  // instead of ~600 rects. Rebuilt on wave changes (and when the sprite
  // sheet finishes loading, since the floor uses it).
  var bgCache = document.createElement('canvas');
  bgCache.width = W; bgCache.height = H;
  var bgDirty = true;
  var bgUsedSheet = null;

  function drawBackground() {
    var useSheet = !useProceduralSprites && sheetReady;
    if (bgDirty || bgUsedSheet !== useSheet) {
      var old = ctx;
      ctx = bgCache.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      drawFloor();
      drawWalls();
      ctx = old;
      bgDirty = false;
      bgUsedSheet = useSheet;
    }
    ctx.drawImage(bgCache, 0, 0);
    if (currentBiome().texture === 'ember') drawEmberVeins();
  }

  function drawPickups() {
    for (var i = 0; i < game.pickups.length; i++) {
      var pk = game.pickups[i];
      // blink during the last 2 seconds before despawning
      if (pk.t < 2 && Math.floor(pk.t * 6) % 2 === 0) continue;
      var x = Math.round(pk.x), y = Math.round(pk.y);
      if (pk.type === 'potion') {
        // classic red healing potion: pops against every biome floor
        ctx.fillStyle = '#8a5a2b';
        ctx.fillRect(x - 2, y - 9, 4, 2);        // cork
        ctx.fillStyle = '#dddddd';
        ctx.fillRect(x - 2, y - 7, 4, 3);        // glass neck
        ctx.fillStyle = '#ff2d2d';
        ctx.fillRect(x - 4, y - 4, 8, 8);        // round flask body
        ctx.fillRect(x - 5, y - 2, 10, 5);       // bulge
        ctx.fillStyle = '#ff9a9a';
        ctx.fillRect(x - 3, y - 3, 2, 3);        // shine
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - 3, y - 3, 1, 1);        // glint
      } else if (pk.type === 'bomb') {
        ctx.fillStyle = '#222233';
        ctx.fillRect(x - 5, y - 4, 10, 9);
        ctx.fillStyle = '#555566';
        ctx.fillRect(x - 4, y - 3, 3, 3);
        ctx.fillStyle = '#ff9f1c';
        ctx.fillRect(x + 2, y - 7, 2, 3);        // lit fuse
      } else if (pk.type === 'frenzy') {
        ctx.fillStyle = '#ffe600';
        ctx.fillRect(x - 1, y - 7, 3, 6);        // lightning bolt
        ctx.fillRect(x - 3, y - 2, 5, 3);
        ctx.fillRect(x, y + 1, 3, 6);
      } else if (pk.type === 'barrier') {
        ctx.strokeStyle = '#00e5ff';             // shield bubble
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#00e5ff';
        ctx.fillRect(x - 2, y - 2, 4, 4);
      } else if (pk.type === 'chrono') {
        ctx.fillStyle = '#ffffff';               // clock face
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#223344';
        ctx.fillRect(x, y - 4, 1, 4);            // hands
        ctx.fillRect(x, y, 3, 1);
      }
    }
  }

  function drawFloatTexts() {
    for (var i = 0; i < game.floatTexts.length; i++) {
      var f = game.floatTexts[i];
      ctx.globalAlpha = Math.max(0, 1 - f.t / f.life);
      text(f.txt, f.x, f.y, 6, f.color, 'center');
      ctx.globalAlpha = 1;
    }
  }

  // Pulsing warning rings on edge enemies + expanding shockwave rings.
  function drawEdgeEffects() {
    for (var i = 0; i < game.enemies.length; i++) {
      var e = game.enemies[i];
      if (e.atEdge) {
        var r = 16 + Math.sin(game.time * Math.PI * 4) * 4; // 12..20px, 0.5s cycle
        ctx.strokeStyle = 'rgba(255,45,45,0.6)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    for (var s = 0; s < game.shockwaves.length; s++) {
      var sw = game.shockwaves[s];
      if (sw.t < 0.4) {
        var prog = sw.t / 0.4;
        ctx.strokeStyle = sw.color || '#ff4444';
        ctx.globalAlpha = 0.8 * (1 - prog);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, prog * (sw.label === 'BOOM!' ? 50 : 80), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      ctx.globalAlpha = Math.max(0, 1 - sw.t / 0.6);
      text(sw.label || 'SHOCKWAVE!', sw.x, sw.y - 24, 8, sw.color || '#ff2d2d', 'center');
      ctx.globalAlpha = 1;
    }
  }

  // Permanent red strips along all four edges: the edges are dangerous.
  function drawEdgeTint() {
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.fillRect(0, 0, W, 4);
    ctx.fillRect(0, H - 4, W, 4);
    ctx.fillRect(0, 4, 4, H - 8);
    ctx.fillRect(W - 4, 4, 4, H - 8);
  }

  function drawPlayer() {
    var p = game.player;
    // blink while invulnerable so the i-frames read clearly
    if (p.invuln > 0 && Math.floor(p.invuln * 14) % 2 === 0) return;
    var dx = Math.round(p.x - 8);
    var dy = Math.round(p.y - 8);
    var bob = (p.moving && Math.floor(p.walkAnim) % 2 === 0) ? -1 : 0;
    // equipped hero skin: reskins the actual sprite (no obstructing aura)
    var skin = skinById(currentClass, equippedSkinId(currentClass));
    var tint = skin && skin.chroma ? chromaColor() : (skin ? skin.tint : null);
    var tile = classDef(currentClass).tile;
    var drew;
    if (tint) {
      drew = drawTintedTile(tile, dx, dy + bob, 16, 16, p.facing === -1, tint, skin.chroma ? 0.62 : 0.5);
      // epic skins get a tight 1px chroma glow that hugs the sprite (not a ring)
      if (skin.chroma && drew) {
        ctx.globalAlpha = 0.25 + 0.15 * Math.sin(game.time * 6);
        drawTintedTile(tile, dx - 1, dy + bob, 18, 18, p.facing === -1, tint, 1);
        ctx.globalAlpha = 1;
      }
    } else {
      drew = drawTile(tile, dx, dy + bob, 16, 16, p.facing === -1);
    }
    if (!drew) {
      // procedural: body uses the skin tint if any, else white
      ctx.fillStyle = tint || '#fff';
      ctx.fillRect(Math.round(p.x - 6), Math.round(p.y - 8) + bob, 12, 16);
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(Math.round(p.x - 2), Math.round(p.y - 8) + bob, 4, 4);
      // a little eye to show facing
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.round(p.x - 2 + (p.facing === 1 ? 2 : 0)), Math.round(p.y - 2) + bob, 2, 2);
    }
    // class-coloured marker under the hero
    ctx.fillStyle = classDef(currentClass).color;
    ctx.fillRect(Math.round(p.x - 6), Math.round(p.y + 9), 12, 2);
    // frenzy aura
    if (p.frenzyTimer > 0) {
      ctx.strokeStyle = 'rgba(255,230,0,' + (0.3 + 0.3 * Math.abs(Math.sin(game.time * 10))) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 13, 0, Math.PI * 2);
      ctx.stroke();
    }
    // barrier bubble (one notch fades per charge)
    if (p.barrier > 0) {
      ctx.strokeStyle = 'rgba(0,229,255,' + (0.25 + 0.15 * p.barrier) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawEnemyHpBar(e) {
    var bx = Math.round(e.x - 8), by = Math.round(e.y - 13);
    ctx.fillStyle = '#000';
    ctx.fillRect(bx - 1, by - 1, 18, 5);
    ctx.fillStyle = '#3a0000';
    ctx.fillRect(bx, by, 16, 3);
    ctx.fillStyle = e.elite ? '#FFD700' : '#ff2d2d';
    ctx.fillRect(bx, by, Math.round(16 * clamp(e.hp / e.maxHp, 0, 1)), 3);
  }

  // Cultists are always drawn procedurally — a hooded purple figure that
  // reads as "different" next to the spritesheet enemies.
  function drawCultist(e) {
    var col = e.hitFlash > 0 ? '#fff' : '#5b2c8e';
    ctx.fillStyle = col;
    ctx.fillRect(Math.round(e.x - 6), Math.round(e.y - 4), 12, 11);   // robe
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#7d3cc8';
    ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 8), 8, 6);     // hood
    ctx.fillStyle = '#ff44aa';
    ctx.fillRect(Math.round(e.x - 3), Math.round(e.y - 5), 2, 2);     // glowing eyes
    ctx.fillRect(Math.round(e.x + 1), Math.round(e.y - 5), 2, 2);
  }

  function drawEnemy(e) {
    if (e.isBoss) { drawBoss(e); return; }
    var dx = Math.round(e.x - 8);
    var dy = Math.round(e.y - 8);
    // elite aura: pulsing gold ring behind the sprite
    if (e.elite) {
      ctx.strokeStyle = 'rgba(255,215,0,' + (0.5 + 0.3 * Math.sin(game.time * 6 + e.animPhase)) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.w / 2 + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (e.type === 'wraith') {
      ctx.globalAlpha = 0.65 + 0.2 * Math.sin(game.time * 5 + e.animPhase);
      var wdrew = drawTile(e.tile, dx, dy, 16, 16, false);
      if (!wdrew) {
        ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#ccccff';
        ctx.fillRect(Math.round(e.x - 6), Math.round(e.y - 7), 12, 12);
        ctx.fillRect(Math.round(e.x - 7), Math.round(e.y + 3), 3, 3);
        ctx.fillRect(Math.round(e.x + 4), Math.round(e.y + 3), 3, 3);
        ctx.fillStyle = '#222244';
        ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 4), 2, 3);
        ctx.fillRect(Math.round(e.x + 2), Math.round(e.y - 4), 2, 3);
      } else if (e.hitFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(dx, dy, 16, 16);
      }
      ctx.globalAlpha = 1;
      drawEnemyHpBar(e);
      return;
    }
    if (e.type === 'bomber') {
      // round dark bomb-creature; flashes white-orange while fusing
      var fusing = e.fuse >= 0;
      var flash = fusing && Math.floor(e.fuse * 10) % 2 === 0;
      ctx.fillStyle = e.hitFlash > 0 || flash ? '#ffffff' : '#552211';
      ctx.fillRect(Math.round(e.x - 6), Math.round(e.y - 5), 12, 11);
      ctx.fillStyle = flash ? '#ff9f1c' : '#ff7733';
      ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 3), 8, 7);
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.round(e.x - 3), Math.round(e.y - 1), 2, 2);
      ctx.fillRect(Math.round(e.x + 1), Math.round(e.y - 1), 2, 2);
      ctx.fillStyle = '#ffe600';
      ctx.fillRect(Math.round(e.x), Math.round(e.y - 8), 2, 3); // fuse
      drawEnemyHpBar(e);
      return;
    }
    if (e.type === 'splitter' || e.type === 'mini') {
      var ss = e.type === 'splitter' ? 20 : 10;
      var sdrew = e.skinTint
        ? drawTintedTile(e.tile, Math.round(e.x - ss / 2), Math.round(e.y - ss / 2), ss, ss, false, e.skinTint, e.skinAlpha || 0.3)
        : drawTile(e.tile, Math.round(e.x - ss / 2), Math.round(e.y - ss / 2), ss, ss, false);
      if (!sdrew) {
        ctx.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
        ctx.fillRect(Math.round(e.x - ss / 2), Math.round(e.y - ss / 3), ss, Math.round(ss * 0.66));
        ctx.fillRect(Math.round(e.x - ss / 3), Math.round(e.y - ss / 2), Math.round(ss * 0.66), Math.round(ss / 3));
      } else if (e.hitFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(Math.round(e.x - ss / 2), Math.round(e.y - ss / 2), ss, ss);
      }
      drawEnemyHpBar(e);
      return;
    }
    if (e.type === 'cultist') {
      drawCultist(e);
      drawEnemyHpBar(e);
      return;
    }
    var drew = e.skinTint
      ? drawTintedTile(e.tile, dx, dy, 16, 16, false, e.skinTint, e.skinAlpha || 0.3)
      : drawTile(e.tile, dx, dy, 16, 16, false);
    if (drew) {
      if (e.hitFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(dx, dy, 16, 16);
      }
      if (e.slowT > 0 || game.freezeTimer > 0) {
        ctx.fillStyle = 'rgba(140,215,255,0.35)'; // frost / chrono chill
        ctx.fillRect(dx, dy, 16, 16);
      }
      // the biome caster levitates a spell orb in its bolt colour
      if (e.type === 'caster') {
        var bob = Math.round(Math.sin(game.time * 4 + e.animPhase) * 2);
        ctx.fillStyle = e.shotCol || '#b06ce8';
        ctx.fillRect(dx + 13, dy - 4 + bob, 3, 3);
      }
    } else {
      var col = e.hitFlash > 0 ? '#fff' : e.color;
      if (e.type === 'slime') {
        // green blob
        ctx.fillStyle = col;
        ctx.fillRect(Math.round(e.x - 7), Math.round(e.y - 3), 14, 9);
        ctx.fillRect(Math.round(e.x - 5), Math.round(e.y - 6), 10, 4);
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.round(e.x - 3), Math.round(e.y - 1), 2, 2);
        ctx.fillRect(Math.round(e.x + 1), Math.round(e.y - 1), 2, 2);
      } else {
        ctx.fillStyle = col;
        ctx.fillRect(Math.round(e.x - 7), Math.round(e.y - 7), 14, 14);
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.round(e.x - 4), Math.round(e.y - 3), 2, 2);
        ctx.fillRect(Math.round(e.x + 2), Math.round(e.y - 3), 2, 2);
      }
    }
    drawEnemyHpBar(e);
  }

  function drawBoss(e) {
    // pulse ±2px around the kind's own size on a 1-second sine cycle
    var ds = (e.drawSize || 32) + Math.sin(game.time * Math.PI * 2) * 2;
    var dsr = Math.round(ds);
    var bx = Math.round(e.x - dsr / 2);
    var by = Math.round(e.y - dsr / 2);
    // kind-coloured ring so each boss reads differently
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(e.x, e.y, dsr / 2 + 5, 0, Math.PI * 2);
    ctx.stroke();
    // charger telegraph: violent white flashing + shake before the dash
    var tg = e.telegraph > 0 && Math.floor(e.telegraph * 12) % 2 === 0;
    if (e.telegraph > 0) { bx += randInt(-2, 2); by += randInt(-2, 2); }
    if (e.kind === 'summoner') {
      drawNecromancer(e, bx, by, dsr, tg);
      return;
    }
    if (e.kind === 'keeper') {
      drawKeeper(e, bx, by, dsr, tg);
      return;
    }
    if (e.kind === 'spiral') {
      // spectral: translucent, and fades right out while winding up a blink
      var ga = 0.62 + 0.18 * Math.sin(game.time * 5);
      if (e.blinkPhase > 0) ga *= clamp(e.blinkPhase / 0.7, 0.15, 1);
      ctx.globalAlpha = ga;
    }
    var drew = drawTile(e.tile, bx, by, dsr, dsr, false);
    if (drew) {
      if (e.hitFlash > 0 || tg) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(bx, by, dsr, dsr);
      }
    } else {
      ctx.fillStyle = (e.hitFlash > 0 || tg) ? '#fff' : e.color;
      ctx.fillRect(bx, by, dsr, dsr);
      ctx.fillStyle = '#000';
      ctx.fillRect(bx + 6, by + 8, 4, 4);
      ctx.fillRect(bx + dsr - 10, by + 8, 4, 4);
    }
    ctx.globalAlpha = 1;
    // boss uses the big dedicated HUD bar, so no small bar here.
  }

  // THE VAULT KEEPER: a walking strongbox — hulking dark-iron body with
  // gold trim, a glowing keyhole on the chest, burning violet eyes.
  function drawKeeper(e, bx, by, dsr, tg) {
    var u = dsr / 16;
    var flash = e.hitFlash > 0 || tg;
    function px(x, y, w, h, col) {
      ctx.fillStyle = flash && col !== '#b06ce8' ? '#ffffff' : col;
      ctx.fillRect(Math.round(bx + x * u), Math.round(by + y * u), Math.ceil(w * u), Math.ceil(h * u));
    }
    // massive iron body
    px(2, 3, 12, 11, '#2a2035');
    px(3, 2, 10, 1, '#2a2035');
    // gold banding
    px(2, 3, 12, 1, '#c9a227');
    px(2, 9, 12, 1, '#c9a227');
    px(2, 13, 12, 1, '#c9a227');
    px(2, 3, 1, 11, '#c9a227');
    px(13, 3, 1, 11, '#c9a227');
    // rivets
    px(3, 4, 1, 1, '#e8cf6a'); px(12, 4, 1, 1, '#e8cf6a');
    px(3, 12, 1, 1, '#e8cf6a'); px(12, 12, 1, 1, '#e8cf6a');
    // burning violet eyes under the brow band
    px(5, 5, 2, 2, '#b06ce8');
    px(9, 5, 2, 2, '#b06ce8');
    if (game.time % 0.8 < 0.4) { px(5.5, 5.5, 1, 1, '#e8d4ff'); px(9.5, 5.5, 1, 1, '#e8d4ff'); }
    // the keyhole: circle + slot, glowing when enraged
    var hot = e.hp < e.maxHp * 0.5 && game.time % 0.5 < 0.25;
    px(7, 10, 2, 1.5, hot ? '#ff5a3a' : '#c9a227');
    px(7.5, 11.5, 1, 1.5, hot ? '#ff5a3a' : '#c9a227');
    // stubby legs
    px(4, 14, 3, 2, '#171021');
    px(9, 14, 3, 2, '#171021');
  }

  // THE NECROMANCER has no matching tile on the sheet, so it is drawn
  // procedurally (same style family as the cultist, scaled up): tattered
  // purple robe, hooded skull face, glowing green eyes, soul-orb staff.
  function drawNecromancer(e, bx, by, dsr, tg) {
    var u = dsr / 16; // one logical pixel on a 16px design grid
    var flash = e.hitFlash > 0 || tg;
    function px(x, y, w, h, col) {
      ctx.fillStyle = flash && col !== '#59ff8e' ? '#ffffff' : col;
      ctx.fillRect(Math.round(bx + x * u), Math.round(by + y * u), Math.ceil(w * u), Math.ceil(h * u));
    }
    // tattered robe (jagged hem)
    px(3, 6, 10, 8, '#3a1f5e');
    px(2, 13, 3, 3, '#3a1f5e'); px(7, 14, 3, 2, '#3a1f5e'); px(11, 13, 3, 3, '#3a1f5e');
    // hood
    px(4, 2, 8, 3, '#5b2c8e');
    px(3, 4, 10, 3, '#5b2c8e');
    // skull face inside the hood shadow
    px(5, 4.5, 6, 3.5, '#e8e0d0');
    // glowing green eyes
    px(6, 5, 1.5, 1.5, '#59ff8e');
    px(8.5, 5, 1.5, 1.5, '#59ff8e');
    // staff with a flickering soul-orb
    px(13.5, 3, 1, 12, '#7a5a30');
    px(12.75, 1.5, 2.5, 2.5, '#59ff8e');
    if (game.time % 1 < 0.5) px(13.25, 2, 1.5, 1.5, '#b6ffce');
  }

  function drawOrbs() {
    var p = game.player;
    if (!p.orbs || !p.orbs.length) return;
    for (var i = 0; i < p.orbs.length; i++) {
      var orb = p.orbs[i];
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(Math.round(orb.x - 3), Math.round(orb.y - 3), 6, 6);
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(Math.round(orb.x - 2), Math.round(orb.y - 2), 4, 4);
    }
  }

  function drawProjectiles() {
    // heavy shot / fat pellets / sniper arrow scale the actual sprite —
    // no halo boxes (they stacked into an opaque smear at high counts)
    var baseScale = 1 + Math.min(4, game.player.projSize) * 0.18;
    for (var i = 0; i < game.projectiles.length; i++) {
      var pr = game.projectiles[i];
      var pscale = baseScale * (pr.fat ? 1.25 : 1) * (pr.big ? 1.6 : 1);
      var scaled = pscale > 1.01;
      if (scaled) {
        ctx.save();
        ctx.translate(pr.x, pr.y);
        ctx.scale(pscale, pscale);
        ctx.translate(-pr.x, -pr.y);
      }
      // class identity: rogues throw daggers, warriors spinning axes,
      // rangers arrows, the mage keeps his glowing orbs
      if (currentClass === 'rogue') { drawDagger(pr); }
      else if (currentClass === 'warrior') { drawAxe(pr); }
      else if (currentClass === 'ranger') { drawArrow(pr); }
      else {
        // glow + core
        ctx.fillStyle = 'rgba(255,230,0,0.3)';
        ctx.fillRect(Math.round(pr.x - 3), Math.round(pr.y - 3), 6, 6);
        ctx.fillStyle = '#ffe600';
        ctx.fillRect(Math.round(pr.x - 2), Math.round(pr.y - 2), 4, 4);
      }
      if (scaled) ctx.restore();
    }
    // enemy shots: biome casters fire in their own colour, everything else
    // stays magenta so hostile bolts never look like the player's
    for (var s = 0; s < game.enemyShots.length; s++) {
      var sh = game.enemyShots[s];
      ctx.fillStyle = 'rgba(255,60,255,0.3)';
      ctx.fillRect(Math.round(sh.x - 3), Math.round(sh.y - 3), 6, 6);
      ctx.fillStyle = sh.col || '#ff44aa';
      ctx.fillRect(Math.round(sh.x - 2), Math.round(sh.y - 2), 4, 4);
    }
  }

  // Ranger arrow: long thin shaft pointing along its flight direction, with a
  // steel head and amber fletching. Reads as a fast projectile at range.
  function drawArrow(pr) {
    ctx.save();
    ctx.translate(Math.round(pr.x), Math.round(pr.y));
    ctx.rotate(Math.atan2(pr.vy, pr.vx)); // 0deg art points along +x (travel dir)
    ctx.fillStyle = '#2a2135';    // dark outline
    ctx.fillRect(-8, -2, 16, 4);
    ctx.fillStyle = '#c99a3a';    // wooden shaft
    ctx.fillRect(-7, -1, 11, 2);
    ctx.fillStyle = '#e8eef8';    // steel head
    ctx.fillRect(4, -2, 4, 4);
    ctx.fillStyle = '#e0a030';    // fletching
    ctx.fillRect(-7, -2, 2, 4);
    ctx.restore();
  }

  // Rogue dagger: slim steel blade pointing along its flight direction,
  // dark-outlined to match the Tiny Dungeon sprite style.
  function drawDagger(pr) {
    ctx.save();
    ctx.translate(Math.round(pr.x), Math.round(pr.y));
    ctx.rotate(Math.atan2(pr.vy, pr.vx) + Math.PI / 2); // art points up
    ctx.fillStyle = '#2a2135';    // outline silhouette
    ctx.fillRect(-2, -6, 4, 8);
    ctx.fillRect(-3, 0, 6, 2);
    ctx.fillStyle = '#b8c4d4';
    ctx.fillRect(-1, -5, 2, 6);   // blade
    ctx.fillStyle = '#e8eef8';
    ctx.fillRect(-1, -5, 1, 3);   // edge shine
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(-2, 0, 4, 1);    // crossguard
    ctx.fillStyle = '#6b4a2a';
    ctx.fillRect(-1, 1, 2, 3);    // grip
    ctx.restore();
  }

  // Warrior axe: twin-bladed, dark-outlined, spinning as it flies.
  function drawAxe(pr) {
    ctx.save();
    ctx.translate(Math.round(pr.x), Math.round(pr.y));
    ctx.rotate(Math.atan2(pr.vy, pr.vx) + game.time * 14);
    ctx.fillStyle = '#2a2135';    // outline silhouette
    ctx.fillRect(-6, -6, 5, 8);
    ctx.fillRect(1, -6, 5, 8);
    ctx.fillRect(-2, -6, 4, 12);
    ctx.fillStyle = '#7a5a30';
    ctx.fillRect(-1, -5, 2, 10);  // haft
    ctx.fillStyle = '#b8c4d4';
    ctx.fillRect(-5, -5, 3, 6);   // left blade
    ctx.fillRect(2, -5, 3, 6);    // right blade
    ctx.fillStyle = '#e8eef8';
    ctx.fillRect(-5, -5, 1, 6);   // edge shine
    ctx.fillRect(4, -5, 1, 6);
    ctx.restore();
  }

  function drawParticles() {
    for (var i = 0; i < game.particles.length; i++) {
      var p = game.particles[i];
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      var ps = p.size || 2;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), ps, ps);
    }
    ctx.globalAlpha = 1;
  }

  function renderWorld() {
    ctx.save();
    // screen shake
    if (game.shakeTimer > 0) {
      ctx.translate(randInt(-3, 3), randInt(-3, 3));
    }
    drawBackground();
    // spike-trap zones sit on the floor, under everything that walks on it
    for (var tz = 0; tz < game.zones.length; tz++) {
      var zone = game.zones[tz];
      var zAlpha = Math.min(0.35, zone.t * 0.35);
      ctx.fillStyle = 'rgba(125,187,66,' + zAlpha.toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(zone.x, zone.y, zone.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(125,187,66,0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // spikes around the rim
      ctx.fillStyle = '#dde4ec';
      for (var sp = 0; sp < 8; sp++) {
        var spa = (Math.PI * 2 / 8) * sp + zone.t;
        ctx.fillRect(Math.round(zone.x + Math.cos(spa) * (zone.r - 6)) - 1,
                     Math.round(zone.y + Math.sin(spa) * (zone.r - 6)) - 1, 2, 3);
      }
    }
    drawPickups();
    drawParticles();
    // draw enemies sorted by y for a touch of depth
    var sorted = game.enemies.slice().sort(function (a, b) { return a.y - b.y; });
    for (var i = 0; i < sorted.length; i++) drawEnemy(sorted[i]);
    drawPlayer();
    drawOrbs();
    drawProjectiles();
    // radiant beam: a fat ray of light that fades out fast
    for (var rb = 0; rb < game.beams.length; rb++) {
      var beam = game.beams[rb];
      var bAlpha = beam.t / 0.25;
      var bex = beam.x + Math.cos(beam.ang) * 600;
      var bey = beam.y + Math.sin(beam.ang) * 600;
      ctx.strokeStyle = 'rgba(255,243,160,' + (bAlpha * 0.5).toFixed(3) + ')';
      ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(beam.x, beam.y); ctx.lineTo(bex, bey); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,' + bAlpha.toFixed(3) + ')';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(beam.x, beam.y); ctx.lineTo(bex, bey); ctx.stroke();
    }
    drawEdgeEffects();
    // static-burst lightning: jagged 3-segment bolts
    for (var zi2 = 0; zi2 < game.zaps.length; zi2++) {
      var z = game.zaps[zi2];
      ctx.strokeStyle = 'rgba(245,247,110,' + (z.t / 0.15) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(z.x1, z.y1);
      var zmx = (z.x1 + z.x2) / 2 + rand(-6, 6), zmy = (z.y1 + z.y2) / 2 + rand(-6, 6);
      ctx.lineTo(zmx, zmy);
      ctx.lineTo(z.x2, z.y2);
      ctx.stroke();
    }
    drawFloatTexts();
    ctx.restore();

    drawEdgeTint();

    // virtual joystick overlay while a touch-drag is active
    if (touchCtl.active && touchCtl.moved) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(touchCtl.ox, touchCtl.oy, 22, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(touchCtl.ox + touchCtl.vx * 18, touchCtl.oy + touchCtl.vy * 18, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    // damage flash overlay
    if (game.damageFlash > 0) {
      ctx.fillStyle = 'rgba(255,0,0,0.2)';
      ctx.fillRect(0, 0, W, H);
    }
    // chrono freeze tint
    if (game.freezeTimer > 0) {
      ctx.fillStyle = 'rgba(120,200,255,0.10)';
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ---------------------------------------------------------------------------
  // HUD
  // ---------------------------------------------------------------------------
  // 10px pixel skull for the kill counter
  function drawSkullIcon(x, y) {
    ctx.fillStyle = '#dde4ec';
    ctx.fillRect(x + 1, y, 8, 6);
    ctx.fillRect(x + 2, y + 6, 6, 3);
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(x + 2, y + 2, 2, 2);
    ctx.fillRect(x + 6, y + 2, 2, 2);
    ctx.fillRect(x + 4, y + 6, 1, 3);
    ctx.fillRect(x + 6, y + 6, 1, 3);
  }

  // HUD: icon-first, three clusters — top-left vitals, top-right score
  // column, bottom-left build cluster (ability + upgrade lines + level)
  // over a thin XP bar.
  function renderHUD() {
    var p = game.player;

    // ----- top-left: slim HP segments, no label — red bar says it all -----
    var segs = 20, segW = 8, segH = 5, gap = 1;
    var hpRatio = clamp(p.hp / p.maxHp, 0, 1);
    var filled = Math.round(segs * hpRatio);
    for (var i = 0; i < segs; i++) {
      var sx = 6 + i * (segW + gap);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx + 1, 9, segW, segH);
      ctx.fillStyle = i < filled ? '#ff2d2d' : '#3a3a3a';
      ctx.fillRect(sx, 8, segW, segH);
    }

    // ----- top-centre: wave + banners (unchanged) -----
    text('WAVE ' + pad(game.wave, 2), W / 2, 6, 12, '#ffe600', 'center');
    if (game.endlessBanner > 0) {
      ctx.globalAlpha = Math.min(1, game.endlessBanner / 1.2);
      text('THE VAULT IS BROKEN', W / 2, 88, 10, '#c9a227', 'center');
      text('ENDLESS WAVES', W / 2, 108, 16, '#ff2d2d', 'center');
      text('HOW DEEP CAN YOU GO?', W / 2, 132, 6, '#bbbbbb', 'center');
      ctx.globalAlpha = 1;
    }
    if (game.waveBanner > 0) {
      ctx.globalAlpha = Math.min(1, game.waveBanner / 0.6);
      text('WAVE ' + pad(game.wave, 2), W / 2, 44, 16, '#FFD700', 'center');
      if (game.bossWave && game.boss) {
        text(game.boss.name, W / 2, 66, 10, game.boss.color, 'center');
      } else if (game.bossWave) {
        text('! BOSS !', W / 2, 66, 8, '#ff2d2d', 'center');
      }
      ctx.globalAlpha = 1;
    }
    if (game.mode === 'daily') text('DAILY', W / 2, 22, 6, '#ff2dd0', 'center');

    // ----- top-right: unified score column, icon AFTER the number -----
    text(pad(game.score, 4), W - 22, 5, 8, '#ffffff', 'right');
    drawSkullIcon(W - 17, 3);
    text(pad(Math.round(game.coinsEarned), 4), W - 22, 19, 7, '#FFD700', 'right');
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(W - 16, 19, 7, 7);
    ctx.fillStyle = '#aa8800';
    ctx.fillRect(W - 15, 20, 5, 5);
    ctx.fillStyle = '#ffe98a';
    ctx.fillRect(W - 15, 20, 2, 2);

    // ----- pause + sound, stacked under the score column -----
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(W - 23, 33, 18, 18);
    ctx.fillStyle = '#888888';
    ctx.fillRect(W - 23, 33, 18, 1); ctx.fillRect(W - 23, 50, 18, 1);
    ctx.fillRect(W - 23, 33, 1, 18); ctx.fillRect(W - 6, 33, 1, 18);
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(W - 18, 37, 3, 10); ctx.fillRect(W - 13, 37, 3, 10);
    var sndMuted = musicMuted && sfxMuted;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(W - 23, 55, 18, 18);
    ctx.fillStyle = '#888888';
    ctx.fillRect(W - 23, 55, 18, 1); ctx.fillRect(W - 23, 72, 18, 1);
    ctx.fillRect(W - 23, 55, 1, 18); ctx.fillRect(W - 6, 55, 1, 18);
    ctx.fillStyle = sndMuted ? '#777777' : '#cccccc';
    ctx.fillRect(W - 20, 61, 3, 6);
    ctx.fillRect(W - 17, 59, 2, 10);
    ctx.fillRect(W - 15, 57, 2, 14);
    if (sndMuted) {
      ctx.fillStyle = '#ff2d2d';
      for (var sl2 = 0; sl2 < 12; sl2++) ctx.fillRect(W - 21 + sl2, 57 + sl2, 2, 2);
    } else {
      ctx.fillStyle = '#cccccc';
      ctx.fillRect(W - 11, 60, 1, 2); ctx.fillRect(W - 11, 66, 1, 2);
      ctx.fillRect(W - 9, 58, 1, 3);  ctx.fillRect(W - 9, 67, 1, 3);
    }

    // ----- bottom-left build cluster -----
    // Spell button lives in its own corner ABOVE the LVL line; the first
    // upgrade row sits BESIDE the LVL text and rows stack up from there.
    var iy0 = H - 46; // spell button top — clear of the LVL line below it
    if (p.ascendancy) {
      var ready = p.abilityCd <= 0;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(6, iy0, 26, 26);
      ctx.fillStyle = ready ? (game.blinkOn ? p.ascendancy.color : '#ffffff') : '#555566';
      ctx.fillRect(6, iy0, 26, 1); ctx.fillRect(6, iy0 + 25, 26, 1);
      ctx.fillRect(6, iy0, 1, 26); ctx.fillRect(31, iy0, 1, 26);
      var abArt = CARD_ART[p.ascendancy.id];
      if (abArt) {
        if (!ready) ctx.globalAlpha = 0.4;
        drawPixelIcon(abArt, 7, iy0 + 1, 2);
        ctx.globalAlpha = 1;
      }
      if (!ready) {
        var cdRatio = clamp(p.abilityCd / (p.abilityMaxCd || 1), 0, 1);
        ctx.fillStyle = 'rgba(0,0,20,0.7)';
        ctx.fillRect(7, iy0 + 1, 24, Math.round(24 * cdRatio));
        text('' + Math.ceil(p.abilityCd), 19, iy0 + 9, 8, '#ffffff', 'center');
      }
    }
    // upgrade icons: first row sits beside the LVL text, rows stack upward
    var v2Keys = Object.keys(p.upgradesTaken).filter(function (uid) {
      return uid.indexOf('asc_') !== 0;
    });
    var ixStart = 42; // clear the 'LVL NNN' text on the left
    var perRow = Math.max(1, Math.floor((W - 34 - ixStart) / 30) + 1);
    var iconBase = H - 25; // bottom row aligns with the LVL line beside it
    for (var k = 0; k < v2Keys.length; k++) {
      var id = v2Keys[k];
      var ix = ixStart + (k % perRow) * 30;
      var iy = iconBase - Math.floor(k / perRow) * 14;
      var art = CARD_ART[id];
      if (art) {
        drawPixelIcon(art, ix, iy, 1);
      } else {
        var def = null;
        for (var u = 0; u < UPGRADES.length; u++) if (UPGRADES[u].id === id) def = UPGRADES[u];
        for (var ev = 0; ev < EVOLUTIONS.length; ev++) if (EVOLUTIONS[ev].id === id) def = EVOLUTIONS[ev];
        ctx.fillStyle = def ? def.color : '#888888';
        ctx.fillRect(ix + 1, iy + 1, 10, 10);
      }
      text('x' + p.upgradesTaken[id], ix + 14, iy + 3, 6, '#bbbbbb');
    }

    // ----- level, one quiet line above the XP bar -----
    text('LVL ' + pad(game.level, 2), 6, H - 17, 6, '#bbbbbb');

    // ----- thin XP bar -----
    var barX = 6, barY = H - 9, barW = W - 12, barH = 3;
    ctx.fillStyle = '#000';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
    ctx.fillStyle = '#0a2a33';
    ctx.fillRect(barX, barY, barW, barH);
    var xpRatio = clamp(game.xp / xpForNext(), 0, 1);
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(barX, barY, Math.round(barW * xpRatio), barH);

    // ----- boss health bar (unchanged) -----
    if (game.bossWave && game.boss) {
      var bw2 = 200, bh2 = 10, bx2 = (W - bw2) / 2, by2 = 24;
      text(game.boss.name || 'BOSS', bx2 - 4, by2 + 2, 6, game.boss.color, 'right');
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(bx2 - 1, by2 - 1, bw2 + 2, bh2 + 2);
      ctx.fillStyle = '#3a0000';
      ctx.fillRect(bx2, by2, bw2, bh2);
      ctx.fillStyle = '#ff2d2d';
      ctx.fillRect(bx2, by2, Math.round(bw2 * clamp(game.boss.hp / game.boss.maxHp, 0, 1)), bh2);
    }
  }

  // ---------------------------------------------------------------------------
  // SCANLINES
  // ---------------------------------------------------------------------------
  function drawScanlines() {
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var y = 0; y < H; y += 4) {
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(W, y + 0.5);
    }
    ctx.stroke();
  }

  function drawAnimatedScanlines(opacity) {
    ctx.strokeStyle = 'rgba(255,255,255,' + opacity + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var y = -4 + game.scanlineOffset; y < H; y += 4) {
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(W, y + 0.5);
    }
    ctx.stroke();
  }

  function renderTitle() {
    // live dungeon backdrop: floor, walls, drifting critters, dark veil
    drawFloor();
    drawWalls();
    for (var ci = 0; ci < menuCritters.length; ci++) {
      var cr = menuCritters[ci];
      cr.x += cr.vx * 0.016;
      cr.y += cr.vy * 0.016;
      if (cr.x < 16 || cr.x > W - 16) { cr.vx *= -1; cr.flip = cr.vx < 0; }
      if (cr.y < 16 || cr.y > H - 16) cr.vy *= -1;
      if (!drawTile(cr.tile, Math.round(cr.x - 8), Math.round(cr.y - 8), 16, 16, cr.flip)) {
        ctx.fillStyle = '#666677';
        ctx.fillRect(Math.round(cr.x - 5), Math.round(cr.y - 5), 10, 10);
      }
    }
    ctx.fillStyle = 'rgba(0,0,8,0.74)';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    // title with red drop shadow
    ctx.font = '16px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#b00';
    ctx.fillText('KRYPTVAULT', W / 2 + 2, 22 + 2);
    ctx.fillStyle = '#FFD700';
    ctx.fillText('KRYPTVAULT', W / 2, 22);
    text('ROGUELITE SURVIVAL', W / 2, 46, 8, '#ffffff', 'center');

    // ----- menu buttons (left column) -----

    for (var i = 0; i < btns.length; i++) {
      var b = btns[i];
      var hover = mouse.x >= b.x && mouse.x <= b.x + b.w && mouse.y >= b.y && mouse.y <= b.y + b.h;
      ctx.fillStyle = hover ? '#FFD700' : (b.big ? '#8a7500' : '#444466');
      ctx.fillRect(b.x - 1, b.y - 1, b.w + 2, b.h + 2);
      ctx.fillStyle = hover ? '#1f1a08' : '#0d0d1a';

      var labelColor = b.big ? '#FFD700' : (hover ? '#ffffff' : '#cccccc');

    var isDaily = leaderboard.mode === 'daily';
    ctx.fillStyle = !isDaily ? '#2a2a3e' : 'transparent';

    text('DAILY', LB_PANEL.x + 86, LB_PANEL.y + 5, 6, isDaily ? '#FFD700' : '#666688');
    text('TOP 10 (L)', LB_PANEL.x + LB_PANEL.w - 6, LB_PANEL.y + 5, 6, '#555577', 'right');
    // column headers
    text('#', LB_PANEL.x + 8, LB_PANEL.y + 21, 6, '#555577');
    text('NAME', LB_PANEL.x + 38, LB_PANEL.y + 21, 6, '#555577');
    text('WAVE', LB_PANEL.x + 138, LB_PANEL.y + 21, 6, '#555577');
    text('KILLS', LB_PANEL.x + LB_PANEL.w - 8, LB_PANEL.y + 21, 6, '#555577', 'right');

    var ly = LB_PANEL.y + 34;

      text('LOADING...', LB_PANEL.x + LB_PANEL.w / 2, ly + 36, 6, '#777777', 'center');

      text('LEADERBOARD OFFLINE', LB_PANEL.x + LB_PANEL.w / 2, ly + 36, 6, '#883333', 'center');
    } else if (leaderboard.rows.length === 0) {
      text('NO RUNS YET — BE THE FIRST', LB_PANEL.x + LB_PANEL.w / 2, ly + 36, 6, '#777777', 'center');
    } else {
      for (var r = 0; r < leaderboard.rows.length; r++) {
        var row = leaderboard.rows[r];
        var me = row.name === runData.name &&
                 (!runData.playerDisc || !row.disc || row.disc === runData.playerDisc);
        var tag = row.name + (row.disc ? '#' + row.disc : '');
        var rowY = ly + r * 12; // 12px rows fill the panel with no dead strip
        text(pad(r + 1, 2), LB_PANEL.x + 8, rowY, 6, me ? '#FFD700' : '#555566');
        // class shown as the hero sprite (fallback: class-coloured square)
        if (!drawTile(classDef(row.cls).tile, LB_PANEL.x + 24, rowY - 2, 9, 9, false)) {
          ctx.fillStyle = classDef(row.cls).color;
          ctx.fillRect(LB_PANEL.x + 25, rowY - 1, 7, 7);
        }
        text(tag, LB_PANEL.x + 38, rowY, 6, me ? '#FFD700' : classDef(row.cls).color);
        text(pad(row.wave, 2), LB_PANEL.x + 142, rowY, 6, me ? '#FFD700' : '#ffffff');
        text(fmtKills(row.kills), LB_PANEL.x + LB_PANEL.w - 8, rowY, 6, me ? '#FFD700' : '#999999', 'right');
      }
    }

    if (runData.totalRuns > 0) {
      text('YOUR BEST: W' + pad(runData.bestWave, 2) + ' / ' + pad(runData.bestKills, 4) + ' KILLS',
           W / 2, 248, 6, '#00e5ff', 'center');
    }
    text('WASD MOVE — AUTO-FIRE — P PAUSE', W / 2, 259, 6, '#555555', 'center');
    text('v' + GAME_VERSION, 6, 258, 6, '#555566');

    // ----- glowing SHOP button (a coin bag; draws attention to cosmetics) -----
    var si = SHOP_ICON, chp = chromaColor(), pulse = 0.5 + 0.5 * Math.sin(game.time * 4);
    var siHover = (mouse.x - si.cx) * (mouse.x - si.cx) + (mouse.y - si.cy) * (mouse.y - si.cy) < (si.r + 5) * (si.r + 5);
    ctx.globalAlpha = 0.22 + 0.28 * pulse;
    ctx.fillStyle = chp;
    ctx.beginPath(); ctx.arc(si.cx, si.cy, si.r + 4 + pulse * 3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = siHover ? '#26263a' : '#161622';
    ctx.beginPath(); ctx.arc(si.cx, si.cy, si.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = chp; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(si.cx, si.cy, si.r, 0, Math.PI * 2); ctx.stroke();
    // coathanger (wardrobe): triangular body, bottom bar, little hook
    var hx = si.cx, hy = si.cy + 2;
    ctx.strokeStyle = '#f0d878';
    ctx.lineWidth = 1.6;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();                       // body triangle
    ctx.moveTo(hx - 7, hy + 3);
    ctx.lineTo(hx, hy - 2);
    ctx.lineTo(hx + 7, hy + 3);
    ctx.stroke();
    ctx.beginPath();                       // bottom bar
    ctx.moveTo(hx - 7, hy + 3);
    ctx.lineTo(hx + 7, hy + 3);
    ctx.stroke();
    ctx.beginPath();                       // hook
    ctx.moveTo(hx, hy - 2);
    ctx.lineTo(hx, hy - 5);
    ctx.quadraticCurveTo(hx + 3, hy - 8, hx + 1, hy - 8);
    ctx.stroke();
    ctx.lineJoin = 'miter'; ctx.lineCap = 'butt';
    text('SHOP', si.cx, si.cy + si.r + 2, 6, '#FFD700', 'center');
  }

  function renderGameOver() {
    // dark red tint background
    ctx.fillStyle = '#1a0000';
    ctx.fillRect(0, 0, W, H);
    drawAnimatedScanlines(0.05);

    text('YOU DIED', W / 2, 22, 16, '#ff2d2d', 'center');
    if (game.newRecord) {
      text('★ NEW RECORD ★', W / 2, 46, 8, '#FFD700', 'center');
    } else if (game.mode === 'daily') {
      text('DAILY CHALLENGE', W / 2, 46, 6, '#ff2dd0', 'center');
    }

    // ----- stat grid: 4 columns, label above value (scannable) -----
    var mins = Math.floor(game.time / 60), secs = Math.floor(game.time % 60);
    var stats = [
      { l: 'WAVE',  v: pad(game.wave, 2) },
      { l: 'KILLS', v: '' + game.score },
      { l: 'LEVEL', v: pad(game.level, 2) },
      { l: 'TIME',  v: pad(mins, 1) + ':' + pad(secs, 2) }
    ];
    for (var gi = 0; gi < 4; gi++) {
      var gcx = (gi + 0.5) * W / 4;
      text(stats[gi].l, gcx, 66, 6, '#888899', 'center');
      text(stats[gi].v, gcx, 78, 12, '#ffffff', 'center');
    }
    // class + coins
    text(currentClass.toUpperCase(), W / 2, 104, 6, '#bbbbbb', 'center');
    text('+' + Math.round(game.coinsEarned) + ' COINS', W / 2, 116, 6, '#FFD700', 'center');

    // ----- damage attribution: a stacked bar (what actually carried the run) -----
    if (game.dmgDealt > 0) {
      var order = ['shot', 'orb', 'static', 'bomb', 'ability', 'pact', 'other'];
      var labels = { shot: 'SHOTS', orb: 'ORBS', static: 'STATIC', bomb: 'BOMB', ability: 'ABILITY', pact: 'CURSES', other: 'OTHER' };
      var cols = { shot: '#ffe600', orb: '#00e5ff', static: '#f5f76e', bomb: '#ff9f1c', ability: '#ff2dd0', pact: '#9b59b6', other: '#9fb0c0' };
      var parts = [];
      for (var di = 0; di < order.length; di++) {
        var v = game.dmgBySource[order[di]] || 0;
        if (v > 0) parts.push({ k: order[di], pct: Math.round(100 * v / game.dmgDealt) });
      }
      text('DAMAGE DEALT  ' + Math.round(game.dmgDealt), W / 2, 138, 6, '#888899', 'center');
      // the stacked bar
      var barX = 70, barY = 150, barW = 340, barH = 10, sx = barX;
      ctx.fillStyle = '#000'; ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
      ctx.fillStyle = '#1a1420'; ctx.fillRect(barX, barY, barW, barH);
      for (var si = 0; si < parts.length; si++) {
        var segW = (si === parts.length - 1) ? (barX + barW - sx) : Math.round(barW * parts[si].pct / 100);
        ctx.fillStyle = cols[parts[si].k];
        ctx.fillRect(sx, barY, segW, barH);
        sx += segW;
      }
      // legend, centred: colour swatch + LABEL pct%
      ctx.font = '6px "Press Start 2P"';
      var lstrs = parts.map(function (pp) { return labels[pp.k] + ' ' + pp.pct + '%'; });
      var lw = 0;
      for (var li = 0; li < lstrs.length; li++) lw += 9 + ctx.measureText(lstrs[li]).width + 12;
      lw -= 12;
      var lx = W / 2 - lw / 2;
      for (var lj = 0; lj < parts.length; lj++) {
        ctx.fillStyle = cols[parts[lj].k];
        ctx.fillRect(lx, 168, 5, 5);
        text(lstrs[lj], lx + 9, 168, 6, '#cccccc');
        lx += 9 + ctx.measureText(lstrs[lj]).width + 12;
      }
    }

    // ----- best + submit status (secondary) -----
    text('BEST  W' + pad(runData.bestWave, 2) + ' · ' + runData.bestKills + ' KILLS · LVL ' + pad(runData.bestLevel, 2),
         W / 2, 190, 6, '#777788', 'center');
    if (leaderboard.submitState === 'sending') {
      text('SUBMITTING SCORE...', W / 2, 204, 6, '#777777', 'center');
    } else if (leaderboard.submitState === 'done') {
      text('SUBMITTED AS ' + runData.name, W / 2, 204, 6, '#33cc66', 'center');
    } else if (leaderboard.submitState === 'error') {
      text('SUBMIT FAILED — OFFLINE?', W / 2, 204, 6, '#883333', 'center');
    }

    if (game.blinkOn) {
      text('PRESS ENTER OR CLICK TO RESTART', W / 2, 236, 6, '#ffffff', 'center');
    }
  }

  function renderLevelUp() {
    // render frozen world behind
    renderWorld();
    renderHUD();
    // dark overlay
    ctx.fillStyle = 'rgba(0,0,10,0.75)';
    ctx.fillRect(0, 0, W, H);

    text('LEVEL UP!  CHOOSE AN UPGRADE', W / 2, 30, 8, '#FFD700', 'center');

    for (var i = 0; i < game.cards.length; i++) {
      var c = game.cards[i];
      var hover = mouse.x >= c.x && mouse.x <= c.x + c.w &&
                  mouse.y >= c.y && mouse.y <= c.y + c.h;

      var cursed = !!c.upgrade.cursed;
      var evo = !!c.upgrade.evolution;
      var tierColor = evo ? '#ff2dd0' : (cursed ? '#9b59b6' : '#FFD700');
      var cx2 = c.x + c.w / 2;

      // hover glow border (2px outside)
      if (hover) {
        ctx.fillStyle = evo ? 'rgba(255,45,208,0.45)' : (cursed ? 'rgba(155,89,182,0.45)' : 'rgba(255,215,0,0.35)');
        ctx.fillRect(c.x - 4, c.y - 4, c.w + 8, c.h + 8);
      }
      // tier frame + dark card face
      ctx.fillStyle = tierColor;
      ctx.fillRect(c.x - 2, c.y - 2, c.w + 4, c.h + 4);
      ctx.fillStyle = evo ? '#1f1018' : (cursed ? '#16101f' : '#1a1a2e');
      ctx.fillRect(c.x, c.y, c.w, c.h);

      // tier banner across the top — the at-a-glance rarity signal
      ctx.fillStyle = tierColor;
      ctx.fillRect(c.x, c.y, c.w, 11);
      text(evo ? 'EVOLUTION' : (cursed ? 'CURSED' : 'STANDARD'), cx2, c.y + 3, 6, '#0d0d1a', 'center');

      // card name
      wrapText(c.upgrade.name, cx2, c.y + 17, 8, '#ffffff', c.w - 8);

      // framed pixel art (the "card art" window)
      var artX = cx2 - 28, artY = c.y + 30;
      ctx.fillStyle = tierColor;
      ctx.fillRect(artX - 1, artY - 1, 58, 58);
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(artX, artY, 56, 56);
      var art = CARD_ART[c.upgrade.id];
      if (art) {
        drawPixelIcon(art, artX + 4, artY + 4, 4);
      } else {
        ctx.fillStyle = c.upgrade.color;
        ctx.fillRect(artX + 12, artY + 12, 32, 32);
      }

      // recipe hint: is this card an ingredient of an evolution not yet owned?
      var recipeHint = null, completesRecipe = false;
      if (!evo) {
        for (var re = 0; re < EVOLUTIONS.length; re++) {
          var rEvo = EVOLUTIONS[re];
          if (game.player.upgradesTaken[rEvo.id]) continue;
          if (rEvo.needs.indexOf(c.upgrade.id) === -1) continue;
          var otherIng = rEvo.needs[0] === c.upgrade.id ? rEvo.needs[1] : rEvo.needs[0];
          if (game.player.upgradesTaken[otherIng]) {
            recipeHint = 'UNLOCKS: ' + rEvo.name;
            completesRecipe = true;
            break;
          }
          if (!recipeHint) recipeHint = 'RECIPE 1/2: ' + rEvo.name;
        }
      }
      if (completesRecipe && game.blinkOn) {
        // pulse: this pick births an evolution next level
        ctx.fillStyle = 'rgba(255,45,208,0.4)';
        ctx.fillRect(c.x - 5, c.y - 5, c.w + 10, 3);
        ctx.fillRect(c.x - 5, c.y + c.h + 2, c.w + 10, 3);
        ctx.fillRect(c.x - 5, c.y - 5, 3, c.h + 10);
        ctx.fillRect(c.x + c.w + 2, c.y - 5, 3, c.h + 10);
      }

      // effect (white), downside (red), rules text (dim) or recipe hint (gold)
      wrapText(c.upgrade.desc, cx2, c.y + 92, 6, '#ffffff', c.w - 10);
      if (c.upgrade.con) {
        wrapText('BUT: ' + c.upgrade.con, cx2, c.y + 112, 6, '#ff5555', c.w - 10);
      }
      if (recipeHint) {
        wrapText(recipeHint, cx2, c.y + 130, 6, completesRecipe ? '#ff2dd0' : '#FFD700', c.w - 10);
      } else if (c.upgrade.detail) {
        wrapText(c.upgrade.detail, cx2, c.y + 130, 6, '#777799', c.w - 10);
      }

      // count owned
      var owned = game.player.upgradesTaken[c.upgrade.id] || 0;
      if (owned > 0) {
        text('OWNED x' + owned, cx2, c.y + c.h - 12, 6, '#999999', 'center');
      }
      // bottom accent stripe in the upgrade's own colour
      ctx.fillStyle = c.upgrade.color;
      ctx.fillRect(c.x, c.y + c.h - 4, c.w, 4);
    }
  }
